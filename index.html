th routing<\/strong> — разные пути одного домена (<code>/api<\/code>, <code>/<\/code>) ведут к разным backend'ам.<\/li><li><strong>TLS<\/strong> терминируется на уровне Ingress Controller через Secret с сертификатом.<\/li><\/ul><p>Установка контроллера обычно через Helm: <code>helm install nginx-ingress ingress-nginx/ingress-nginx<\/code>.<\/p>"}, {"title": "RBAC: Role, ClusterRole, RoleBinding, ClusterRoleBinding, SA", "level": "🟡 Middle", "explanation": "<p><strong>RBAC (Role-Based Access Control)<\/strong> контролирует, кто и что может делать в кластере через 4 связанных объекта.<\/p><table><tr><th>Объект<\/th><th>Область<\/th><\/tr><tr><td>Role<\/td><td>Права внутри одного namespace<\/td><\/tr><tr><td>ClusterRole<\/td><td>Права на весь кластер или кластерные ресурсы<\/td><\/tr><tr><td>RoleBinding<\/td><td>Привязка Role к пользователю/группе/ServiceAccount в namespace<\/td><\/tr><tr><td>ClusterRoleBinding<\/td><td>Привязка ClusterRole на уровне всего кластера<\/td><\/tr><\/table><pre><code>apiVersion: rbac.authorization.k8s.io/v1\nkind: Role\nmetadata:\n  name: pod-reader\n  namespace: prod\nrules:\n- apiGroups: [&quot;&quot;]\n  resources: [&quot;pods&quot;]\n  verbs: [&quot;get&quot;, &quot;list&quot;, &quot;watch&quot;]\n---\napiVersion: rbac.authorization.k8s.io/v1\nkind: RoleBinding\nmetadata:\n  name: read-pods\n  namespace: prod\nsubjects:\n- kind: ServiceAccount\n  name: ci-bot\n  namespace: prod\nroleRef:\n  kind: Role\n  name: pod-reader\n  apiGroup: rbac.authorization.k8s.io<\/code><\/pre><p><strong>ServiceAccount (SA)<\/strong> — идентичность для Pod'ов и приложений (не для людей). Проверка прав:<\/p><pre><code>kubectl auth can-i list pods --as=system:serviceaccount:prod:ci-bot<\/code><\/pre>"}, {"title": "Network Policy: ingress/egress правила между Pod", "level": "🟡 Middle", "explanation": "<p><strong>NetworkPolicy<\/strong> задаёт правила firewall на уровне Pod'ов — по умолчанию весь трафик между Pod'ами разрешён, NetworkPolicy ограничивает это (требует CNI с поддержкой, например Calico, Cilium).<\/p><pre><code>apiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: db-policy\n  namespace: prod\nspec:\n  podSelector:\n    matchLabels: {app: postgres}\n  policyTypes: [&quot;Ingress&quot;, &quot;Egress&quot;]\n  ingress:\n  - from:\n    - podSelector:\n        matchLabels: {app: backend}\n    ports:\n    - protocol: TCP\n      port: 5432\n  egress:\n  - to:\n    - namespaceSelector:\n        matchLabels: {name: dns}\n    ports:\n    - protocol: UDP\n      port: 53<\/code><\/pre><p>Эта политика разрешает входящие подключения к БД только от Pod'ов с меткой <code>app: backend<\/code> на порту 5432, а исходящие — только к DNS. Всё остальное блокируется.<\/p><p>Проверка поддержки в кластере:<\/p><pre><code>kubectl get networkpolicy -A<\/code><\/pre><p><strong>Важно:<\/strong> если CNI-плагин не поддерживает NetworkPolicy (например, стандартный flannel), созданные политики просто игнорируются без ошибки.<\/p>"}, {"title": "Helm 3: chart структура, values.yaml, install/upgrade/rollback, --dry-run", "level": "🟡 Middle", "explanation": "<p><strong>Helm<\/strong> — пакетный менеджер для Kubernetes, упаковывающий манифесты в переиспользуемые <strong>charts<\/strong> с шаблонизацией.<\/p><pre><code>mychart/\n├── Chart.yaml\n├── values.yaml\n├── templates/\n│   ├── deployment.yaml\n│   ├── service.yaml\n│   └── _helpers.tpl\n└── charts/  (зависимости)<\/code><\/pre><p><strong>values.yaml<\/strong> задаёт параметры по умолчанию, которые подставляются в шаблоны через <code>{{ .Values.replicaCount }}<\/code>.<\/p><pre><code>helm install myapp ./mychart -f custom-values.yaml\nhelm upgrade myapp ./mychart --set image.tag=1.3.0\nhelm rollback myapp 1\nhelm uninstall myapp<\/code><\/pre><p><code>--dry-run --debug<\/code> рендерит финальные манифесты без применения — полезно для проверки перед деплоем:<\/p><pre><code>helm install myapp ./mychart --dry-run --debug<\/code><\/pre><p>Helm 3 (в отличие от Helm 2) не требует Tiller — работает напрямую через kubeconfig, что упростило безопасность. Helm хранит историю релизов как Secret в кластере, что даёт возможность откатов.<\/p>"}, {"title": "HPA: автоскейлинг по CPU/memory, custom metrics", "level": "🟡 Middle", "explanation": "<p><strong>Horizontal Pod Autoscaler (HPA)<\/strong> автоматически изменяет число реплик Deployment/StatefulSet в зависимости от нагрузки, требует установленного <strong>metrics-server<\/strong>.<\/p><pre><code>apiVersion: autoscaling/v2\nkind: HorizontalPodAutoscaler\nmetadata:\n  name: myapp-hpa\nspec:\n  scaleTargetRef:\n    apiVersion: apps/v1\n    kind: Deployment\n    name: myapp\n  minReplicas: 2\n  maxReplicas: 10\n  metrics:\n  - type: Resource\n    resource:\n      name: cpu\n      target:\n        type: Utilization\n        averageUtilization: 70<\/code><\/pre><p>HPA сравнивает текущую утилизацию с target и вычисляет желаемое число реплик каждые 15 секунд (по умолчанию).<\/p><p>Для <strong>custom metrics<\/strong> (RPS, длина очереди) требуется адаптер вроде <code>prometheus-adapter<\/code>, который экспортирует метрики Prometheus в Kubernetes Custom Metrics API:<\/p><pre><code>metrics:\n- type: Pods\n  pods:\n    metric:\n      name: http_requests_per_second\n    target:\n      type: AverageValue\n      averageValue: &quot;100&quot;<\/code><\/pre><p>Проверка состояния:<\/p><pre><code>kubectl get hpa\nkubectl describe hpa myapp-hpa<\/code><\/pre>"}], "quiz": [{"q": "Какой компонент control plane хранит всё состояние кластера Kubernetes?", "options": ["kubelet", "etcd", "Scheduler", "Ingress Controller"], "answer": 1, "explain": "etcd — распределённое key-value хранилище, единственный источник истины о состоянии кластера."}, {"q": "Какая команда покажет события и детали конкретного Pod, включая причину сбоя?", "options": ["kubectl get pod", "kubectl logs", "kubectl describe pod", "kubectl top pod"], "answer": 2, "explain": "kubectl describe pod показывает события (Events), статус контейнеров и причины ошибок вроде OOMKilled или FailedScheduling."}, {"q": "Для чего используются init containers в Pod?", "options": ["Для балансировки нагрузки между контейнерами", "Для выполнения подготовительных задач до старта основных контейнеров", "Для хранения секретов", "Для мониторинга метрик Pod"], "answer": 1, "explain": "Init containers выполняются последовательно и должны успешно завершиться (exit 0) до запуска основных контейнеров — используются для инициализации, ожидания зависимостей."}, {"q": "Что контролирует параметр maxUnavailable в стратегии RollingUpdate Deployment?", "options": ["Максимальное число новых Pod сверх replicas", "Максимальное число недоступных Pod во время обновления", "Время ожидания между обновлениями Pod", "Число неудачных попыток обновления"], "answer": 1, "explain": "maxUnavailable задаёт, сколько Pod максимум может быть недоступно одновременно во время rolling update, обеспечивая контролируемый уровень доступности."}, {"q": "Какой тип Service открывает статический порт на каждом узле кластера в диапазоне 30000-32767?", "options": ["ClusterIP", "LoadBalancer", "NodePort", "ExternalName"], "answer": 2, "explain": "NodePort резервирует один и тот же порт из диапазона 30000-32767 на каждом узле кластера и перенаправляет трафик к Service."}, {"q": "Что произойдёт при обновлении ConfigMap, смонтированного как переменные окружения через envFrom?", "options": ["Переменные обновятся немедленно без перезапуска", "Переменные не обновятся, Pod нужно перезапустить", "Pod автоматически перезапустится", "Обновление вызовет ошибку"], "answer": 1, "explain": "Переменные окружения устанавливаются один раз при старте контейнера и не обновляются автоматически при изменении ConfigMap — требуется пересоздание Pod."}, {"q": "Чем Secret типа Opaque отличается по безопасности от обычного ConfigMap?", "options": ["Данные шифруются надёжным алгоритмом AES", "Данные кодируются в base64, что не является шифрованием", "Secret доступен только root-пользователю на узле", "Secret автоматически удаляется через 24 часа"], "answer": 1, "explain": "Base64 — это кодирование, а не шифрование, оно легко обратимо. Реальная защита Secret обеспечивается RBAC и шифрованием etcd at-rest."}, {"q": "Какой ресурс Kubernetes не является namespaced (не привязан к конкретному namespace)?", "options": ["Pod", "Deployment", "Node", "ConfigMap"], "answer": 2, "explain": "Node — кластерный ресурс, существующий независимо от namespace, в отличие от Pod, Deployment и ConfigMap, которые всегда живут в конкретном namespace."}, {"q": "Что произойдёт, если Liveness probe несколько раз подряд провалится?", "options": ["Pod будет удалён из Service Endpoints", "Контейнер будет перезапущен kubelet", "Кластер отправит алерт и ничего больше", "Pod будет помечен как Pending"], "answer": 1, "explain": "При провале Liveness probe kubelet перезапускает контейнер, в отличие от Readiness probe, который лишь исключает Pod из балансировки трафика."}, {"q": "В чём принципиальное отличие StatefulSet от Deployment?", "options": ["StatefulSet не поддерживает rolling update", "StatefulSet даёт стабильную сетевую идентичность и постоянное хранилище для каждой реплики", "StatefulSet работает только с одной репликой", "StatefulSet не использует labels и selectors"], "answer": 1, "explain": "StatefulSet присваивает каждому Pod стабильное имя с ordinal index (pod-0, pod-1) и отдельный PVC через volumeClaimTemplates, что критично для stateful-приложений типа БД."}, {"q": "Для чего в DaemonSet добавляют toleration к control-plane taint?", "options": ["Чтобы ускорить запуск Pod", "Чтобы разрешить DaemonSet запускаться и на master-узлах с NoSchedule taint", "Чтобы ограничить доступ к ресурсам", "Чтобы отключить автоматическое обновление"], "answer": 1, "explain": "Master-узлы обычно имеют taint NoSchedule, блокирующий обычные Pod. Toleration позволяет DaemonSet 'терпеть' этот taint и запускаться там же, например для сбора метрик со всех узлов."}, {"q": "Что нужно установить в кластере для корректной работы Horizontal Pod Autoscaler по CPU/memory?", "options": ["Ingress Controller", "metrics-server", "CNI-плагин", "StorageClass"], "answer": 1, "explain": "HPA получает данные об утилизации ресурсов через metrics-server (или Custom Metrics API для custom metrics), без него HPA не может принимать решения о масштабировании."}], "id": 5, "pi": 1}, {"phase": "Phase 3 — CI/CD + Terraform + Ansible", "section": "🔄 CI/CD Pipelines", "topics": [{"title": "Концепции: CI vs CD (Delivery vs Deployment) — отличия", "level": "🟢 Junior", "explanation": "<p><strong>Continuous Integration (CI)<\/strong> — практика, при которой разработчики часто (несколько раз в день) вливают изменения в общую ветку. Каждый коммит автоматически собирается и прогоняется через тесты, что позволяет находить конфликты и баги на раннем этапе.<\/p><p><strong>Continuous Delivery<\/strong> — расширение CI: после успешной сборки и тестов приложение автоматически готовится к релизу (собирается артефакт, образ), но выпуск в production делает человек — нажатием кнопки.<\/p><p><strong>Continuous Deployment<\/strong> — следующий шаг: если все автоматические проверки прошли успешно, изменения выкатываются в production <em>без<\/em> ручного подтверждения.<\/p><table><tr><th>Термин<\/th><th>Сборка<\/th><th>Тесты<\/th><th>Деплой в prod<\/th><\/tr><tr><td>CI<\/td><td>авто<\/td><td>авто<\/td><td>нет<\/td><\/tr><tr><td>Continuous Delivery<\/td><td>авто<\/td><td>авто<\/td><td>ручной клик<\/td><\/tr><tr><td>Continuous Deployment<\/td><td>авто<\/td><td>авто<\/td><td>полностью авто<\/td><\/tr><\/table><p>Пример пайплайна на GitLab CI, реализующего CI без деплоя:<\/p><pre><code>stages:\n  - build\n  - test\n\nbuild:\n  stage: build\n  script:\n    - docker build -t myapp:$CI_COMMIT_SHA .\n\nunit_tests:\n  stage: test\n  script:\n    - go test ./...<\/code><\/pre><p>Различие важно на собеседованиях: многие путают Delivery и Deployment, хотя ключевое отличие — наличие ручного gate перед production.<\/p>"}, {"title": "Git webhooks: как pipeline триггерится на push/MR/tag", "level": "🟢 Junior", "explanation": "<p><strong>Webhook<\/strong> — это HTTP-запрос (обычно POST), который Git-провайдер (GitHub, GitLab, Bitbucket) отправляет на заданный URL при возникновении события в репозитории: push, создание merge request/pull request, создание тега, комментарий и т.д.<\/p><p>CI-система (Jenkins, GitLab CI, GitHub Actions) либо сама принимает webhook на свой endpoint, либо (в случае GitHub Actions/GitLab CI) события обрабатываются встроенным механизмом без ручной настройки webhook.<\/p><p>Пример настройки webhook в Jenkins для GitHub: в репозитории указывается URL <code>http://jenkins.example.com/github-webhook/<\/code>, событие — <strong>push<\/strong>. Jenkins должен иметь установленный плагин GitHub Integration.<\/p><p>В GitHub Actions триггер описывается прямо в workflow-файле:<\/p><pre><code>on:\n  push:\n    branches: [main]\n  pull_request:\n    types: [opened, synchronize]\n  push:\n    tags:\n      - 'v*'<\/code><\/pre><p>В GitLab CI аналогично через секцию <code>rules<\/code>:<\/p><pre><code>job:\n  script: echo \"run\"\n  rules:\n    - if: '$CI_COMMIT_TAG'\n    - if: '$CI_PIPELINE_SOURCE == \"merge_request_event\"'<\/code><\/pre><ul><li>Push-событие — самый частый триггер для CI-тестов.<\/li><li>MR/PR-событие — запускает проверки перед мержем (линтеры, тесты).<\/li><li>Tag-событие — обычно триггерит релизный пайплайн (сборка и публикация версии).<\/li><\/ul><p>Важно защищать webhook secret-токеном, чтобы исключить поддельные запросы.<\/p>"}, {"title": "Jenkins: установка, Jenkinsfile, declarative vs scripted pipeline", "level": "🟢 Junior", "explanation": "<p><strong>Jenkins<\/strong> — один из старейших и самых распространённых CI/CD серверов с открытым исходным кодом на Java. Устанавливается как standalone-сервис, через Docker-образ <code>jenkins/jenkins:lts<\/code> или как war-файл под Tomcat.<\/p><p>Быстрый старт в Docker:<\/p><pre><code>docker run -d -p 8080:8080 -p 50000:50000 -v jenkins_home:/var/jenkins_home jenkins/jenkins:lts<\/code><\/pre><p>Пайплайны в Jenkins описываются в файле <code>Jenkinsfile<\/code>, который хранится в корне репозитория. Есть два синтаксиса:<\/p><ul><li><strong>Declarative pipeline<\/strong> — современный, структурированный, легче читается, рекомендуется для большинства случаев.<\/li><li><strong>Scripted pipeline<\/strong> — старый, на чистом Groovy, даёт больше гибкости, но сложнее поддерживать.<\/li><\/ul><p>Пример declarative Jenkinsfile:<\/p><pre><code>pipeline {\n    agent any\n    stages {\n        stage('Build') {\n            steps {\n                sh 'go build -o app .'\n            }\n        }\n        stage('Test') {\n            steps {\n                sh 'go test ./...'\n            }\n        }\n    }\n}<\/code><\/pre><p>Пример того же самого в scripted-стиле:<\/p><pre><code>node {\n    stage('Build') {\n        sh 'go build -o app .'\n    }\n    stage('Test') {\n        sh 'go test ./...'\n    }\n}<\/code><\/pre><p>Declarative проверяется линтером Jenkins на этапе parse, что снижает количество ошибок в runtime — поэтому в новых проектах предпочитают именно его.<\/p>"}, {"title": "Jenkins: stages, steps, post (always/success/failure), параметры", "level": "🟢 Junior", "explanation": "<p>Declarative Jenkinsfile строится из блока <code>pipeline<\/code>, внутри которого объявляются <strong>stages<\/strong> (логические этапы: Build, Test, Deploy), а внутри каждого stage — <strong>steps<\/strong> (конкретные команды).<\/p><p>Блок <code>post<\/code> определяет действия после выполнения stage или всего пайплайна в зависимости от результата:<\/p><ul><li><code>always<\/code> — выполняется всегда, независимо от результата;<\/li><li><code>success<\/code> — только если всё прошло успешно;<\/li><li><code>failure<\/code> — только при ошибке;<\/li><li><code>unstable<\/code> — при нестабильном результате (например, часть тестов упала, но не критично).<\/li><\/ul><p>Параметры позволяют передавать значения при ручном запуске сборки:<\/p><pre><code>pipeline {\n    agent any\n    parameters {\n        choice(name: 'ENV', choices: ['dev', 'staging', 'prod'], description: 'Окружение')\n        string(name: 'VERSION', defaultValue: '1.0.0')\n    }\n    stages {\n        stage('Deploy') {\n            steps {\n                echo \"Deploying version ${params.VERSION} to ${params.ENV}\"\n            }\n        }\n    }\n    post {\n        always {\n            echo 'Пайплайн завершён'\n        }\n        success {\n            slackSend(message: \"Deploy ${params.VERSION} успешен\")\n        }\n        failure {\n            mail to: 'devops@example.com', subject: 'Build failed', body: 'Проверьте логи'\n        }\n    }\n}<\/code><\/pre><p>Такая структура даёт понятную обратную связь команде: успех уведомляется в Slack, а провал — по email, без дублирования логики между stages.<\/p>"}, {"title": "GitLab CI: .gitlab-ci.yml, stages, jobs, artifacts, cache, runners", "level": "🟢 Junior", "explanation": "<p>GitLab CI — встроенная в GitLab CI/CD-система. Конфигурация описывается декларативно в YAML-файле <code>.gitlab-ci.yml<\/code> в корне репозитория.<\/p><p>Ключевые понятия:<\/p><ul><li><strong>stages<\/strong> — последовательные этапы (build, test, deploy);<\/li><li><strong>jobs<\/strong> — конкретные задачи, каждая привязана к stage; jobs внутри одного stage выполняются параллельно;<\/li><li><strong>artifacts<\/strong> — файлы, которые сохраняются после job и передаются в последующие stages (например, скомпилированный бинарник);<\/li><li><strong>cache<\/strong> — данные (например, <code>node_modules<\/code>), которые кешируются между запусками для ускорения;<\/li><li><strong>runners<\/strong> — агенты (Docker, shell, Kubernetes executor), выполняющие jobs; бывают shared (общие для всего GitLab) и specific (закреплённые за проектом).<\/li><\/ul><pre><code>stages:\n  - build\n  - test\n  - deploy\n\nbuild_job:\n  stage: build\n  script:\n    - npm install\n    - npm run build\n  cache:\n    key: node-modules\n    paths:\n      - node_modules/\n  artifacts:\n    paths:\n      - dist/\n    expire_in: 1 week\n\ntest_job:\n  stage: test\n  script:\n    - npm test\n\ndeploy_job:\n  stage: deploy\n  script:\n    - ./deploy.sh\n  only:\n    - main<\/code><\/pre><p>Runner регистрируется командой <code>gitlab-runner register<\/code> с указанием URL GitLab и токена проекта. Executor может быть <code>docker<\/code>, <code>shell<\/code>, <code>kubernetes<\/code> — выбор влияет на изоляцию и скорость запуска jobs.<\/p>"}, {"title": "GitHub Actions: workflow yaml, jobs, steps, actions/checkout, secrets", "level": "🟢 Junior", "explanation": "<p><strong>GitHub Actions<\/strong> — встроенная CI/CD платформа GitHub. Workflow-файлы хранятся в <code>.github/workflows/*.yml<\/code> и описывают, при каких событиях (<code>on:<\/code>) и какие <strong>jobs<\/strong> запускать.<\/p><p>Каждый job состоит из <strong>steps<\/strong> — последовательных действий, которые могут быть либо готовыми <em>actions<\/em> из marketplace (например, <code>actions/checkout<\/code> для клонирования репозитория), либо простыми shell-командами через <code>run:<\/code>.<\/p><pre><code>name: CI\n\non:\n  push:\n    branches: [main]\n\njobs:\n  build-and-test:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n\n      - name: Setup Node\n        uses: actions/setup-node@v4\n        with:\n          node-version: '20'\n\n      - name: Install deps\n        run: npm ci\n\n      - name: Run tests\n        run: npm test\n\n      - name: Deploy\n        env:\n          API_TOKEN: ${{ secrets.API_TOKEN }}\n        run: ./deploy.sh<\/code><\/pre><p><strong>Secrets<\/strong> хранятся в настройках репозитория (Settings → Secrets and variables → Actions) и доступны в workflow через контекст <code>secrets.*<\/code>, не попадая в логи в открытом виде.<\/p><ul><li><code>runs-on<\/code> задаёт тип раннера (ubuntu-latest, windows-latest, self-hosted);<\/li><li>jobs по умолчанию выполняются параллельно, если не указана зависимость <code>needs:<\/code>;<\/li><li>marketplace-actions значительно ускоряют написание пайплайнов, избавляя от ручной настройки окружения.<\/li><\/ul>"}, {"title": "Секреты в pipeline: Vault integration, encrypted vars", "level": "🟢 Junior", "explanation": "<p>Хранить пароли, токены и API-ключи в открытом виде в репозитории или в коде пайплайна — критическая ошибка безопасности. Существует два основных подхода:<\/p><ul><li><strong>Encrypted variables<\/strong> — секреты хранятся в зашифрованном виде на стороне CI-платформы (GitHub Secrets, GitLab CI/CD Variables с флагом <em>masked + protected<\/em>, Jenkins Credentials) и подставляются в переменные окружения во время запуска job, не отображаясь в логах.<\/li><li><strong>HashiCorp Vault integration<\/strong> — секреты хранятся централизованно в Vault и запрашиваются пайплайном динамически, часто с коротким TTL (dynamic secrets), что снижает риск компрометации по сравнению со статичными переменными.<\/li><\/ul><p>Пример получения секрета из Vault в GitLab CI через Vault plugin:<\/p><pre><code>deploy:\n  stage: deploy\n  secrets:\n    DB_PASSWORD:\n      vault:\n        engine:\n          name: kv-v2\n          path: secret\n        path: prod/db\n        field: password\n  script:\n    - echo \"Deploying with secret from Vault\"\n    - ./deploy.sh<\/code><\/pre><p>Пример в GitHub Actions с masked secret:<\/p><pre><code>- name: Deploy\n  env:\n    DB_PASSWORD: ${{ secrets.DB_PASSWORD }}\n  run: ./deploy.sh<\/code><\/pre><p>Правила безопасности: секреты должны быть <em>protected<\/em> (доступны только защищённым веткам/тегам), <em>masked<\/em> в логах, и никогда не должны попадать в артефакты сборки или коммититься в код.<\/p>"}, {"title": "Docker build & push в pipeline: buildah, kaniko (rootless)", "level": "🟢 Junior", "explanation": "<p>Сборка Docker-образов внутри CI-раннера классическим способом (<code>docker build<\/code>) требует доступа к Docker daemon, что означает root-права контейнера — риск для безопасности (\"Docker-in-Docker\" проблема). Для сборки без демона и без root применяются rootless-инструменты:<\/p><ul><li><strong>Kaniko<\/strong> (Google) — собирает образ из Dockerfile прямо в контейнере, без демона, часто используется в Kubernetes-раннерах (GitLab CI, Jenkins на K8s).<\/li><li><strong>Buildah<\/strong> (Red Hat) — CLI-инструмент для сборки OCI/Docker-образов без демона, хорошо сочетается с Podman.<\/li><\/ul><p>Пример job в GitLab CI с kaniko:<\/p><pre><code>build_image:\n  stage: build\n  image:\n    name: gcr.io/kaniko-project/executor:debug\n    entrypoint: [\"\"]\n  script:\n    - /kaniko/executor\n        --context \"${CI_PROJECT_DIR}\"\n        --dockerfile \"${CI_PROJECT_DIR}/Dockerfile\"\n        --destination \"${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}\"<\/code><\/pre><p>Пример с buildah:<\/p><pre><code>build:\n  script:\n    - buildah bud -t myapp:$CI_COMMIT_SHA .\n    - buildah push myapp:$CI_COMMIT_SHA docker://registry.example.com/myapp:$CI_COMMIT_SHA<\/code><\/pre><p>Такой подход особенно важен в Kubernetes CI-раннерах, где предоставлять контейнерам привилегированный доступ к Docker socket считается плохой практикой безопасности.<\/p>"}, {"title": "Запуск тестов: unit, integration, coverage reports, junit xml", "level": "🟢 Junior", "explanation": "<p>Автоматический прогон тестов — центральная часть CI. Различают:<\/p><ul><li><strong>Unit-тесты<\/strong> — проверяют отдельные функции/модули в изоляции, выполняются быстро.<\/li><li><strong>Integration-тесты<\/strong> — проверяют взаимодействие компонентов (например, приложение + реальная БД в Docker-контейнере), выполняются дольше.<\/li><\/ul><p>Результаты тестов обычно экспортируются в формате <strong>JUnit XML<\/strong> — универсальном стандарте, который понимают почти все CI-системы для красивого отображения отчётов (сколько тестов прошло/упало, время выполнения).<\/p><p>Пример для Go с генерацией JUnit XML и покрытия:<\/p><pre><code>test:\n  stage: test\n  script:\n    - go install gotest.tools/gotestsum@latest\n    - gotestsum --junitfile report.xml -- -coverprofile=coverage.out ./...\n    - go tool cover -func=coverage.out\n  artifacts:\n    reports:\n      junit: report.xml\n    paths:\n      - coverage.out<\/code><\/pre><p>В GitHub Actions отчёт о покрытии часто публикуется через сторонние actions (например, <code>codecov/codecov-action<\/code>):<\/p><pre><code>- name: Upload coverage\n  uses: codecov/codecov-action@v4\n  with:\n    files: ./coverage.out<\/code><\/pre><p>Метрика <strong>code coverage<\/strong> (процент строк кода, покрытых тестами) — не гарантия качества, но полезный индикатор для контроля деградации тестового покрытия при code review.<\/p>"}, {"title": "Артефакты: архивирование, передача между stages, retention policy", "level": "🟢 Junior", "explanation": "<p><strong>Артефакт<\/strong> — файл или набор файлов, созданных на одном этапе пайплайна (бинарник, Docker-образ tar, отчёт о тестах, статические файлы фронтенда), которые нужно сохранить и/или передать в следующий stage.<\/p><p>Без артефактов каждый stage выполняется в изолированном окружении (особенно с Docker executor), и результаты предыдущего этапа были бы потеряны.<\/p><p>Пример в GitLab CI — передача собранного бинарника из build в deploy:<\/p><pre><code>build:\n  stage: build\n  script:\n    - go build -o app .\n  artifacts:\n    paths:\n      - app\n    expire_in: 3 days\n\ndeploy:\n  stage: deploy\n  script:\n    - scp app user@server:/opt/app/\n  dependencies:\n    - build<\/code><\/pre><p><strong>Retention policy<\/strong> (<code>expire_in<\/code> в GitLab, <code>retention-days<\/code> в GitHub Actions) определяет, сколько времени артефакты хранятся на сервере CI перед автоматическим удалением — это важно для контроля затрат на хранение.<\/p><pre><code># GitHub Actions\n- uses: actions/upload-artifact@v4\n  with:\n    name: build-output\n    path: dist/\n    retention-days: 7<\/code><\/pre><ul><li>Артефакты релизных сборок часто хранят дольше (30-90 дней) или переносят в отдельный artifact repository (Nexus, Artifactory, S3).<\/li><li>Слишком большие или ненужные артефакты (например, node_modules) не стоит архивировать — используйте cache для таких данных.<\/li><\/ul>"}, {"title": "Параллельные jobs и matrix builds", "level": "🟡 Middle", "explanation": "<p>Если jobs внутри одного stage не зависят друг от друга, их можно выполнять параллельно, что заметно сокращает общее время пайплайна. Это особенно полезно для запуска тестов на разных версиях языка/ОС или для разделения большого набора тестов на несколько параллельных потоков.<\/p><p><strong>Matrix build<\/strong> — механизм автоматической генерации набора jobs как комбинации значений переменных (например, версии Node.js × операционные системы).<\/p><p>Пример matrix в GitHub Actions:<\/p><pre><code>jobs:\n  test:\n    strategy:\n      matrix:\n        node: [18, 20, 22]\n        os: [ubuntu-latest, windows-latest]\n    runs-on: ${{ matrix.os }}\n    steps:\n      - uses: actions/checkout@v4\n      - uses: actions/setup-node@v4\n        with:\n          node-version: ${{ matrix.node }}\n      - run: npm test<\/code><\/pre><p>Это создаст 6 параллельных jobs (3 версии × 2 ОС).<\/p><p>Пример параллельного разделения тестов в GitLab CI с <code>parallel<\/code>:<\/p><pre><code>test:\n  stage: test\n  parallel: 5\n  script:\n    - go test -run \"Test$((CI_NODE_INDEX))\" ./...<\/code><\/pre><p>При использовании matrix/parallel важно следить за лимитами конкурентных раннеров — иначе jobs будут стоять в очереди, а не выполняться параллельно, что не даст ожидаемого ускорения.<\/p>"}, {"title": "Multi-env deploy: dev → staging → prod с manual approval gate", "level": "🟡 Middle", "explanation": "<p>Типичный production-пайплайн разворачивает приложение последовательно по цепочке окружений: <strong>dev → staging → production<\/strong>, повышая уверенность в качестве релиза на каждом шаге. Переход между окружениями (особенно в prod) часто требует <strong>manual approval gate<\/strong> — паузы, ожидающей подтверждения от человека (тимлида, релиз-менеджера).<\/p><p>Пример в GitLab CI с ручным gate перед prod:<\/p><pre><code>deploy_dev:\n  stage: deploy-dev\n  script: ./deploy.sh dev\n  environment:\n    name: dev\n\ndeploy_staging:\n  stage: deploy-staging\n  script: ./deploy.sh staging\n  environment:\n    name: staging\n  when: on_success\n\ndeploy_prod:\n  stage: deploy-prod\n  script: ./deploy.sh prod\n  environment:\n    name: production\n  when: manual\n  only:\n    - main<\/code><\/pre><p>Ключевое слово <code>when: manual<\/code> делает job \"заморозенным\" в пайплайне до тех пор, пока кто-то не нажмёт кнопку \"play\" в UI GitLab.<\/p><p>В GitHub Actions аналог реализуется через <strong>environments<\/strong> с настроенными <em>required reviewers<\/em>:<\/p><pre><code>jobs:\n  deploy-prod:\n    environment: production\n    runs-on: ubuntu-latest\n    steps:\n      - run: ./deploy.sh prod<\/code><\/pre><p>В настройках environment \"production\" указывается список пользователей, чьё одобрение требуется перед запуском job — GitHub автоматически приостановит workflow и запросит approval.<\/p>"}, {"title": "Blue-green deployment: переключение трафика без downtime", "level": "🟡 Middle", "explanation": "<p><strong>Blue-green deployment<\/strong> — стратегия развёртывания, при которой существуют два идентичных окружения: <em>blue<\/em> (текущая, активная версия) и <em>green<\/em> (новая версия). Новая версия разворачивается в green-окружении полностью, проходит smoke-тесты, и только после этого трафик мгновенно переключается с blue на green (например, через изменение upstream в load balancer или Service в Kubernetes).<\/p><p>Главное преимущество — <strong>нулевой downtime<\/strong> и мгновенный rollback: если что-то не так, трафик просто переключают обратно на blue.<\/p><p>Пример переключения через Kubernetes Service (меняем selector):<\/p><pre><code>apiVersion: v1\nkind: Service\nmetadata:\n  name: myapp\nspec:\n  selector:\n    app: myapp\n    version: green   # было blue\n  ports:\n    - port: 80\n      targetPort: 8080<\/code><\/pre><pre><code>kubectl patch service myapp -p '{\"spec\":{\"selector\":{\"version\":\"green\"}}}'<\/code><\/pre><p>Пример на уровне Nginx с двумя upstream-группами:<\/p><pre><code>upstream blue { server 10.0.0.1:8080; }\nupstream green { server 10.0.0.2:8080; }\n\nserver {\n    location / {\n        proxy_pass http://green;  # переключение вручную\n    }\n}<\/code><\/pre><p>Недостаток подхода — требуется двукратный запас ресурсов (два полных окружения одновременно), что дороже, чем canary или rolling update, но зато откат происходит практически моментально.<\/p>"}, {"title": "Canary release: постепенное увеличение трафика", "level": "🟡 Middle", "explanation": "<p><strong>Canary release<\/strong> — стратегия, при которой новая версия приложения сначала получает небольшую долю трафика (например, 5%), и только после подтверждения стабильности (по метрикам ошибок, latency) доля постепенно увеличивается до 100%.<\/p><p>Название происходит от практики шахтёров брать канареек в шахты — птицы реагировали на газ раньше людей, служа раннем индикатором проблемы. Аналогично canary-версия \"предупреждает\" о проблемах до того, как они затронут всех пользователей.<\/p><p>Пример конфигурации Ingress с canary-аннотациями (nginx-ingress):<\/p><pre><code>apiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name: myapp-canary\n  annotations:\n    nginx.ingress.kubernetes.io/canary: \"true\"\n    nginx.ingress.kubernetes.io/canary-weight: \"10\"\nspec:\n  rules:\n    - host: myapp.example.com\n      http:\n        paths:\n          - path: /\n            pathType: Prefix\n            backend:\n              service:\n                name: myapp-canary-svc\n                port:\n                  number: 80<\/code><\/pre><p>Здесь 10% трафика уходит на canary-версию, 90% — на стабильную. Постепенно увеличивая <code>canary-weight<\/code> (10% → 25% → 50% → 100%), можно безопасно раскатать релиз.<\/p><ul><li>Инструменты уровня сервис-меша (Istio, Linkerd) и Flagger позволяют автоматизировать этот процесс с автоматическим rollback при аномалиях метрик.<\/li><li>В отличие от blue-green, canary даёт более плавный и контролируемый переход, но требует хорошего observability для принятия решения об увеличении трафика.<\/li><\/ul>"}, {"title": "GitOps: ArgoCD / Flux — sync манифестов из Git в кластер", "level": "🟡 Middle", "explanation": "<p><strong>GitOps<\/strong> — подход к управлению инфраструктурой и деплоем, при котором Git-репозиторий является <em>единственным источником истины<\/em> (single source of truth) о желаемом состоянии кластера. Специальный контроллер внутри кластера непрерывно сравнивает текущее состояние с состоянием, описанным в Git, и автоматически приводит кластер в соответствие.<\/p><p>Два самых популярных инструмента: <strong>ArgoCD<\/strong> и <strong>Flux<\/strong>. Оба работают по pull-модели: агент внутри кластера сам \"тянет\" изменения из Git, в отличие от классического push-деплоя из CI-пайплайна.<\/p><p>Пример Application-манифеста ArgoCD:<\/p><pre><code>apiVersion: argoproj.io/v1alpha1\nkind: Application\nmetadata:\n  name: myapp\n  namespace: argocd\nspec:\n  project: default\n  source:\n    repoURL: https://github.com/org/myapp-manifests.git\n    targetRevision: main\n    path: k8s/prod\n  destination:\n    server: https://kubernetes.default.svc\n    namespace: myapp\n  syncPolicy:\n    automated:\n      prune: true\n      selfHeal: true<\/code><\/pre><p>Параметр <code>selfHeal: true<\/code> означает, что если кто-то вручную изменит ресурс в кластере (например, через <code>kubectl edit<\/code>), ArgoCD автоматически откатит изменение к версии из Git.<\/p><ul><li>Преимущества: полный аудит через историю Git-коммитов, легкий rollback (<code>git revert<\/code>), декларативность.<\/li><li>Flux работает похожим образом, но чаще используется в связке с Helm-релизами и Kustomize через CRD <code>GitRepository<\/code>/<code>Kustomization<\/code>.<\/li><\/ul>"}], "quiz": [{"q": "Чем Continuous Deployment отличается от Continuous Delivery?", "options": ["Deployment не включает тесты, Delivery включает", "В Deployment релиз в production происходит автоматически, без ручного подтверждения", "Delivery работает только с Docker, Deployment — с VM", "Это синонимы, отличий нет"], "answer": 1, "explain": "Continuous Delivery готовит релиз к выпуску, но требует ручного подтверждения перед production. Continuous Deployment выполняет этот шаг полностью автоматически при прохождении всех проверок."}, {"q": "Какое событие обычно триггерит релизный пайплайн сборки версии в GitHub Actions?", "options": ["push тега (например, v1.2.3)", "открытие issue", "комментарий в discussions", "fork репозитория"], "answer": 0, "explain": "Push тега (например, соответствующего semantic versioning v1.2.3) — стандартный триггер для релизных пайплайнов, отделяющий их от обычных CI-запусков на push в ветку."}, {"q": "Какой синтаксис Jenkinsfile рекомендуется для новых проектов и почему?", "options": ["Scripted, так как он проще", "Declarative, так как он структурирован и проверяется линтером на этапе parse", "Scripted, потому что declarative устарел", "Оба синтаксиса одинаково не рекомендуются"], "answer": 1, "explain": "Declarative pipeline — современный стандарт: он строже структурирован, легче читается и проверяется встроенным линтером Jenkins до выполнения, что снижает количество ошибок."}, {"q": "В каком блоке declarative Jenkinsfile выполняется действие только при провале сборки?", "options": ["post { failure { ... } }", "post { always { ... } }", "stage { onFail { ... } }", "pipeline { error { ... } }"], "answer": 0, "explain": "Блок post с секцией failure выполняется только тогда, когда пайплайн или stage завершился с ошибкой, например, для отправки уведомления."}, {"q": "В GitLab CI что определяет, какие файлы будут переданы из одного stage в другой?", "options": ["cache", "artifacts", "variables", "rules"], "answer": 1, "explain": "artifacts указывают, какие файлы после выполнения job сохраняются и становятся доступны в последующих stages пайплайна. cache используется для ускорения повторных запусков (например, зависимостей), а не для передачи между stages."}, {"q": "Как в GitHub Actions правильно получить доступ к секретному токену внутри workflow?", "options": ["Записать токен прямо в yaml файл", "Через контекст secrets.*, например ${{ secrets.API_TOKEN }}", "Передать через аргумент командной строки в открытом виде", "Секреты в GitHub Actions не поддерживаются"], "answer": 1, "explain": "GitHub Actions хранит секреты в настройках репозитория и предоставляет доступ к ним через контекст secrets, значения при этом маскируются в логах выполнения."}, {"q": "В чём преимущество использования HashiCorp Vault для секретов в CI/CD по сравнению со статичными encrypted variables?", "options": ["Vault работает быстрее", "Vault поддерживает динамические секреты с коротким TTL, снижая риск компрометации", "Vault не требует настройки", "Encrypted variables вообще не подходят для CI/CD"], "answer": 1, "explain": "Vault может выдавать динамические, короткоживущие credentials, которые автоматически истекают, что существенно снижает риск при утечке по сравнению со статичными переменными, действующими бессрочно."}, {"q": "Почему kaniko или buildah предпочтительны для сборки Docker-образов в Kubernetes CI-раннерах по сравнению с обычным docker build?", "options": ["Они собирают образы быстрее в 10 раз", "Они позволяют собирать образы без Docker daemon и без привилегированного root-доступа", "Они поддерживают только Windows-контейнеры", "docker build больше не поддерживается индустрией"], "answer": 1, "explain": "kaniko и buildah — rootless-инструменты, не требующие Docker daemon, что устраняет необходимость давать раннеру привилегированный доступ к Docker socket — существенный риск безопасности в Kubernetes."}, {"q": "В каком стандартном формате CI-системы обычно принимают отчёты о результатах тестов для унифицированного отображения?", "options": ["CSV", "JUnit XML", "YAML", "Markdown"], "answer": 1, "explain": "JUnit XML — де-факто стандартный формат отчётов о тестах, который понимают почти все CI-платформы (Jenkins, GitLab CI, GitHub Actions), позволяя единообразно отображать статистику прохождения тестов."}, {"q": "Что делает параметр expire_in (GitLab CI) или retention-days (GitHub Actions) для артефактов?", "options": ["Ограничивает размер артефакта в мегабайтах", "Определяет время хранения артефакта перед автоматическим удалением", "Задаёт частоту пересборки артефакта", "Шифрует артефакт на указанный срок"], "answer": 1, "explain": "Эти параметры задают retention policy — сколько времени артефакт хранится на сервере CI, после чего автоматически удаляется, что помогает контролировать расход дискового пространства."}, {"q": "Какой ключевой недостаток у blue-green deployment по сравнению с canary release?", "options": ["Blue-green требует двукратный запас ресурсов (два полных окружения одновременно)", "Blue-green невозможно откатить быстро", "Blue-green не поддерживается в Kubernetes", "Blue-green нельзя использовать с базами данных"], "answer": 0, "explain": "Blue-green требует одновременного существования двух полноценных сред (текущей и новой), что удваивает потребление ресурсов на время деплоя, в отличие от canary, где новая версия сначала занимает лишь малую долю ресурсов."}, {"q": "В чём заключается принцип работы GitOps-контроллеров, таких как ArgoCD или Flux?", "options": ["CI-пайплайн сам выполняет kubectl apply в кластер (push-модель)", "Агент внутри кластера сам подтягивает изменения из Git и приводит состояние кластера в соответствие (pull-модель)", "Изменения применяются только вручную администратором кластера", "GitOps работает исключительно с виртуальными машинами, не с Kubernetes"], "answer": 1, "explain": "GitOps-инструменты (ArgoCD, Flux) используют pull-модель: контроллер внутри кластера сам сравнивает состояние с Git-репозиторием и синхронизирует его, а не CI-пайплайн push-ем меняет кластер напрямую."}], "id": 6, "pi": 2}, {"phase": "Phase 3 — CI/CD + Terraform + Ansible", "section": "🏗️ Terraform", "topics": [{"title": "HCL синтаксис: resource, variable, output, locals, data", "level": "🟢 Junior", "explanation": "<p>HCL (HashiCorp Configuration Language) — декларативный язык, на котором пишутся Terraform-конфигурации. Основные блоки: <strong>resource<\/strong> описывает объект инфраструктуры, <strong>variable<\/strong> задаёт входной параметр, <strong>output<\/strong> экспортирует значение после apply, <strong>locals<\/strong> хранит промежуточные вычисления, а <strong>data<\/strong> читает существующие ресурсы без управления ими.<\/p><pre><code>variable \"env\" {\n  type    = string\n  default = \"dev\"\n}\n\nlocals {\n  name_prefix = \"myapp-${var.env}\"\n}\n\ndata \"aws_ami\" \"ubuntu\" {\n  most_recent = true\n  owners      = [\"099720109477\"]\n}\n\nresource \"aws_instance\" \"web\" {\n  ami           = data.aws_ami.ubuntu.id\n  instance_type = \"t3.micro\"\n  tags = { Name = local.name_prefix }\n}\n\noutput \"instance_id\" {\n  value = aws_instance.web.id\n}<\/code><\/pre><p>Каждый <code>resource<\/code> и <code>data<\/code> имеет тип и локальное имя (например, <code>aws_instance.web<\/code>), по которым к нему можно обращаться из других блоков через точечную нотацию.<\/p><ul><li><strong>resource<\/strong> — создаёт/изменяет/удаляет реальный объект.<\/li><li><strong>data<\/strong> — только читает.<\/li><li><strong>locals<\/strong> — не принимает значения снаружи, вычисляется внутри конфигурации.<\/li><\/ul><p>Понимание этих пяти блоков — фундамент для любой Terraform-конфигурации, независимо от провайдера.<\/p>"}, {"title": "Провайдеры: provider блок, версионирование, required_providers", "level": "🟢 Junior", "explanation": "<p>Провайдер — плагин, транслирующий HCL-код в вызовы API конкретной платформы (AWS, GCP, Azure, Docker и др.). Блок <code>required_providers<\/code> внутри <code>terraform {}<\/code> задаёт источник и версию плагина, а блок <strong>provider<\/strong> настраивает его (регион, credentials, алиасы).<\/p><pre><code>terraform {\n  required_version = \">= 1.5.0\"\n  required_providers {\n    aws = {\n      source  = \"hashicorp/aws\"\n      version = \"~> 5.0\"\n    }\n  }\n}\n\nprovider \"aws\" {\n  region = \"eu-central-1\"\n}\n\nprovider \"aws\" {\n  alias  = \"us\"\n  region = \"us-east-1\"\n}<\/code><\/pre><p>Версионирование критично: без ограничения <code>terraform init<\/code> может подтянуть новую major-версию с breaking changes. Оператор <code>~><\/code> (&quot;pessimistic constraint&quot;) фиксирует major/minor и допускает только патчи.<\/p><table><tr><th>Синтаксис<\/th><th>Значение<\/th><\/tr><tr><td>= 5.0.0<\/td><td>точная версия<\/td><\/tr><tr><td>&gt;= 5.0<\/td><td>любая версия не ниже<\/td><\/tr><tr><td>~&gt; 5.0<\/td><td>5.x, но не 6.0<\/td><\/tr><\/table><p>Несколько конфигураций одного провайдера с разными настройками различаются через <code>alias<\/code>, что удобно для мультирегионных или мультиаккаунтных деплоев.<\/p>"}, {"title": "Workflow: init, plan, apply, destroy, show, state list", "level": "🟢 Junior", "explanation": "<p>Стандартный жизненный цикл работы с Terraform состоит из нескольких последовательных команд.<\/p><ul><li><code>terraform init<\/code> — скачивает провайдеры и модули, инициализирует backend.<\/li><li><code>terraform plan<\/code> — строит план изменений (diff между кодом и текущим state), не применяя их.<\/li><li><code>terraform apply<\/code> — применяет план, создавая/изменяя/удаляя реальные ресурсы.<\/li><li><code>terraform destroy<\/code> — удаляет все ресурсы, управляемые данной конфигурацией.<\/li><li><code>terraform show<\/code> — выводит содержимое state или сохранённого плана в читаемом виде.<\/li><li><code>terraform state list<\/code> — показывает список всех ресурсов в state.<\/li><\/ul><pre><code>terraform init\nterraform plan -out=tfplan\nterraform apply tfplan\nterraform state list\n# aws_instance.web\n# aws_vpc.main\nterraform show\nterraform destroy<\/code><\/pre><p>Использование <code>-out<\/code> в plan и передача файла в apply гарантирует, что применяется именно проверенный план, а не пересчитанный &quot;на лету&quot; (что важно при параллельной работе команды).<\/p><p><strong>Важно:<\/strong> <code>destroy<\/code> — безвозвратная операция, в проде её обычно защищают через <code>prevent_destroy<\/code> или ручное подтверждение в CI/CD.<\/p>"}, {"title": "State file: tfstate, что хранит, state locking", "level": "🟢 Junior", "explanation": "<p>Файл <code>terraform.tfstate<\/code> — это JSON-документ, в котором Terraform хранит соответствие между ресурсами в коде и реальными объектами в облаке (ID, атрибуты, метаданные, зависимости). Без state Terraform не может понять, что уже создано, и будет пытаться создавать ресурсы заново.<\/p><pre><code>{\n  \"version\": 4,\n  \"resources\": [\n    {\n      \"type\": \"aws_instance\",\n      \"name\": \"web\",\n      \"instances\": [{ \"attributes\": { \"id\": \"i-0abc123\" } }]\n    }\n  ]\n}<\/code><\/pre><p>State может содержать <strong>чувствительные данные<\/strong> (пароли, ключи), поэтому его нельзя коммитить в открытый Git-репозиторий — рекомендуется удалённый backend с шифрованием.<\/p><p><strong>State locking<\/strong> предотвращает одновременное изменение state двумя людьми/процессами: при запуске apply создаётся лок (например, запись в DynamoDB для S3-backend), и второй процесс будет ждать или получит ошибку.<\/p><ul><li>Локальный state (<code>terraform.tfstate<\/code> на диске) — только для обучения/личных проектов.<\/li><li>Потеря или ручное редактирование state — частая причина серьёзных инцидентов.<\/li><li>Команды <code>terraform state mv/rm/pull/push<\/code> позволяют управлять state вручную при необходимости.<\/li><\/ul>"}, {"title": "Базовые ресурсы AWS: VPC, subnet, EC2, security group, IAM role", "level": "🟢 Junior", "explanation": "<p>Типовой набор AWS-ресурсов, с которого начинается почти любая инфраструктура: сеть, вычисления и права доступа.<\/p><pre><code>resource \"aws_vpc\" \"main\" {\n  cidr_block = \"10.0.0.0/16\"\n}\n\nresource \"aws_subnet\" \"public\" {\n  vpc_id            = aws_vpc.main.id\n  cidr_block        = \"10.0.1.0/24\"\n  availability_zone = \"eu-central-1a\"\n}\n\nresource \"aws_security_group\" \"web_sg\" {\n  vpc_id = aws_vpc.main.id\n  ingress {\n    from_port   = 22\n    to_port     = 22\n    protocol    = \"tcp\"\n    cidr_blocks = [\"0.0.0.0/0\"]\n  }\n}\n\nresource \"aws_iam_role\" \"ec2_role\" {\n  name = \"ec2-role\"\n  assume_role_policy = jsonencode({\n    Version = \"2012-10-17\",\n    Statement = [{ Effect = \"Allow\", Principal = { Service = \"ec2.amazonaws.com\" }, Action = \"sts:AssumeRole\" }]\n  })\n}\n\nresource \"aws_instance\" \"web\" {\n  ami                    = \"ami-0123456789\"\n  instance_type          = \"t3.micro\"\n  subnet_id              = aws_subnet.public.id\n  vpc_security_group_ids = [aws_security_group.web_sg.id]\n}<\/code><\/pre><p><strong>VPC<\/strong> — изолированная сеть, <strong>subnet<\/strong> — её сегмент в конкретной AZ, <strong>security group<\/strong> — виртуальный firewall на уровне инстанса, <strong>IAM role<\/strong> — набор прав, который EC2 может &quot;принять&quot; вместо хранения статичных ключей.<\/p><p>Связывание ресурсов через ссылки (<code>aws_vpc.main.id<\/code>) автоматически формирует граф зависимостей — Terraform сам определяет порядок создания.<\/p>"}, {"title": "Remote backend: S3 + DynamoDB lock или Terraform Cloud", "level": "🟡 Middle", "explanation": "<p>Remote backend хранит state вне локальной машины — это обязательно для командной работы. Самая распространённая связка в AWS: <strong>S3<\/strong> для самого файла state и <strong>DynamoDB<\/strong> для локов (state locking), предотвращающих гонки при одновременном apply.<\/p><pre><code>terraform {\n  backend \"s3\" {\n    bucket         = \"my-tfstate-bucket\"\n    key            = \"prod/network.tfstate\"\n    region         = \"eu-central-1\"\n    dynamodb_table = \"terraform-locks\"\n    encrypt        = true\n  }\n}<\/code><\/pre><p>Альтернатива — <strong>Terraform Cloud/Enterprise<\/strong>, который берёт на себя state, локи, историю run'ов, политики (Sentinel) и веб-UI для review плана перед apply, без необходимости поднимать свою инфраструктуру для backend.<\/p><table><tr><th>Backend<\/th><th>Плюсы<\/th><\/tr><tr><td>S3 + DynamoDB<\/td><td>дешево, полный контроль, знакомая AWS-инфраструктура<\/td><\/tr><tr><td>Terraform Cloud<\/td><td>UI, RBAC, policy as code, run history &quot;из коробки&quot;<\/td><\/tr><\/table><p>После смены backend нужно выполнить <code>terraform init -migrate-state<\/code>, чтобы перенести существующий state на новое хранилище без потери данных.<\/p>"}, {"title": "Модули: создание, source, версионирование, reusability", "level": "🟡 Middle", "explanation": "<p>Модуль — это переиспользуемый набор ресурсов, оформленный как отдельная директория с <code>.tf<\/code>-файлами. Любая конфигурация Terraform уже является модулем (root module), а вложенные модули подключаются через блок <strong>module<\/strong>.<\/p><pre><code># modules/vpc/main.tf\nvariable \"cidr\" { type = string }\nresource \"aws_vpc\" \"this\" {\n  cidr_block = var.cidr\n}\noutput \"vpc_id\" { value = aws_vpc.this.id }\n\n# root main.tf\nmodule \"network\" {\n  source = \"./modules/vpc\"\n  cidr   = \"10.0.0.0/16\"\n}\n\nmodule \"network_registry\" {\n  source  = \"terraform-aws-modules/vpc/aws\"\n  version = \"5.5.0\"\n}<\/code><\/pre><p><code>source<\/code> может указывать на локальный путь, Git-репозиторий, Terraform Registry или архив в S3. Для модулей из внешних источников обязательно фиксировать <code>version<\/code>, иначе обновление модуля может незаметно поменять инфраструктуру.<\/p><ul><li>Модули инкапсулируют сложность (VPC, EKS-кластер и т.д.) за простым интерфейсом variables/outputs.<\/li><li>Хорошая практика — публичный <a>Terraform Registry<\/a> для стандартных паттернов (VPC, RDS) и приватные модули для внутренней специфики.<\/li><li>Переиспользование модулей снижает дублирование кода между окружениями.<\/li><\/ul>"}, {"title": "Workspace: dev/staging/prod окружения через workspace", "level": "🟡 Middle", "explanation": "<p>Terraform workspace позволяет управлять несколькими независимыми state в рамках одной конфигурации — например, отдельно для dev, staging и prod, без дублирования кода.<\/p><pre><code>terraform workspace new dev\nterraform workspace new prod\nterraform workspace select dev\nterraform workspace list\n# * dev\n#   prod\n#   default<\/code><\/pre><p>Имя текущего workspace доступно через переменную <code>terraform.workspace<\/code> и часто используется для параметризации ресурсов:<\/p><pre><code>resource \"aws_instance\" \"web\" {\n  instance_type = terraform.workspace == \"prod\" ? \"t3.large\" : \"t3.micro\"\n  tags = { Env = terraform.workspace }\n}<\/code><\/pre><p>Каждый workspace хранит свой отдельный state-файл (при remote backend — в отдельном префиксе/key).<\/p><p><strong>Ограничение:<\/strong> workspace хорошо подходят, когда окружения почти идентичны по структуре. Если dev и prod сильно различаются (разные регионы, разные модули), часто предпочитают отдельные директории/конфигурации вместо workspace — это даёт больше гибкости и явности в code review.<\/p>"}, {"title": "count и for_each: динамическое создание ресурсов", "level": "🟡 Middle", "explanation": "<p><strong>count<\/strong> и <strong>for_each<\/strong> позволяют создавать несколько экземпляров одного ресурса без копирования кода. <code>count<\/code> использует числовой индекс, <code>for_each<\/code> — множество или карту (map/set), что даёт более стабильные и предсказуемые адреса ресурсов при изменении состава.<\/p><pre><code>resource \"aws_instance\" \"web\" {\n  count         = 3\n  ami           = \"ami-0123456789\"\n  instance_type = \"t3.micro\"\n  tags = { Name = \"web-${count.index}\" }\n}\n\nvariable \"subnets\" {\n  default = {\n    a = \"10.0.1.0/24\"\n    b = \"10.0.2.0/24\"\n  }\n}\n\nresource \"aws_subnet\" \"this\" {\n  for_each          = var.subnets\n  vpc_id            = aws_vpc.main.id\n  cidr_block        = each.value\n  availability_zone = \"eu-central-1${each.key}\"\n}<\/code><\/pre><p>Проблема <code>count<\/code>: если удалить элемент из середины списка, Terraform может пересоздать все последующие ресурсы (сдвиг индексов). <code>for_each<\/code> с картой избегает этой проблемы, так как ресурсы адресуются по ключу (<code>aws_subnet.this[\"a\"]<\/code>), а не по позиции.<\/p><table><tr><th>Механизм<\/th><th>Когда использовать<\/th><\/tr><tr><td>count<\/td><td>простое повторение N одинаковых объектов<\/td><\/tr><tr><td>for_each<\/td><td>набор объектов с уникальными атрибутами/именами<\/td><\/tr><\/table>"}, {"title": "Dynamic blocks: вложенные блоки с for_each", "level": "🟡 Middle", "explanation": "<p><strong>Dynamic block<\/strong> генерирует повторяющиеся вложенные блоки внутри ресурса (например, несколько <code>ingress<\/code> правил в security group) на основе списка или карты, вместо того чтобы прописывать каждый блок вручную.<\/p><pre><code>variable \"ingress_rules\" {\n  default = [\n    { port = 22, cidr = \"10.0.0.0/16\" },\n    { port = 443, cidr = \"0.0.0.0/0\" }\n  ]\n}\n\nresource \"aws_security_group\" \"web\" {\n  name   = \"web-sg\"\n  vpc_id = aws_vpc.main.id\n\n  dynamic \"ingress\" {\n    for_each = var.ingress_rules\n    content {\n      from_port   = ingress.value.port\n      to_port     = ingress.value.port\n      protocol    = \"tcp\"\n      cidr_blocks = [ingress.value.cidr]\n    }\n  }\n}<\/code><\/pre><p>Внутри <code>content<\/code> текущий элемент доступен через имя блока (<code>ingress.value<\/code>, <code>ingress.key<\/code>) — по аналогии с <code>each<\/code> в <code>for_each<\/code> на уровне ресурса.<\/p><ul><li>Полезно для security groups, IAM policy statements, tags-блоков с переменным количеством элементов.<\/li><li>Не стоит использовать dynamic block для фиксированного и небольшого набора полей — это усложняет чтение кода без явной выгоды.<\/li><\/ul>"}, {"title": "terraform import: добавить существующий ресурс в state", "level": "🟡 Middle", "explanation": "<p><code>terraform import<\/code> позволяет &quot;взять под управление&quot; Terraform ресурс, который уже существует в облаке, но был создан вручную (через консоль, CLI или другой инструмент), без его пересоздания.<\/p><pre><code># 1. Описать ресурс в коде (пустой блок допустим)\nresource \"aws_instance\" \"web\" {\n  # атрибуты добавим после импорта\n}\n\n# 2. Импортировать реальный объект в state\nterraform import aws_instance.web i-0abc123def456\n\n# 3. Проверить план — не должно быть diff\nterraform plan<\/code><\/pre><p>После импорта state содержит атрибуты ресурса, но конфигурация в <code>.tf<\/code>-файле нужно дополнить вручную (обычно через <code>terraform show<\/code>), чтобы <code>plan<\/code> не показывал расхождений — иначе следующий apply попытается &quot;исправить&quot; ресурс под неполный код.<\/p><p>В Terraform 1.5+ появился декларативный блок <strong>import<\/strong>, который делает то же самое прямо в коде, без отдельной CLI-команды:<\/p><pre><code>import {\n  to = aws_instance.web\n  id = \"i-0abc123def456\"\n}<\/code><\/pre><p>Импорт — типичный шаг при переходе legacy-инфраструктуры на IaC.<\/p>"}, {"title": "Preconditions / postconditions: валидации в коде", "level": "🟡 Middle", "explanation": "<p>Начиная с Terraform 1.2, блоки <strong>precondition<\/strong> и <strong>postcondition<\/strong> позволяют явно проверять предположения о ресурсах и данных прямо в HCL, останавливая apply с понятной ошибкой, если условие нарушено.<\/p><pre><code>data \"aws_ami\" \"ubuntu\" {\n  most_recent = true\n  owners      = [\"099720109477\"]\n\n  lifecycle {\n    postcondition {\n      condition     = self.architecture == \"x86_64\"\n      error_message = \"AMI должен быть x86_64, найдено: ${self.architecture}\"\n    }\n  }\n}\n\nresource \"aws_instance\" \"web\" {\n  instance_type = var.instance_type\n\n  lifecycle {\n    precondition {\n      condition     = contains([\"t3.micro\", \"t3.small\"], var.instance_type)\n      error_message = \"instance_type должен быть t3.micro или t3.small.\"\n    }\n  }\n}<\/code><\/pre><p><strong>precondition<\/strong> проверяется до создания/изменения ресурса, <strong>postcondition<\/strong> — после, на основе фактических атрибутов (<code>self<\/code>).<\/p><p>Это дополняет <code>variable { validation {} }<\/code>, но работает на уровне ресурсов и data source, а не только входных переменных, позволяя ловить логические ошибки (неверный AMI, недопустимая зона доступности) до применения в продакшене.<\/p>"}, {"title": "tflint, terraform validate, terraform fmt: качество кода", "level": "🟡 Middle", "explanation": "<p>Три инструмента для поддержания качества Terraform-кода, обычно встроенные в pre-commit хуки и CI pipeline.<\/p><ul><li><code>terraform fmt<\/code> — приводит код к каноническому стилю форматирования (отступы, выравнивание знаков =).<\/li><li><code>terraform validate<\/code> — проверяет синтаксическую корректность и внутреннюю согласованность конфигурации (без обращения к провайдеру за реальным state).<\/li><li><strong>tflint<\/strong> — линтер, который находит проблемы, невидимые для validate: неиспользуемые переменные, устаревшие типы инстансов, ошибки специфичные для провайдера (через плагины, например tflint-ruleset-aws).<\/li><\/ul><pre><code>terraform fmt -recursive -check\nterraform validate\n\ntflint --init\ntflint --recursive<\/code><\/pre><p>Типичный шаг CI-pipeline:<\/p><pre><code>stage: lint\nscript:\n  - terraform fmt -check -recursive\n  - terraform init -backend=false\n  - terraform validate\n  - tflint --recursive<\/code><\/pre><table><tr><th>Инструмент<\/th><th>Что проверяет<\/th><\/tr><tr><td>fmt<\/td><td>стиль/форматирование<\/td><\/tr><tr><td>validate<\/td><td>синтаксис, типы, ссылки<\/td><\/tr><tr><td>tflint<\/td><td>best practices, provider-специфичные ошибки<\/td><\/tr><\/table><p>Эти проверки должны блокировать merge request при провале — это дешёвый способ отловить ошибки до terraform plan/apply.<\/p>"}], "quiz": [{"q": "Какой блок HCL используется только для чтения существующего ресурса без управления им?", "options": ["resource", "data", "locals", "module"], "answer": 1, "explain": "Блок data выполняет только чтение информации о существующем объекте, в отличие от resource, который создаёт и управляет ресурсом."}, {"q": "Что делает ограничение версии провайдера '~> 5.0'?", "options": ["Разрешает любую версию 5.x, кроме 6.0", "Требует точно версию 5.0.0", "Запрещает версии выше 5.0.0", "Разрешает только версии ниже 5.0"], "answer": 0, "explain": "Оператор ~> (pessimistic constraint) фиксирует старшую часть версии и допускает обновления только в пределах патчей/минорных версий."}, {"q": "Какая команда применяет ранее сохранённый план из файла tfplan?", "options": ["terraform apply", "terraform apply tfplan", "terraform plan -apply tfplan", "terraform show tfplan"], "answer": 1, "explain": "terraform apply с указанием файла плана (tfplan) применяет именно тот проверенный план, а не пересчитывает его заново."}, {"q": "Зачем нужен DynamoDB при использовании S3 как backend для state?", "options": ["Для хранения самого файла state", "Для кеширования плана", "Для реализации state locking", "Для хранения переменных окружения"], "answer": 2, "explain": "DynamoDB используется для блокировки state (state locking), предотвращая одновременное изменение state несколькими процессами."}, {"q": "В чём ключевое отличие for_each от count при создании нескольких ресурсов?", "options": ["for_each работает только с числами", "count поддерживает карты (map), а for_each — нет", "for_each адресует ресурсы по ключу, что устойчивее к изменению состава списка", "count быстрее выполняется всегда"], "answer": 2, "explain": "for_each использует уникальные ключи вместо числовых индексов, поэтому удаление элемента из середины набора не вызывает пересоздание остальных ресурсов, как может произойти с count."}, {"q": "Что позволяет сделать dynamic block в Terraform?", "options": ["Динамически менять provider во время apply", "Генерировать повторяющиеся вложенные блоки внутри ресурса на основе for_each", "Создавать динамические переменные окружения", "Автоматически обновлять state без lock"], "answer": 1, "explain": "dynamic block генерирует набор вложенных блоков (например, ingress-правил) на основе коллекции, избегая ручного дублирования кода."}, {"q": "Что делает terraform import?", "options": ["Импортирует модуль из Terraform Registry", "Добавляет существующий облачный ресурс в state без его пересоздания", "Импортирует переменные из файла .tfvars", "Копирует state из одного workspace в другой"], "answer": 1, "explain": "terraform import связывает уже существующий в облаке объект с ресурсом, описанным в конфигурации, записывая его в state без создания заново."}, {"q": "Когда срабатывает precondition в блоке lifecycle?", "options": ["После создания ресурса, на основе его фактических атрибутов", "До создания или изменения ресурса, до обращения к провайдеру", "Только во время terraform destroy", "Только при выполнении terraform fmt"], "answer": 1, "explain": "precondition проверяется до применения изменений к ресурсу, тогда как postcondition проверяется после, на основе self (фактических атрибутов)."}, {"q": "Какой инструмент находит provider-специфичные проблемы (например, устаревший тип инстанса), которые не видит terraform validate?", "options": ["terraform fmt", "tflint", "terraform show", "terraform state list"], "answer": 1, "explain": "tflint — линтер с плагинами под конкретных провайдеров, который ловит семантические и best-practice проблемы, невидимые для стандартного validate."}, {"q": "Для чего используется terraform.workspace в коде ресурса?", "options": ["Для указания версии Terraform CLI", "Для получения имени текущего workspace и параметризации ресурсов по окружению", "Для смены backend без миграции state", "Для запуска terraform apply в фоне"], "answer": 1, "explain": "Переменная terraform.workspace возвращает имя активного workspace (например, dev или prod), что позволяет менять параметры ресурсов в зависимости от окружения без дублирования кода."}], "id": 7, "pi": 2}, {"phase": "Phase 3 — CI/CD + Terraform + Ansible", "section": "🤖 Ansible", "topics": [{"title": "Архитектура: control node, managed nodes, агентless через SSH", "level": "🟢 Junior", "explanation": "<p>Ansible — <strong>агентless<\/strong> система управления конфигурацией: на управляемых узлах (<em>managed nodes<\/em>) не нужно устанавливать никакого фонового процесса. Вся логика выполняется с <strong>control node<\/strong> — машины, где установлен Ansible, — а связь с удалёнными хостами идёт по обычному <strong>SSH<\/strong> (для Windows — WinRM). Это упрощает эксплуатацию: достаточно Python на управляемом узле и SSH-доступа с ключом.<\/p>\n<p>Control node читает inventory (список хостов), подключается по SSH, копирует небольшие Python-модули на целевую машину, выполняет их и удаляет после выполнения. Так достигается идемпотентность и отсутствие постоянного сетевого демона, как у Puppet или Chef.<\/p>\n<pre><code># Проверка связи с узлами через ad-hoc команду\nansible all -m ping -i inventory.ini<\/code><\/pre>\n<p>Минимальные требования к managed node:<\/p>\n<ul><li>Python 3.x<\/li><li>SSH-сервер и доступ по ключу или паролю<\/li><li>Достаточные права (обычно через sudo)<\/li><\/ul>\n<table><tr><th>Компонент<\/th><th>Роль<\/th><\/tr>\n<tr><td>Control node<\/td><td>запускает playbook, хранит inventory и конфиг<\/td><\/tr>\n<tr><td>Managed node<\/td><td>получает модули по SSH и исполняет их<\/td><\/tr>\n<tr><td>Inventory<\/td><td>описывает, какие хосты управляются<\/td><\/tr><\/table>\n<p>Такая архитектура делает Ansible простым для старта и удобным для CI/CD пайплайнов, где control node — это runner.<\/p>"}, {"title": "Inventory: hosts файл, INI и YAML форматы, группы", "level": "🟢 Junior", "explanation": "<p><strong>Inventory<\/strong> — это список хостов, которыми управляет Ansible, с возможностью группировки. По умолчанию используется файл <code>/etc/ansible/hosts<\/code>, но обычно указывают свой через <code>-i<\/code>.<\/p>\n<p>INI-формат:<\/p>\n<pre><code>[web]\nweb1.example.com\nweb2.example.com ansible_user=deploy\n\n[db]\ndb1.example.com\n\n[prod:children]\nweb\ndb<\/code><\/pre>\n<p>Тот же inventory в YAML:<\/p>\n<pre><code>all:\n  children:\n    web:\n      hosts:\n        web1.example.com:\n        web2.example.com:\n          ansible_user: deploy\n    db:\n      hosts:\n        db1.example.com:<\/code><\/pre>\n<p>Группы позволяют применять playbook к части инфраструктуры (<code>hosts: web<\/code>), а группы групп (<code>prod:children<\/code>) — строить иерархию окружений.<\/p>\n<ul><li><strong>ansible_host<\/strong> — реальный IP/DNS, если отличается от имени<\/li><li><strong>ansible_user<\/strong> — пользователь для SSH<\/li><li><strong>ansible_port<\/strong> — нестандартный SSH-порт<\/li><\/ul>\n<p>Проверить итоговый список хостов:<\/p>\n<pre><code>ansible-inventory -i inventory.yml --list<\/code><\/pre>\n<p>Для больших окружений статический inventory заменяют на <strong>dynamic inventory<\/strong> (см. отдельную тему).<\/p>"}, {"title": "Ad-hoc: ansible all -m ping, -m shell, -m copy -a \"src= dest=\"", "level": "🟢 Junior", "explanation": "<p><strong>Ad-hoc команды<\/strong> — быстрый способ выполнить одну задачу на группе хостов без написания playbook. Формат: <code>ansible &lt;pattern&gt; -m &lt;module&gt; -a &lt;args&gt;<\/code>.<\/p>\n<pre><code># Проверка доступности всех хостов\nansible all -m ping -i inventory.ini\n\n# Выполнение shell-команды\nansible web -m shell -a 'uptime'\n\n# Копирование файла\nansible web -m copy -a 'src=./nginx.conf dest=/etc/nginx/nginx.conf'<\/code><\/pre>\n<p>Модуль <code>-m ping<\/code> не отправляет ICMP, а проверяет, что Python на узле отвечает и SSH-подключение работает. Модуль <code>shell<\/code> выполняет произвольную команду в оболочке (менее идемпотентно, использовать только когда нет готового модуля). Модуль <code>copy<\/code> — предпочтительный способ передать файл, так как он проверяет контрольную сумму и не переписывает файл без изменений.<\/p>\n<ul><li><code>-b<\/code> — выполнить с sudo (become)<\/li><li><code>-u user<\/code> — указать SSH-пользователя<\/li><li><code>-f 10<\/code> — количество параллельных forks<\/li><\/ul>\n<p>Ad-hoc удобны для разовых операций: перезапуск сервиса, проверка версии пакета, быстрый патч. Для повторяемой автоматизации используют playbook.<\/p>"}, {"title": "Playbook: структура (---), hosts, tasks, handlers, notify", "level": "🟢 Junior", "explanation": "<p><strong>Playbook<\/strong> — YAML-файл, описывающий набор задач (<em>plays<\/em>), выполняемых на группах хостов. Начинается с <code>---<\/code> (маркер YAML-документа).<\/p>\n<pre><code>---\n- name: Настройка веб-сервера\n  hosts: web\n  become: true\n  tasks:\n    - name: Установить nginx\n      apt:\n        name: nginx\n        state: present\n\n    - name: Скопировать конфиг\n      template:\n        src: nginx.conf.j2\n        dest: /etc/nginx/nginx.conf\n      notify: Restart nginx\n\n  handlers:\n    - name: Restart nginx\n      service:\n        name: nginx\n        state: restarted<\/code><\/pre>\n<p>Ключевые элементы:<\/p>\n<ul><li><code>hosts<\/code> — на каких хостах/группах выполнять play<\/li><li><code>tasks<\/code> — список задач, выполняются последовательно и идемпотентно<\/li><li><code>handlers<\/code> — задачи, вызываемые через <code>notify<\/code>, срабатывают <strong>один раз в конце play<\/strong>, даже если notify пришёл несколько раз<\/li><li><code>become<\/code> — эскалация привилегий (sudo)<\/li><\/ul>\n<p>Запуск: <code>ansible-playbook -i inventory.yml site.yml<\/code>. Handler запускается только если задача действительно изменила состояние (<code>changed<\/code>), что критично для идемпотентности — например, nginx перезапускается только при реальном изменении конфига.<\/p>"}, {"title": "Модули: apt/yum, copy, template, service, systemd, user, file, git", "level": "🟢 Junior", "explanation": "<p>Модули — это строительные блоки задач Ansible. Каждый модуль решает конкретную задачу декларативно и стремится к идемпотентности.<\/p>\n<table><tr><th>Модуль<\/th><th>Назначение<\/th><\/tr>\n<tr><td>apt / yum<\/td><td>управление пакетами Debian/RHEL<\/td><\/tr>\n<tr><td>copy<\/td><td>копирование статичного файла<\/td><\/tr>\n<tr><td>template<\/td><td>рендер Jinja2-шаблона и копирование<\/td><\/tr>\n<tr><td>service / systemd<\/td><td>управление сервисами (start/stop/enable)<\/td><\/tr>\n<tr><td>user<\/td><td>создание/удаление пользователей<\/td><\/tr>\n<tr><td>file<\/td><td>права, владелец, тип файла/директории<\/td><\/tr>\n<tr><td>git<\/td><td>клонирование/обновление репозитория<\/td><\/tr><\/table>\n<pre><code>- name: Установить пакет\n  apt:\n    name: htop\n    state: latest\n    update_cache: true\n\n- name: Создать пользователя deploy\n  user:\n    name: deploy\n    shell: /bin/bash\n    groups: sudo\n    append: true\n\n- name: Клонировать репозиторий\n  git:\n    repo: 'https://github.com/example/app.git'\n    dest: /opt/app\n    version: main\n\n- name: Убедиться, что сервис запущен и включён\n  systemd:\n    name: nginx\n    state: started\n    enabled: true<\/code><\/pre>\n<p>Практика: использовать специализированный модуль вместо <code>shell<\/code>/<code>command<\/code>, где возможно — так задача остаётся идемпотентной и понятной в отчёте <code>changed/ok<\/code>.<\/p>"}, {"title": "Переменные: vars, vars_files, group_vars/, host_vars/, register", "level": "🟢 Junior", "explanation": "<p>Ansible поддерживает несколько источников переменных с разным приоритетом. Базовые способы:<\/p>\n<pre><code># Прямо в playbook\n- hosts: web\n  vars:\n    app_port: 8080\n  tasks:\n    - name: Показать порт\n      debug:\n        msg: 'Порт: {{ app_port }}'<\/code><\/pre>\n<p>Файл переменных подключается через <code>vars_files<\/code>:<\/p>\n<pre><code>vars_files:\n  - vars/common.yml<\/code><\/pre>\n<p>Каталоги <strong>group_vars/<\/strong> и <strong>host_vars/<\/strong> подхватываются автоматически по имени группы/хоста из inventory:<\/p>\n<pre><code>group_vars/\n  web.yml       # применяется ко всем хостам группы \"web\"\n  all.yml       # ко всем хостам\nhost_vars/\n  web1.example.com.yml   # только к этому хосту<\/code><\/pre>\n<p><strong>register<\/strong> сохраняет результат выполнения задачи в переменную для использования далее:<\/p>\n<pre><code>- name: Проверить версию nginx\n  command: nginx -v\n  register: nginx_version\n\n- name: Показать результат\n  debug:\n    var: nginx_version.stderr<\/code><\/pre>\n<p>Порядок приоритета (упрощённо, от низшего к высшему): <code>role defaults<\/code> → <code>group_vars/all<\/code> → <code>group_vars/&lt;group&gt;<\/code> → <code>host_vars<\/code> → <code>vars<\/code> в play → <code>-e<\/code> в командной строке (наивысший приоритет).<\/p>"}, {"title": "Idempotency: понимание и проектирование идемпотентных задач", "level": "🟢 Junior", "explanation": "<p><strong>Идемпотентность<\/strong> означает: повторный запуск playbook с тем же состоянием системы не приводит к изменениям, а статус задачи — <code>ok<\/code>, а не <code>changed<\/code>. Это ключевой принцип Ansible — playbook можно безопасно запускать многократно, и он приведёт систему к желаемому состоянию, а не будет каждый раз \"выполнять действие\".<\/p>\n<p>Пример неидемпотентной задачи:<\/p>\n<pre><code>- name: Добавить строку в файл (плохо)\n  shell: echo 'export PATH=$PATH:/opt/bin' >> /etc/profile<\/code><\/pre>\n<p>Каждый запуск добавляет новую строку. Правильная идемпотентная альтернатива:<\/p>\n<pre><code>- name: Добавить строку в файл (хорошо)\n  lineinfile:\n    path: /etc/profile\n    line: 'export PATH=$PATH:/opt/bin'\n    state: present<\/code><\/pre>\n<p>Модуль <code>lineinfile<\/code> сам проверяет, есть ли строка, и не дублирует её. Аналогично <code>apt: state=present<\/code> не переустанавливает пакет, если он уже установлен нужной версии.<\/p>\n<ul><li>Используйте декларативные модули (<code>file<\/code>, <code>copy<\/code>, <code>template<\/code>, <code>apt<\/code>) вместо <code>shell<\/code>/<code>command<\/code><\/li><li>Если без <code>shell<\/code> не обойтись — добавляйте <code>creates<\/code>/<code>removes<\/code> или <code>changed_when<\/code><\/li><li>Проверяйте idempotency через двойной запуск: второй прогон должен показать 0 <code>changed<\/code><\/li><\/ul>"}, {"title": "Jinja2 шаблоны: {{ var }}, {% if %}, {% for %} в .j2 файлах", "level": "🟡 Middle", "explanation": "<p><strong>Jinja2<\/strong> — шаблонизатор, который Ansible использует для генерации конфигурационных файлов из переменных. Файлы шаблонов имеют расширение <code>.j2<\/code> и обрабатываются модулем <code>template<\/code>.<\/p>\n<pre><code># nginx.conf.j2\nserver {\n    listen {{ app_port }};\n    server_name {{ server_name }};\n\n    {% if enable_ssl %}\n    ssl_certificate {{ ssl_cert_path }};\n    ssl_certificate_key {{ ssl_key_path }};\n    {% endif %}\n\n    location / {\n        proxy_pass http://backend;\n    }\n}\n\nupstream backend {\n    {% for host in backend_hosts %}\n    server {{ host }}:8080;\n    {% endfor %}\n}<\/code><\/pre>\n<p>Задача, которая рендерит шаблон:<\/p>\n<pre><code>- name: Сгенерировать nginx.conf\n  template:\n    src: nginx.conf.j2\n    dest: /etc/nginx/nginx.conf\n  notify: Restart nginx<\/code><\/pre>\n<p>Полезные фильтры Jinja2 в Ansible:<\/p>\n<ul><li><code>{{ var | default('значение') }}<\/code> — значение по умолчанию<\/li><li><code>{{ list | join(',') }}<\/code> — объединение списка в строку<\/li><li><code>{{ var | upper }}<\/code>, <code>{{ var | lower }}<\/code><\/li><li><code>{{ my_dict | to_json }}<\/code><\/li><\/ul>\n<p>Модуль <code>template<\/code> — идемпотентен: файл переписывается только при реальном изменении содержимого (сравнивается контрольная сумма).<\/p>"}, {"title": "Roles: структура (tasks/ handlers/ templates/ vars/ defaults/)", "level": "🟡 Middle", "explanation": "<p><strong>Role<\/strong> — стандартизированный способ упаковать связанные задачи, шаблоны, переменные и обработчики в переиспользуемый модуль. Структура создаётся командой <code>ansible-galaxy init &lt;role_name&gt;<\/code>:<\/p>\n<pre><code>roles/nginx/\n├── tasks/main.yml       # основные задачи\n├── handlers/main.yml    # обработчики (notify)\n├── templates/           # .j2 шаблоны\n├── files/                # статические файлы\n├── vars/main.yml         # переменные с высоким приоритетом\n├── defaults/main.yml     # переменные по умолчанию (низший приоритет)\n└── meta/main.yml         # зависимости от других ролей<\/code><\/pre>\n<p>Пример <code>tasks/main.yml<\/code>:<\/p>\n<pre><code>- name: Установить nginx\n  apt:\n    name: nginx\n    state: present\n\n- name: Развернуть конфиг\n  template:\n    src: nginx.conf.j2\n    dest: /etc/nginx/nginx.conf\n  notify: Restart nginx<\/code><\/pre>\n<p>Использование роли в playbook:<\/p>\n<pre><code>- hosts: web\n  roles:\n    - nginx\n    - { role: app, app_version: \"1.2.0\" }<\/code><\/pre>\n<p><code>defaults/main.yml<\/code> хранит значения, которые пользователь роли легко переопределяет; <code>vars/main.yml<\/code> — значения, которые менять не рекомендуется. Роли — основа для переиспользования кода между проектами и публикации через Ansible Galaxy.<\/p>"}, {"title": "Loops: loop, with_items, with_dict, with_fileglob", "level": "🟡 Middle", "explanation": "<p>Циклы позволяют выполнить одну задачу для набора значений. Современный синтаксис — <strong>loop<\/strong> (рекомендован вместо устаревших <code>with_*<\/code>):<\/p>\n<pre><code>- name: Установить несколько пакетов\n  apt:\n    name: \"{{ item }}\"\n    state: present\n  loop:\n    - htop\n    - curl\n    - git<\/code><\/pre>\n<p>Цикл по списку словарей:<\/p>\n<pre><code>- name: Создать пользователей\n  user:\n    name: \"{{ item.name }}\"\n    groups: \"{{ item.groups }}\"\n  loop:\n    - { name: 'alice', groups: 'sudo' }\n    - { name: 'bob', groups: 'docker' }<\/code><\/pre>\n<p>Устаревшие, но встречающиеся формы:<\/p>\n<pre><code># Цикл по словарю\n- debug:\n    msg: \"{{ item.key }} = {{ item.value }}\"\n  with_dict: \"{{ my_dict }}\"\n\n# Цикл по файлам, соответствующим шаблону\n- copy:\n    src: \"{{ item }}\"\n    dest: /etc/configs/\n  with_fileglob:\n    - \"configs/*.conf\"<\/code><\/pre>\n<p><code>loop<\/code> с фильтром <code>| dict2items<\/code> заменяет <code>with_dict<\/code> в новых версиях Ansible. Внутри цикла доступна переменная <code>item<\/code>, а <code>loop_control: loop_var: my_item<\/code> позволяет переименовать её для вложенных циклов.<\/p>"}, {"title": "Ansible Vault: encrypt_string, vault файлы, --ask-vault-pass", "level": "🟡 Middle", "explanation": "<p><strong>Ansible Vault<\/strong> — встроенный механизм шифрования секретов (паролей, ключей API, приватных ключей), чтобы безопасно хранить их в Git рядом с playbook.<\/p>\n<p>Зашифровать весь файл переменных:<\/p>\n<pre><code>ansible-vault create secrets.yml\nansible-vault edit secrets.yml\nansible-vault encrypt vars/prod.yml<\/code><\/pre>\n<p>Зашифровать одну строку (удобно для частичного шифрования в обычном YAML):<\/p>\n<pre><code>ansible-vault encrypt_string 'SuperSecretPass123' --name 'db_password'<\/code><\/pre>\n<p>Результат вставляется прямо в playbook или vars-файл:<\/p>\n<pre><code>db_password: !vault |\n  $ANSIBLE_VAULT;1.1;AES256\n  66386439653236386164...<\/code><\/pre>\n<p>Запуск playbook с зашифрованными данными:<\/p>\n<pre><code>ansible-playbook site.yml --ask-vault-pass\n# или через файл с паролем (не хранить в Git!)\nansible-playbook site.yml --vault-password-file ~/.vault_pass.txt<\/code><\/pre>\n<ul><li><code>ansible-vault view file.yml<\/code> — просмотреть без расшифровки на диск<\/li><li><code>ansible-vault rekey file.yml<\/code> — сменить пароль<\/li><li>Несколько vault-паролей поддерживаются через <code>--vault-id<\/code> (для разных окружений: dev/prod)<\/li><\/ul>\n<p>Vault использует AES256 и хранит пароль отдельно от кода — обычно в CI как секретная переменная.<\/p>"}, {"title": "Dynamic inventory: aws_ec2, gcp_compute плагины", "level": "🟡 Middle", "explanation": "<p><strong>Dynamic inventory<\/strong> строит список хостов автоматически из внешнего источника (облачного API), а не из статичного файла — критично для облачных инфраструктур, где IP-адреса и количество инстансов меняются динамически.<\/p>\n<p>Плагин для AWS EC2 (<code>aws_ec2.yml<\/code>):<\/p>\n<pre><code>plugin: amazon.aws.aws_ec2\nregions:\n  - eu-central-1\nfilters:\n  tag:Environment: production\nkeyed_groups:\n  - key: tags.Role\n    prefix: role\ncompose:\n  ansible_host: public_ip_address<\/code><\/pre>\n<p>Запуск с указанием на файл-плагин:<\/p>\n<pre><code>ansible-inventory -i aws_ec2.yml --graph\nansible-playbook -i aws_ec2.yml site.yml --limit role_web<\/code><\/pre>\n<p>Аналогичный плагин для GCP:<\/p>\n<pre><code>plugin: google.cloud.gcp_compute\nprojects:\n  - my-gcp-project\nzones:\n  - europe-west1-b\nauth_kind: serviceaccount\nservice_account_file: /path/to/key.json<\/code><\/pre>\n<p>Преимущества: хосты группируются автоматически по тегам (<code>keyed_groups<\/code>), нет необходимости вручную поддерживать список IP, инвентарь всегда отражает реальное состояние облака. Требуются установленные коллекции (<code>amazon.aws<\/code>, <code>google.cloud<\/code>) и корректные учётные данные (IAM role/ключ).<\/p>"}, {"title": "Error handling: failed_when, ignore_errors, block/rescue/always", "level": "🟡 Middle", "explanation": "<p>Ansible предоставляет несколько механизмов управления ошибками, аналогичных try/catch в языках программирования.<\/p>\n<p><strong>ignore_errors<\/strong> — продолжить play, даже если задача завершилась с ошибкой:<\/p>\n<pre><code>- name: Попытка остановить старый сервис\n  service:\n    name: legacy-app\n    state: stopp

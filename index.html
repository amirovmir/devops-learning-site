ертификаты сроком на 90 дней, поэтому обязательно нужна автоматизация продления.<\/p><p>Получение сертификата с nginx-плагином:<\/p><pre><code>apt install certbot python3-certbot-nginx\ncertbot --nginx -d example.com -d www.example.com<\/code><\/pre><p>Certbot автоматически правит конфиг nginx, добавляя <code>ssl_certificate<\/code> и редирект с 80 на 443. Проверка автопродления:<\/p><pre><code>certbot renew --dry-run<\/code><\/pre><p>Начиная с современных версий certbot сам ставит systemd timer, но полезно понимать, как он выглядит:<\/p><pre><code># /etc/systemd/system/certbot-renew.timer\n[Unit]\nDescription=Certbot renewal timer\n\n[Timer]\nOnCalendar=*-*-* 00,12:00:00\nRandomizedDelaySec=3600\nPersistent=true\n\n[Install]\nWantedBy=timers.target<\/code><\/pre><ul><li>Renewal запускается два раза в день — certbot продлевает сертификат только если осталось меньше 30 дней.<\/li><li><strong>RandomizedDelaySec<\/strong> размывает нагрузку на серверы Let's Encrypt.<\/li><\/ul><p>Проверить статус таймера:<\/p><pre><code>systemctl list-timers | grep certbot<\/code><\/pre><p>Для production рекомендуется настроить hook, который перезагружает nginx после продления: <code>--deploy-hook \"systemctl reload nginx\"<\/code>.<\/p>"}, {"title": "CIS Benchmarks: Linux CIS Benchmark — ключевые пункты", "level": "🟡 Middle", "explanation": "<p>CIS Benchmark — набор общепризнанных рекомендаций по безопасной конфигурации ОС, издаваемый Center for Internet Security. Для Linux он охватывает файловую систему, сервисы, сеть, аудит и права доступа.<\/p><p>Ключевые пункты, которые проверяются чаще всего:<\/p><ul><li>Отдельные точки монтирования для <code>/tmp<\/code>, <code>/var<\/code>, <code>/home<\/code> с флагами <code>noexec<\/code>, <code>nosuid<\/code>, <code>nodev<\/code>.<\/li><li>Отключение неиспользуемых файловых систем и модулей ядра (cramfs, freevxfs).<\/li><li>Настройка <code>umask<\/code> по умолчанию (027 вместо 022).<\/li><li>Обязательный пароль на GRUB, отключение ctrl-alt-del.<\/li><li>Настройка политики паролей через <code>/etc/security/pwquality.conf<\/code>.<\/li><li>Включённый auditd и логирование ключевых событий.<\/li><\/ul><p>Пример правила fstab с hardening-флагами:<\/p><pre><code>/dev/sdb1  /tmp  ext4  defaults,nodev,nosuid,noexec  0 2<\/code><\/pre><p>Для автоматической проверки соответствия используется <strong>OpenSCAP<\/strong> или CIS-CAT:<\/p><pre><code>oscap xccdf eval --profile cis \\\n  --results results.xml \\\n  /usr/share/xml/scap/ssg/content/ssg-ubuntu2204-ds.xml<\/code><\/pre><table><tr><th>Уровень<\/th><th>Описание<\/th><\/tr><tr><td>Level 1<\/td><td>Базовый hardening, минимум влияния на функциональность<\/td><\/tr><tr><td>Level 2<\/td><td>Строгий hardening для высокочувствительных сред<\/td><\/tr><\/table><p>CIS Benchmark часто требуется для соответствия PCI DSS, SOC 2 и внутренним security-политикам компании.<\/p>"}, {"title": "SELinux: modes (enforcing/permissive/disabled), contexts, troubleshoot", "level": "🟡 Middle", "explanation": "<p>SELinux — система мандатного контроля доступа (MAC) в ядре Linux, дополняющая обычные права unix. Она ограничивает процессы даже если они скомпрометированы через уязвимость.<\/p><p>Три режима работы:<\/p><ul><li><strong>enforcing<\/strong> — правила применяются, нарушения блокируются и логируются.<\/li><li><strong>permissive<\/strong> — нарушения только логируются, ничего не блокируется (удобно для отладки).<\/li><li><strong>disabled<\/strong> — SELinux полностью выключен.<\/li><\/ul><p>Проверка и переключение режима:<\/p><pre><code>getenforce\nsetenforce 0        # временно permissive\nsestatus<\/code><\/pre><p>Постоянная настройка в <code>/etc/selinux/config<\/code>:<\/p><pre><code>SELINUX=enforcing\nSELINUXTYPE=targeted<\/code><\/pre><p>Каждому файлу и процессу присваивается контекст вида <code>user:role:type:level<\/code>:<\/p><pre><code>ls -Z /var/www/html\nchcon -t httpd_sys_content_t /var/www/html/index.html\nrestorecon -Rv /var/www/html<\/code><\/pre><p>Частая проблема: nginx не может писать в кастомную директорию из-за неверного контекста. Диагностика через <code>audit2why<\/code>:<\/p><pre><code>ausearch -m avc -ts recent | audit2why<\/code><\/pre><p>Типовое решение — не отключать SELinux, а сгенерировать разрешающий модуль:<\/p><pre><code>ausearch -m avc -ts recent | audit2allow -M mypolicy\nsemodule -i mypolicy.pp<\/code><\/pre><p>Отключение SELinux — плохая практика в production; правильный путь — научиться диагностировать и точечно разрешать нужные операции.<\/p>"}, {"title": "AppArmor: profiles, aa-status, aa-genprof", "level": "🟡 Middle", "explanation": "<p>AppArmor — альтернатива SELinux, используемая по умолчанию в Ubuntu и Debian. В отличие от SELinux, он привязывается к путям файлов, а не к меткам контекста, что делает его проще для понимания.<\/p><p>Профили хранятся в <code>/etc/apparmor.d/<\/code> и описывают, что конкретной программе разрешено делать:<\/p><pre><code>/usr/sbin/nginx {\n  #include &lt;abstractions/base&gt;\n  network inet stream,\n  /var/www/** r,\n  /var/log/nginx/*.log w,\n  /etc/nginx/** r,\n  deny /home/** rwx,\n}<\/code><\/pre><p>Просмотр статуса всех профилей:<\/p><pre><code>aa-status<\/code><\/pre><p>Профиль может работать в двух режимах: <strong>enforce<\/strong> (блокирует нарушения) и <strong>complain<\/strong> (только логирует):<\/p><pre><code>aa-enforce /etc/apparmor.d/usr.sbin.nginx\naa-complain /etc/apparmor.d/usr.sbin.nginx<\/code><\/pre><p>Для создания нового профиля с нуля используется интерактивный <code>aa-genprof<\/code>: он запускает приложение, наблюдает за его действиями через логи ядра и предлагает разрешить или запретить каждую операцию.<\/p><pre><code>aa-genprof /usr/local/bin/myapp<\/code><\/pre><ul><li>После генерации профиль дорабатывают вручную под реальные сценарии использования.<\/li><li>Docker и Kubernetes используют AppArmor-профили для дополнительной изоляции контейнеров поверх обычных Linux namespaces.<\/li><\/ul><p>Логи нарушений смотрят в <code>dmesg<\/code> или <code>/var/log/syslog<\/code> с тегом <code>apparmor=\"DENIED\"<\/code>.<\/p>"}, {"title": "Auditd: audit.rules, ausearch, aureport", "level": "🟡 Middle", "explanation": "<p>auditd — подсистема аудита ядра Linux, записывающая детальный журнал системных событий: доступ к файлам, вызовы syscall, изменения пользователей и прав. Это ключевой инструмент для расследования инцидентов и соответствия compliance-требованиям (PCI DSS, CIS).<\/p><p>Правила задаются в <code>/etc/audit/rules.d/audit.rules<\/code>:<\/p><pre><code># Отслеживать изменения файла паролей\n-w /etc/passwd -p wa -k identity\n-w /etc/shadow -p wa -k identity\n\n# Отслеживать использование sudo\n-w /etc/sudoers -p wa -k privilege_escalation\n\n# Отслеживать все успешные и неуспешные попытки chmod\n-a always,exit -F arch=b64 -S chmod -k perm_change<\/code><\/pre><p>Флаги: <strong>-p<\/strong> — тип доступа (r/w/x/a), <strong>-k<\/strong> — ключ для последующего поиска.<\/p><p>Применение правил и перезапуск:<\/p><pre><code>augenrules --load\nsystemctl restart auditd<\/code><\/pre><p>Поиск событий по ключу:<\/p><pre><code>ausearch -k identity --start today\nausearch -ui 0 -k privilege_escalation<\/code><\/pre><p>Сводный отчёт по всей системе:<\/p><pre><code>aureport --auth --summary\naureport -f --summary<\/code><\/pre><table><tr><th>Команда<\/th><th>Назначение<\/th><\/tr><tr><td>ausearch<\/td><td>Детальный поиск конкретных событий<\/td><\/tr><tr><td>aureport<\/td><td>Агрегированные отчёты (кто, когда, что)<\/td><\/tr><\/table><p>auditd часто интегрируют с SIEM-системами, отправляя логи через <code>audisp<\/code> в syslog или Elasticsearch для централизованного анализа.<\/p>"}, {"title": "HashiCorp Vault: secrets engine, PKI, dynamic credentials, policies", "level": "🟡 Middle", "explanation": "<p>Vault решает проблему хранения секретов (паролей, API-ключей, сертификатов) вне кода и конфигов, с централизованным контролем доступа и аудитом.<\/p><p>Secrets engines — модули для разных типов секретов:<\/p><ul><li><strong>kv<\/strong> — статичное key-value хранилище.<\/li><li><strong>database<\/strong> — динамическая генерация учётных данных БД с TTL.<\/li><li><strong>pki<\/strong> — выпуск и ротация TLS-сертификатов.<\/li><li><strong>transit<\/strong> — шифрование данных без хранения ключей у клиента.<\/li><\/ul><p>Пример включения kv и записи секрета:<\/p><pre><code>vault secrets enable -path=secret kv-v2\nvault kv put secret/app/db password=s3cr3t<\/code><\/pre><p>Динамические credentials для PostgreSQL — Vault сам создаёт временного пользователя БД с TTL:<\/p><pre><code>vault secrets enable database\nvault write database/config/mydb \\\n  plugin_name=postgresql-database-plugin \\\n  connection_url=\"postgresql://{{username}}:{{password}}@db:5432/app\" \\\n  allowed_roles=\"readonly\"\n\nvault write database/roles/readonly \\\n  db_name=mydb \\\n  creation_statements=\"CREATE ROLE \\\"{{name}}\\\" LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}';\" \\\n  default_ttl=\"1h\"<\/code><\/pre><p>Policies ограничивают доступ по принципу минимальных привилегий:<\/p><pre><code>path \"secret/data/app/*\" {\n  capabilities = [\"read\"]\n}<\/code><\/pre><p>Приложение получает секрет через AppRole-аутентификацию, а не статичный токен, что снижает риск утечки долгоживущих credentials.<\/p>"}, {"title": "SAST: semgrep, bandit (Python), gosec (Go) в pipeline", "level": "🟡 Middle", "explanation": "<p>SAST (Static Application Security Testing) — анализ исходного кода на уязвимости без его выполнения, встраиваемый прямо в CI pipeline, чтобы ловить проблемы до merge.<\/p><p><strong>bandit<\/strong> для Python ищет опасные паттерны: eval, subprocess с shell=True, hardcoded пароли:<\/p><pre><code>pip install bandit\nbandit -r ./src -f json -o report.json<\/code><\/pre><p><strong>gosec<\/strong> для Go находит SQL-инъекции, небезопасное использование crypto/rand вместо math/rand:<\/p><pre><code>gosec -fmt=json -out=report.json ./...<\/code><\/pre><p><strong>semgrep<\/strong> — универсальный движок с правилами для десятков языков, легко пишется кастомное правило:<\/p><pre><code>rules:\n  - id: no-hardcoded-secret\n    pattern: password = \"...\"\n    message: \"Hardcoded password detected\"\n    severity: ERROR\n    languages: [python]<\/code><\/pre><p>Пример шага в GitLab CI:<\/p><pre><code>sast:\n  stage: test\n  script:\n    - semgrep --config=auto --error ./src\n  allow_failure: false<\/code><\/pre><table><tr><th>Инструмент<\/th><th>Язык<\/th><\/tr><tr><td>bandit<\/td><td>Python<\/td><\/tr><tr><td>gosec<\/td><td>Go<\/td><\/tr><tr><td>semgrep<\/td><td>Мультиязычный<\/td><\/tr><\/table><p><strong>allow_failure: false<\/strong> превращает найденные уязвимости в блокирующий gate — merge request не проходит, пока проблема не устранена или не помечена как false positive.<\/p>"}, {"title": "Container security: Seccomp, AppArmor profiles для Docker/K8s", "level": "🟡 Middle", "explanation": "<p>Контейнеры делят ядро с хостом, поэтому изоляция на уровне syscall и файловой системы критична для снижения риска container breakout.<\/p><p><strong>Seccomp<\/strong> ограничивает набор системных вызовов, доступных процессу в контейнере. Docker по умолчанию применяет профиль, блокирующий ~44 опасных syscall (например, <code>mount<\/code>, <code>reboot<\/code>):<\/p><pre><code>docker run --security-opt seccomp=default.json myapp<\/code><\/pre><p>Кастомный профиль в JSON описывает whitelist разрешённых вызовов:<\/p><pre><code>{\n  \"defaultAction\": \"SCMP_ACT_ERRNO\",\n  \"syscalls\": [\n    {\"names\": [\"read\",\"write\",\"open\",\"close\",\"exit\"],\n     \"action\": \"SCMP_ACT_ALLOW\"}\n  ]\n}<\/code><\/pre><p>В Kubernetes seccomp-профиль задаётся через <code>securityContext<\/code>:<\/p><pre><code>securityContext:\n  seccompProfile:\n    type: Localhost\n    localhostProfile: profiles/audit.json\n  capabilities:\n    drop: [\"ALL\"]\n  readOnlyRootFilesystem: true\n  runAsNonRoot: true<\/code><\/pre><p>AppArmor-профиль для контейнера подключается похожим образом через аннотацию Pod:<\/p><pre><code>annotations:\n  container.apparmor.security.beta.kubernetes.io/myapp: localhost/k8s-apparmor-example<\/code><\/pre><ul><li><strong>drop: ALL capabilities<\/strong> — убирает лишние Linux capabilities (CAP_SYS_ADMIN и т.д.).<\/li><li><strong>readOnlyRootFilesystem<\/strong> — запрещает запись в файловую систему контейнера, кроме явных volume.<\/li><\/ul><p>Комбинация Seccomp + AppArmor + non-root + read-only FS формирует defense-in-depth для рабочих нагрузок в кластере.<\/p>"}, {"title": "Zero Trust: mTLS, сетевая сегментация, identity-based access", "level": "🔴 Senior", "explanation": "<p>Zero Trust — модель безопасности, отказывающаяся от понятия «доверенного периметра». Каждый запрос — снаружи или внутри сети — проверяется независимо, без неявного доверия по факту нахождения в внутренней сети.<\/p><p><strong>mTLS (mutual TLS)<\/strong> — обе стороны соединения предъявляют сертификаты, а не только сервер:<\/p><pre><code>server {\n  listen 443 ssl;\n  ssl_certificate     /etc/ssl/server.crt;\n  ssl_certificate_key /etc/ssl/server.key;\n  ssl_client_certificate /etc/ssl/ca.crt;\n  ssl_verify_client on;\n}<\/code><\/pre><p>В Kubernetes mTLS между сервисами обычно реализуется через service mesh (Istio, Linkerd) с автоматической ротацией сертификатов через встроенный CA — приложениям не нужно самим управлять ключами.<\/p><p><strong>Сетевая сегментация<\/strong> ограничивает, какие сервисы могут общаться друг с другом, через Network Policy:<\/p><pre><code>apiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: allow-frontend-to-backend\nspec:\n  podSelector:\n    matchLabels: {app: backend}\n  ingress:\n    - from:\n        - podSelector: {matchLabels: {app: frontend}}\n      ports: [{port: 8080}]<\/code><\/pre><p><strong>Identity-based access<\/strong> — доступ выдаётся на основе идентичности workload (SPIFFE/SPIRE, service account), а не IP-адреса, который легко подменить.<\/p><table><tr><th>Принцип<\/th><th>Реализация<\/th><\/tr><tr><td>Never trust, always verify<\/td><td>mTLS на каждом hop<\/td><\/tr><tr><td>Least privilege<\/td><td>RBAC + Network Policy<\/td><\/tr><tr><td>Assume breach<\/td><td>Микросегментация, blast radius минимален<\/td><\/tr><\/table><p>Zero Trust особенно важен в multi-tenant кластерах и облачных средах, где физический периметр сети больше не существует.<\/p>"}], "quiz": [{"q": "Какая директива sshd_config запрещает вход по паролю, оставляя только аутентификацию по ключу?", "options": ["PermitRootLogin no", "PasswordAuthentication no", "AllowUsers deploy", "Port 2222"], "answer": 1, "explain": "PasswordAuthentication no отключает парольный вход, делая брутфорс паролей бессмысленным; вход остаётся возможен только по SSH-ключу."}, {"q": "В каком файле следует хранить кастомную конфигурацию fail2ban, чтобы не потерять её при обновлении пакета?", "options": ["jail.conf", "jail.local", "fail2ban.conf", "/etc/fail2ban/default.conf"], "answer": 1, "explain": "jail.conf перезаписывается при обновлении пакета; кастомные правила пишут в jail.local, который имеет приоритет и не затрагивается обновлениями."}, {"q": "Какая базовая политика firewall соответствует принципу production hardening 'minimal open ports'?", "options": ["policy accept для INPUT", "policy drop для INPUT с явным whitelist нужных портов", "Отключить firewall совсем", "Разрешить всё, логировать подозрительное"], "answer": 1, "explain": "Production-подход — default deny: базовая политика INPUT DROP, а разрешаются только явно необходимые порты (SSH, HTTP/HTTPS и т.п.)."}, {"q": "Почему для сертификатов Let's Encrypt обязательно настраивать автопродление через systemd timer?", "options": ["Сертификаты действуют бессрочно, но требуют ручной активации", "Сертификаты Let's Encrypt действуют всего 90 дней", "certbot требует ручного запуска каждый день", "Автопродление нужно только для wildcard-сертификатов"], "answer": 1, "explain": "Сертификаты Let's Encrypt выдаются на 90 дней, поэтому без автоматического продления (systemd timer, запускающий certbot renew) сертификат истечёт и HTTPS перестанет работать."}, {"q": "Что проверяет CIS Benchmark для Linux в первую очередь среди перечисленного?", "options": ["Версию ядра Linux", "Флаги монтирования отдельных точек (/tmp, /var) типа noexec, nosuid", "Наличие GUI окружения", "Количество установленных пакетов"], "answer": 1, "explain": "CIS Benchmark включает рекомендации по выделению отдельных точек монтирования с флагами noexec/nosuid/nodev для снижения риска выполнения произвольного кода."}, {"q": "Какой режим SELinux логирует нарушения политики, но не блокирует их — удобен для отладки перед включением enforcing?", "options": ["disabled", "enforcing", "permissive", "audit"], "answer": 2, "explain": "permissive режим фиксирует все нарушения политики в логах (AVC denials), но не блокирует операции — это позволяет протестировать политику перед переключением в enforcing."}, {"q": "В отличие от SELinux, на что опирается AppArmor при определении разрешённых действий процесса?", "options": ["На метки безопасности (security context)", "На пути к файлам (path-based)", "На UID процесса", "На сетевые namespace"], "answer": 1, "explain": "AppArmor использует path-based модель — профиль описывает разрешения через файловые пути, что проще для понимания по сравнению с label-based моделью SELinux."}, {"q": "Какая команда auditd используется для поиска конкретных событий по заданному ключу правила (-k)?", "options": ["aureport", "ausearch", "auditctl", "augenrules"], "answer": 1, "explain": "ausearch выполняет детальный поиск событий аудита, в том числе по ключу -k, заданному в правиле audit.rules; aureport формирует агрегированные сводки."}, {"q": "Чем принципиально полезны dynamic credentials в HashiCorp Vault для базы данных?", "options": ["Пароль БД хранится в открытом виде в конфиге приложения", "Vault генерирует временного пользователя БД с ограниченным TTL при каждом запросе", "Пароль базы данных никогда не меняется", "Приложение подключается к БД напрямую по IP без аутентификации"], "answer": 1, "explain": "Vault database secrets engine создаёт временные учётные данные с TTL для каждого запроса, что резко снижает риск долгоживущих утечек статичных паролей."}, {"q": "Какой принцип лежит в основе модели Zero Trust при организации доступа между сервисами?", "options": ["Доверие по умолчанию всем запросам из внутренней сети", "Never trust, always verify — каждый запрос проверяется независимо от местоположения", "Доступ разрешён всем, кто внутри VPN", "Аутентификация только для внешних запросов"], "answer": 1, "explain": "Zero Trust отказывается от понятия доверенного периметра: каждое соединение проверяется через mTLS, идентичность и политику доступа, независимо от того, находится ли источник внутри сети."}], "id": 12, "pi": 3}, {"phase": "Phase 5 — SRE Practices", "section": "📐 SLO / SLI / SLA / Error Budget", "topics": [{"title": "SLI: что измеряем — availability, latency p50/p95/p99, error rate", "level": "🟡 Middle", "explanation": "<p><strong>SLI (Service Level Indicator)<\/strong> — конкретная измеримая метрика, отражающая качество сервиса с точки зрения пользователя. SLI не путать со SLO — SLI это <em>измерение<\/em>, SLO это <em>цель<\/em> для этого измерения.<\/p><ul><li><strong>Availability<\/strong> — доля успешных запросов: <code>good_requests / total_requests * 100%<\/code><\/li><li><strong>Latency percentiles<\/strong> — p50 (медиана), p95, p99 показывают время отклика для 50%, 95%, 99% запросов соответственно. p99 важен, так как показывает «хвостовые» проблемы, скрытые средним значением<\/li><li><strong>Error rate<\/strong> — доля запросов с ошибками (HTTP 5xx): <code>errors / total_requests<\/code><\/li><\/ul><p>Пример расчёта availability SLI: за сутки было 1 000 000 запросов, из них 999 500 успешных.<\/p><pre><code>SLI = 999500 / 1000000 * 100% = 99.95%<\/code><\/pre><p>Пример latency SLI: если из 10 000 запросов 9 900 отработали быстрее 200мс, то p99 latency &lt;= 200мс.<\/p><table><tr><th>Метрика<\/th><th>Что показывает<\/th><th>Пример<\/th><\/tr><tr><td>Availability<\/td><td>Доступность сервиса<\/td><td>99.95%<\/td><\/tr><tr><td>Latency p95<\/td><td>95% запросов быстрее X<\/td><td>150мс<\/td><\/tr><tr><td>Error rate<\/td><td>Доля ошибок<\/td><td>0.05%<\/td><\/tr><\/table><p>Хорошие SLI должны быть <strong>измеримы автоматически<\/strong> (Prometheus, APM), отражать реальный пользовательский опыт, а не внутренние детали инфраструктуры.<\/p>"}, {"title": "SLO: внутренние цели — 99.9% = 8.7 ч/год downtime, 99.99% = 52 мин", "level": "🟡 Middle", "explanation": "<p><strong>SLO (Service Level Objective)<\/strong> — внутренняя целевая величина для SLI, зафиксированная командой как ориентир качества. SLO не является юридическим обязательством (в отличие от SLA), это рабочая договорённость внутри организации.<\/p><p>Ключевая формула для расчёта допустимого downtime за год (365 дней = 8760 часов = 525600 минут):<\/p><pre><code>Downtime = (1 - SLO) * общее_время<\/code><\/pre><table><tr><th>SLO (%)<\/th><th>Допустимый downtime / год<\/th><th>/ месяц<\/th><\/tr><tr><td>99%<\/td><td>3.65 дня<\/td><td>~7.3 ч<\/td><\/tr><tr><td>99.9%<\/td><td>8.7 часов<\/td><td>~43.8 мин<\/td><\/tr><tr><td>99.95%<\/td><td>4.38 часов<\/td><td>~21.9 мин<\/td><\/tr><tr><td>99.99%<\/td><td>52.6 минут<\/td><td>~4.4 мин<\/td><\/tr><tr><td>99.999%<\/td><td>5.26 минут<\/td><td>~26 сек<\/td><\/tr><\/table><p>Расчёт для 99.99%: <code>(1 - 0.9999) * 525600 мин = 52.56 мин/год<\/code>.<\/p><p>Важно: SLO должен быть <strong>достижимым и экономически обоснованным<\/strong> — стремление к 99.999% («five nines») требует кратно больших затрат на инфраструктуру, multi-region репликацию и automation, поэтому SLO выбирается исходя из бизнес-требований, а не «чем выше — тем лучше».<\/p><p>SLO обычно устанавливается <strong>ниже<\/strong> реального наблюдаемого уровня, чтобы оставить error budget для экспериментов и деплоев.<\/p>"}, {"title": "SLA: внешние обязательства с штрафами/кредитами при нарушении", "level": "🟡 Middle", "explanation": "<p><strong>SLA (Service Level Agreement)<\/strong> — формальный контракт между поставщиком услуги и клиентом, описывающий гарантированный уровень сервиса и последствия при его нарушении (штрафы, кредиты, компенсации).<\/p><ul><li>SLA — юридический документ, часто часть коммерческого договора<\/li><li>SLO — внутренняя цель команды, обычно строже чем SLA (запас на ошибку)<\/li><li>SLI — метрика, по которой измеряется выполнение SLO/SLA<\/li><\/ul><p>Типичное соотношение: <strong>SLI &le; SLO &le; SLA<\/strong> по строгости, то есть внутренний SLO жёстче, чем внешний SLA — это даёт «буфер безопасности» до того, как компания понесёт финансовые последствия.<\/p><p>Пример из практики AWS: SLA на EC2 гарантирует 99.99% доступности в регионе; при нарушении клиент получает service credit (например, 10% от месячного счёта при доступности 99.0%–99.99%, 30% при &lt;99.0%).<\/p><pre><code>Если SLA = 99.9% (43.8 мин/мес допустимого простоя)\n  и SLO = 99.95% (21.9 мин/мес) -- внутренняя цель,\n  то есть 21.9 мин \"запаса\" до нарушения контракта<\/code><\/pre><table><tr><th>Тип<\/th><th>Аудитория<\/th><th>Последствия<\/th><\/tr><tr><td>SLI<\/td><td>Инженеры<\/td><td>Нет, просто метрика<\/td><\/tr><tr><td>SLO<\/td><td>Команда/продукт<\/td><td>Замедление деплоев (error budget)<\/td><\/tr><tr><td>SLA<\/td><td>Клиент/юристы<\/td><td>Штрафы, кредиты, репутация<\/td><\/tr><\/table><p>SRE-команды обычно не показывают SLA клиентам напрямую как рабочий ориентир — они работают с более строгим SLO, чтобы избежать нарушения контракта.<\/p>"}, {"title": "Error budget: расчёт = 1 - SLO, потребление, freeze при исчерпании", "level": "🟡 Middle", "explanation": "<p><strong>Error budget<\/strong> — допустимое количество \"неуспеха\" за период, вычисляемое как <code>1 - SLO<\/code>. Это ключевая концепция SRE, превращающая абстрактную надёжность в конкретный, тратимый ресурс.<\/p><pre><code>Error budget = (1 - SLO) * общее_число_запросов_или_времени<\/code><\/pre><p>Пример: SLO = 99.9% на месяц, всего запросов = 10 000 000.<\/p><pre><code>Error budget = (1 - 0.999) * 10000000 = 10 000 запросов\nЕсли за 20 дней потрачено 8 000 из 10 000 (80%) --\n  бюджет почти истрачен, нужно снижать риски<\/code><\/pre><p>Как используется бюджет:<\/p><ul><li>Каждый инцидент, деплой с ошибками, деградация — <strong>тратит<\/strong> error budget<\/li><li>Пока бюджет не исчерпан — команда может деплоить чаще, экспериментировать, брать риски<\/li><li>При исчерпании бюджета — вводится <strong>\"budget freeze\"<\/strong>: релизы фич останавливаются, фокус переключается на стабильность и надёжность<\/li><\/ul><p>Это создаёт баланс между Dev (хочет фичи) и Ops (хочет стабильность) — единый измеримый критерий вместо субъективных споров.<\/p><table><tr><th>Статус бюджета<\/th><th>Действие<\/th><\/tr><tr><td>0-50% потрачено<\/td><td>Обычный ритм релизов<\/td><\/tr><tr><td>50-90% потрачено<\/td><td>Повышенное внимание, code review строже<\/td><\/tr><tr><td>&gt;90% потрачено<\/td><td>Freeze — только критичные фиксы<\/td><\/tr><\/table><p>Error budget policy обычно документируется формально и согласуется между командами до инцидентов, а не придумывается на ходу.<\/p>"}, {"title": "RED метод: Rate (RPS), Errors (error rate), Duration (latency)", "level": "🟡 Middle", "explanation": "<p><strong>RED-метод<\/strong> — подход к мониторингу микросервисов и request-driven систем, предложенный Tom Wilkie (Weaveworks). Фокусируется на трёх метриках для каждого сервиса/эндпоинта:<\/p><ul><li><strong>Rate<\/strong> — количество запросов в секунду (RPS): <code>rate(http_requests_total[5m])<\/code><\/li><li><strong>Errors<\/strong> — доля запросов с ошибками: <code>rate(http_requests_total{status=~\"5..\"}[5m]) / rate(http_requests_total[5m])<\/code><\/li><li><strong>Duration<\/strong> — распределение времени отклика (гистограмма latency, percentiles)<\/li><\/ul><p>Пример PromQL-запросов в стиле RED:<\/p><pre><code># Rate\nsum(rate(http_requests_total[5m])) by (service)\n\n# Errors\nsum(rate(http_requests_total{code=~\"5..\"}[5m]))\n  / sum(rate(http_requests_total[5m]))\n\n# Duration (p95)\nhistogram_quantile(0.95,\n  rate(http_request_duration_seconds_bucket[5m]))<\/code><\/pre><p>RED хорошо подходит именно для <strong>сервисов, обрабатывающих запросы<\/strong> (API, веб-приложения, микросервисы) — он \"снаружи\" описывает поведение с точки зрения потребителя сервиса, в отличие от USE-метода, который смотрит на ресурсы \"внутри\".<\/p><table><tr><th>Буква<\/th><th>Метрика<\/th><th>Вопрос<\/th><\/tr><tr><td>R<\/td><td>Rate<\/td><td>Сколько запросов?<\/td><\/tr><tr><td>E<\/td><td>Errors<\/td><td>Сколько из них упало?<\/td><\/tr><tr><td>D<\/td><td>Duration<\/td><td>Как быстро отвечаем?<\/td><\/tr><\/table><p>Эти три метрики обычно выводятся на dashboard как первый экран для любого сервиса — если что-то не так, RED сразу подсказывает направление расследования.<\/p>"}, {"title": "USE метод: Utilization, Saturation, Errors для ресурсов", "level": "🟡 Middle", "explanation": "<p><strong>USE-метод<\/strong> (Brendan Gregg) — методология анализа производительности <em>ресурсов<\/em> системы (CPU, память, диск, сеть), в отличие от RED, который смотрит на сервисы/запросы.<\/p><ul><li><strong>Utilization<\/strong> — процент времени, когда ресурс занят полезной работой: <code>CPU utilization = busy_time / total_time * 100%<\/code><\/li><li><strong>Saturation<\/strong> — степень \"переполненности\" ресурса, наличие очереди ожидающих запросов (например, load average выше числа ядер, дисковая очередь)<\/li><li><strong>Errors<\/strong> — количество ошибок на уровне ресурса (например, packet drops на сетевой карте, disk I/O errors)<\/li><\/ul><p>Пример для CPU:<\/p><pre><code>Utilization: node_cpu_seconds_total{mode!=\"idle\"} -- % занятости\nSaturation:  node_load1 / count(node_cpu) -- load average / кол-во ядер\nErrors:      node_cpu_ ошибки почти отсутствуют, но проверяют throttling<\/code><\/pre><p>Пример для диска:<\/p><pre><code>Utilization: % времени диск был занят операциями I/O\nSaturation:  длина очереди I/O запросов (iostat -x, avgqu-sz)\nErrors:      SMART errors, I/O errors в dmesg<\/code><\/pre><table><tr><th>Ресурс<\/th><th>Utilization<\/th><th>Saturation<\/th><th>Errors<\/th><\/tr><tr><td>CPU<\/td><td>% busy<\/td><td>load avg / cores<\/td><td>throttling<\/td><\/tr><tr><td>Memory<\/td><td>% used<\/td><td>swap usage<\/td><td>OOM kills<\/td><\/tr><tr><td>Disk<\/td><td>% busy<\/td><td>queue length<\/td><td>I/O errors<\/td><\/tr><tr><td>Network<\/td><td>% bandwidth<\/td><td>buffer overflow<\/td><td>packet drops<\/td><\/tr><\/table><p>USE удобен для быстрой систематической диагностики \"железа\" при расследовании инцидента: проходишь по всем ресурсам по очереди и ищешь аномалии.<\/p>"}, {"title": "SLO tracking в Prometheus: recording rules + Grafana dashboard", "level": "🟡 Middle", "explanation": "<p>Для отслеживания SLO в реальном времени используют <strong>recording rules<\/strong> в Prometheus — предвычисленные агрегаты, которые сохраняются как новые временные ряды, что экономит ресурсы при частых запросах в Grafana.<\/p><p>Пример recording rule для availability SLI (файл <code>slo_rules.yml<\/code>):<\/p><pre><code>groups:\n  - name: slo_rules\n    interval: 30s\n    rules:\n      - record: job:http_requests:rate5m\n        expr: sum(rate(http_requests_total[5m])) by (job)\n      - record: job:http_requests_errors:rate5m\n        expr: sum(rate(http_requests_total{code=~\"5..\"}[5m])) by (job)\n      - record: job:availability_sli:ratio5m\n        expr: >\n          1 - (job:http_requests_errors:rate5m\n              / job:http_requests:rate5m)<\/code><\/pre><p>Для отслеживания error budget используют burn rate — скорость расходования бюджета:<\/p><pre><code>burn_rate = (1 - SLI) / (1 - SLO)<\/code><\/pre><p>Если <code>burn_rate &gt; 1<\/code>, бюджет тратится быстрее, чем рассчитано на период. Multi-window burn rate alerts (подход Google SRE) комбинируют короткое окно (5 мин) для быстрого обнаружения и длинное (1-6 ч) для отсечения ложных срабатываний.<\/p><p>В Grafana строится dashboard с панелями:<\/p><ul><li>Текущий SLI vs целевой SLO (gauge)<\/li><li>Остаток error budget в % (stat panel)<\/li><li>Burn rate за разные окна (graph)<\/li><li>Алерты через Alertmanager при burn rate &gt; 2 (быстрое исчерпание) или &gt; 1 (устойчивое превышение)<\/li><\/ul><p>Такой подход даёт команде наглядную и автоматическую систему контроля надёжности без ручных расчётов.<\/p>"}, {"title": "SLO-driven development: связь error budget с решением о деплое", "level": "🔴 Senior", "explanation": "<p><strong>SLO-driven development<\/strong> — практика, при которой решения о релизах, приоритетах и рисках принимаются на основе состояния error budget, а не субъективных ощущений или календарных планов. Эта идея — центральная в философии Google SRE.<\/p><p>Основной механизм: пока error budget не исчерпан, команда разработки имеет \"право\" деплоить новые фичи, экспериментировать, идти на риск. Как только бюджет тратится слишком быстро — включается <strong>error budget policy<\/strong>:<\/p><ul><li><strong>Green zone<\/strong> (бюджет в порядке) — обычный ритм релизов, эксперименты допустимы<\/li><li><strong>Yellow zone<\/strong> (бюджет тратится быстрее нормы) — усиленное code review, canary-деплои обязательны, снижение частоты релизов<\/li><li><strong>Red zone<\/strong> (бюджет истрачен) — freeze фич, все ресурсы команды переключаются на надёжность, postmortem обязателен<\/li><\/ul><p>Пример политики: ", "дней.": "", "100%": "freeze_feature_releases()\n    escalate_to_leadership()\n    focus_team_on_reliability()<\/code><\/pre><p>Это создаёт объективный, измеримый и заранее согласованный контракт между Product/Dev (хотят скорость) и SRE/Ops (хотят стабильность) — решения принимаются данными, а не спорами на совещаниях. Ключевое условие: политика должна быть согласована <strong>до<\/strong> инцидента, а не изобретаться реактивно во время кризиса, иначе она превращается в инструмент манипуляции, а не инженерной дисциплины.<\/p>"}], "quiz": [{"q": "Что такое SLI (Service Level Indicator)?", "options": ["Юридический контракт с клиентом", "Конкретная измеримая метрика качества сервиса", "Штрафная санкция за простой", "План аварийного восстановления"], "answer": 1, "explain": "SLI — это измеримая метрика (availability, latency, error rate), которая отражает фактическое качество сервиса. SLA — это контракт, а не метрика."}, {"q": "Сколько допустимого downtime в год соответствует SLO 99.99%?", "options": ["8.7 часов", "3.65 дня", "52 минуты", "5 минут"], "answer": 2, "explain": "(1 - 0.9999) * 525600 минут ≈ 52.6 минут в год. 8.7 часов соответствует 99.9%, а 3.65 дня — 99%."}, {"q": "В чём главное отличие SLA от SLO?", "options": ["SLA всегда строже, чем SLO", "SLA — это внешний контракт со штрафами/кредитами, SLO — внутренняя цель", "SLA измеряется в секундах, SLO в процентах", "SLO применяется только к базам данных"], "answer": 1, "explain": "SLA — формальное юридическое обязательство перед клиентом с финансовыми последствиями. SLO — внутренний рабочий ориентир команды, обычно строже SLA."}, {"q": "Как рассчитывается error budget?", "options": ["SLO * 2", "1 - SLO", "SLA / SLI", "Downtime * 100"], "answer": 1, "explain": "Error budget = 1 - SLO, то есть допустимая доля 'неуспеха'. Например, при SLO 99.9% бюджет ошибок составляет 0.1%."}, {"q": "Что происходит при полном исчерпании error budget согласно SRE-практике?", "options": ["Увеличивают SLO автоматически", "Вводится freeze релизов новых фич, фокус на стабильность", "Компания обязана выплатить клиенту компенсацию", "Ничего, это чисто информационная метрика"], "answer": 1, "explain": "При исчерпании error budget команда вводит 'freeze' — новые фичи не деплоятся, все силы направлены на повышение надёжности до восстановления бюджета."}, {"q": "Какие три метрики входят в RED-метод?", "options": ["Utilization, Saturation, Errors", "Rate, Errors, Duration", "Retry, Escalation, Downtime", "Recovery, Error budget, Deploy"], "answer": 1, "explain": "RED = Rate (запросов в секунду), Errors (доля ошибок), Duration (время отклика). Это подход для мониторинга request-driven сервисов."}, {"q": "Для чего в первую очередь применяется USE-метод?", "options": ["Для анализа контрактов SLA", "Для мониторинга ресурсов (CPU, память, диск, сеть)", "Для расчёта error budget", "Для тестирования нагрузки веб-приложений"], "answer": 1, "explain": "USE (Utilization, Saturation, Errors) — методология Brendan Gregg для систематического анализа состояния аппаратных/системных ресурсов, а не запросов сервиса."}, {"q": "Что означает 'Saturation' в USE-методе?", "options": ["Процент времени занятости ресурса", "Степень переполненности ресурса, наличие очереди ожидания", "Количество ошибок ресурса", "Скорость передачи данных"], "answer": 1, "explain": "Saturation показывает, насколько ресурс перегружен сверх своей нормальной ёмкости — например, длина очереди I/O или load average выше числа ядер CPU."}, {"q": "Зачем в Prometheus используют recording rules при SLO tracking?", "options": ["Чтобы удалять старые метрики", "Чтобы предвычислять агрегаты и экономить ресурсы при частых запросах", "Чтобы автоматически повышать SLO", "Чтобы шифровать метрики"], "answer": 1, "explain": "Recording rules сохраняют предвычисленные значения как новые временные ряды, что снижает нагрузку на Prometheus при построении дашбордов в Grafana с частыми запросами."}, {"q": "Что означает burn rate > 1 при отслеживании error budget?", "options": ["Бюджет тратится быстрее, чем рассчитано на период", "Сервис полностью недоступен", "SLO был превышен и надёжность идеальна", "Ошибка в конфигурации Prometheus"], "answer": 0, "explain": "Burn rate = (1 - SLI) / (1 - SLO). Если результат больше 1, бюджет расходуется быстрее нормы, и при таком темпе он будет исчерпан раньше конца периода."}], "id": 13, "pi": 4}, {"phase": "Phase 5 — SRE Practices", "section": "🚨 Incident Management", "topics": [{"title": "Severity levels: P0/P1/P2/P3 — критерии, SLA по реакции", "level": "🟡 Middle", "explanation": "<p>Классификация инцидентов по <strong>severity levels<\/strong> позволяет команде быстро понять масштаб проблемы и приоритет реакции без долгих обсуждений.<\/p><table><tr><th>Уровень<\/th><th>Описание<\/th><th>Реакция<\/th><\/tr><tr><td>P0<\/td><td>Полный отказ сервиса, влияет на всех пользователей<\/td><td>немедленно, 24/7<\/td><\/tr><tr><td>P1<\/td><td>Критичная функциональность недоступна для части пользователей<\/td><td>&lt; 15-30 мин<\/td><\/tr><tr><td>P2<\/td><td>Деградация производительности, workaround есть<\/td><td>&lt; 4 часа, рабочее время<\/td><\/tr><tr><td>P3<\/td><td>Незначительный баг, косметическая проблема<\/td><td>в порядке очереди<\/td><\/tr><\/table><p>Критерии обычно завязаны на <code>SLI<\/code>: если error rate превышает 5%, а p99 latency растёт в 10 раз — это P0/P1. Важно закрепить критерии в runbook, чтобы дежурный инженер не гадал, а сразу открывал инцидент нужного уровня.<\/p><p>Пример правила в Alertmanager:<\/p><pre><code>- alert: HighErrorRate\n  expr: rate(http_requests_total{status=~\"5..\"}[5m]) &gt; 0.05\n  labels:\n    severity: P1\n  annotations:\n    summary: \"Error rate above 5% for 5m\"<\/code><\/pre><p>SLA по реакции для P0 часто прописывается в договоре с бизнесом: например, «Incident Commander назначается в течение 5 минут после алерта».<\/p>"}, {"title": "Роли: Incident Commander, Communications Lead, Subject Matter Expert", "level": "🟡 Middle", "explanation": "<p>Во время крупного инцидента хаос возникает не из-за отсутствия знаний, а из-за отсутствия <strong>ясного распределения ролей<\/strong>. Практика Google SRE вводит несколько ключевых ролей.<\/p><ul><li><strong>Incident Commander (IC)<\/strong> — координирует работу, принимает решения, не занимается непосредственным дебагом. Держит общую картину.<\/li><li><strong>Communications Lead<\/strong> — обновляет статус-страницу, пишет в Slack/Pararam-канал инцидента, информирует поддержку и руководство.<\/li><li><strong>Subject Matter Expert (SME)<\/strong> — инженер, который непосредственно копается в коде/инфраструктуре и ищет root cause.<\/li><li><strong>Scribe<\/strong> (опционально) — ведёт таймлайн событий для будущего постмортема.<\/li><\/ul><p>Пример: при падении базы данных IC говорит «откатываем последний деплой», SME проверяет логи <code>journalctl -fu postgresql<\/code>, а Communications Lead пишет в канал:<\/p><pre><code>[P0] Инцидент открыт 14:02. Сервис оплат недоступен.\nIC: @ivan", "SME": "maria. Обновление через 15 минут.<\/code><\/pre><p>Чёткое разделение ролей ускоряет реакцию: IC не тратит время на низкоуровневый дебаг, а SME не отвлекается на коммуникацию с бизнесом.<\/p>"}, {"title": "Runbook: структура — симптомы, диагностика, mitigation, эскалация", "level": "🟢 Junior", "explanation": "<p><strong>Runbook<\/strong> — это пошаговая инструкция для дежурного инженера, которая превращает стресс 3 часов ночи в понятный чек-лист.<\/p><p>Стандартная структура runbook:<\/p><ul><li><strong>Симптомы<\/strong> — какой алерт сработал, что видно в дашборде (например, «CPU &gt; 90% на всех подах»).<\/li><li><strong>Диагностика<\/strong> — конкретные команды для проверки: <code>kubectl top pods<\/code>, <code>kubectl logs -f deploy/api<\/code>.<\/li><li><strong>Mitigation<\/strong> — быстрые действия для снижения impact: рестарт, скейлинг, откат деплоя.<\/li><li><strong>Эскалация<\/strong> — кому и когда звонить, если mitigation не помог.<\/li><\/ul><p>Пример фрагмента runbook для OOMKilled подов:<\/p><pre><code>## Симптомы\nАлерт: KubePodOOMKilled\n\n## Диагностика\nkubectl describe pod &lt;pod&gt; | grep -A5 \"Last State\"\nkubectl top pod &lt;pod&gt;\n\n## Mitigation\nkubectl set resources deployment/api --limits=memory=1Gi\nkubectl rollout restart deployment/api\n\n## Эскалация\nЕсли повторяется 3+ раза за час — звонить team-lead backend<\/code><\/pre><p>Хороший runbook хранится в едином месте (Confluence, git-репозиторий рядом с кодом) и регулярно обновляется после каждого нового инцидента.<\/p>"}, {"title": "On-call: ротации, escalation policy, PagerDuty/Opsgenie настройка", "level": "🟡 Middle", "explanation": "<p><strong>On-call<\/strong> — практика дежурства инженеров, которые получают алерты вне рабочего времени и обязаны реагировать в рамках SLA.<\/p><p>Ключевые элементы:<\/p><ul><li><strong>Ротация<\/strong> — расписание, кто дежурит на этой неделе (обычно 1 неделя primary + 1 неделя secondary/backup).<\/li><li><strong>Escalation policy<\/strong> — если primary не ответил за N минут, алерт уходит secondary, потом team-lead.<\/li><li><strong>Инструменты<\/strong>: PagerDuty, Opsgenie интегрируются с Alertmanager/Prometheus и звонят/шлют SMS дежурному.<\/li><\/ul><p>Пример escalation policy в Opsgenie:<\/p><table><tr><th>Шаг<\/th><th>Кому<\/th><th>Задержка<\/th><\/tr><tr><td>1<\/td><td>Primary on-call<\/td><td>0 мин<\/td><\/tr><tr><td>2<\/td><td>Secondary on-call<\/td><td>10 мин<\/td><\/tr><tr><td>3<\/td><td>Team lead<\/td><td>20 мин<\/td><\/tr><\/table><p>Конфиг Alertmanager для интеграции с PagerDuty:<\/p><pre><code>receivers:\n- name: pagerduty\n  pagerduty_configs:\n  - service_key: &lt;integration_key&gt;\n    severity: critical<\/code><\/pre><p>Хорошая практика — ограничивать нагрузку на дежурного (не более 2 алертов ночью подряд без разбора), иначе быстро наступает burnout.<\/p>"}, {"title": "Blameless postmortem: timeline, contributing factors, action items", "level": "🟡 Middle", "explanation": "<p><strong>Blameless postmortem<\/strong> — документ после инцидента, цель которого не найти виновного, а понять систему и предотвратить повторение.<\/p><p>Обязательные разделы:<\/p><ul><li><strong>Timeline<\/strong> — точная хронология: когда сломалось, когда заметили, когда починили (с таймстампами).<\/li><li><strong>Impact<\/strong> — сколько пользователей затронуто, финансовые потери, длительность.<\/li><li><strong>Contributing factors<\/strong> — что способствовало инциденту (не «кто виноват», а «что в системе позволило это произойти»).<\/li><li><strong>Action items<\/strong> — конкретные задачи с owner и deadline, чтобы такое не повторилось.<\/li><\/ul><p>Пример таймлайна:<\/p><pre><code>14:02 - деплой v2.4.1 в prod\n14:05 - алерт HighErrorRate сработал\n14:07 - открыт инцидент P1, IC назначен\n14:12 - откат до v2.4.0\n14:15 - error rate вернулся к норме<\/code><\/pre><p>Формулировка блейм-free: вместо «Иван забыл добавить миграцию» пишут «процесс деплоя не проверял наличие миграции перед rollout — нужна проверка в CI».<\/p><p>Action items оформляются как обычные задачи в трекере: <code>[SRE-142] Добавить pre-deploy check миграций", "owner": "maria", "due": 2}, {"title": "Root cause analysis: 5 Why, fishbone (Ishikawa) diagram", "level": "🟡 Middle", "explanation": "<p><strong>Root Cause Analysis (RCA)<\/strong> — методики поиска глубинной причины инцидента, а не только симптома.<\/p><p><strong>5 Why<\/strong> — последовательно 5 раз спрашиваем «почему», пока не дойдём до системной причины:<\/p><pre><code>1. Почему упал сервис? — Закончилась память.\n2. Почему закончилась память? — Утечка в кэше.\n3. Почему утечка? — Кэш не имел TTL.\n4. Почему не было TTL? — Не было в требованиях к фиче.\n5. Почему не было в требованиях? — Нет checklist для review кода с кэшированием.<\/code><\/pre><p>Итог: реальная причина не «утечка памяти», а отсутствие процесса code review для кэширующего кода.<\/p><p><strong>Fishbone (Ishikawa) diagram<\/strong> — визуальный метод, группирующий возможные причины по категориям: People, Process, Tools, Environment. Полезен когда причин несколько и они пересекаются, в отличие от линейного 5 Why.<\/p><ul><li><strong>People<\/strong>: недостаточно опыта в новом фреймворке<\/li><li><strong>Process<\/strong>: нет обязательного code review<\/li><li><strong>Tools<\/strong>: отсутствие алертов на рост памяти<\/li><li><strong>Environment<\/strong>: staging не воспроизводит нагрузку prod<\/li><\/ul><p>Оба метода часто комбинируют внутри postmortem, чтобы action items закрывали именно корневую причину, а не симптом.<\/p>"}, {"title": "Alert tuning: убираем noise, делаем alerts actionable", "level": "🟡 Middle", "explanation": "<p><strong>Alert fatigue<\/strong> — главный враг on-call инженера: если алерты шумят постоянно и не требуют действий, дежурные начинают их игнорировать, включая настоящие P0.<\/p><p>Принципы хорошего алерта:<\/p><ul><li><strong>Actionable<\/strong> — если алерт сработал, инженер должен точно знать, что делать (ссылка на runbook в annotations).<\/li><li><strong>Symptom-based, не cause-based<\/strong> — алертить на «пользователи получают 500» лучше, чем на «CPU выше 80%» (высокий CPU не всегда проблема).<\/li><li><strong>Правильный threshold и for<\/strong> — избегаем flapping через <code>for: 5m<\/code> в Prometheus.<\/li><\/ul><p>Пример плохого алерта (шумный):<\/p><pre><code>- alert: CPUHigh\n  expr: cpu_usage &gt; 70\n  for: 0s<\/code><\/pre><p>Пример хорошего:<\/p><pre><code>- alert: HighErrorRateUserFacing\n  expr: rate(http_requests_total{status=~\"5..\", route!=\"/health\"}[5m]) &gt; 0.02\n  for: 5m\n  annotations:\n    summary: ", "эндпоинтах": "unbook_url:", "https": ""}, {"title": "Проведение major incidents: координация кросс-командных P0", "level": "🔴 Senior", "explanation": "<p>Крупный <strong>P0-инцидент<\/strong>, затрагивающий несколько команд (например, отказ shared-БД, влияющий на 5 микросервисов), требует другого уровня координации, чем обычный баг одной команды.<\/p><p>Ключевые практики:<\/p><ul><li><strong>Единый war room<\/strong> — один голосовой канал/тред, куда подключаются все затронутые команды, чтобы не дублировать расследование.<\/li><li><strong>Global IC<\/strong> — один Incident Commander координирует всех локальных SME из разных команд, не позволяя параллельным «фиксам» конфликтовать.<\/li><li><strong>Статус каждые 15-30 минут<\/strong> — Communications Lead шлёт обновления в общий канал и на статус-страницу для внешних пользователей.<\/li><li><strong>Freeze деплоев<\/strong> — во время major incident все несвязанные деплои блокируются, чтобы не усложнять картину.<\/li><\/ul><p>Пример структуры коммуникации:<\/p><pre><code>[P0] МАСШТАБНЫЙ ИНЦИДЕНТ 15:00\nЗатронуто: Payments, Orders, Notifications\nGlobal IC: @oleg\nTeam leads: Payments (@anna), Orders (@ivan)\nСтатус: root cause найден в shared Postgres connection pool\nСледующее обновление: 15:30<\/code><\/pre><p>После стабилизации проводится совместный postmortem со всеми командами — важно зафиксировать, как именно распространялся cascading failure (например, через <code>Circuit Breaker<\/code>, который не сработал), и добавить action items на уровне архитектуры, а не одной команды.<\/p>"}], "quiz": [{"q": "Какой severity level обычно присваивают инциденту с полным отказом сервиса для всех пользователей?", "options": ["P3", "P2", "P0", "P1"], "answer": 2, "explain": "P0 — критический уровень, означающий полный отказ сервиса, требующий немедленной реакции 24/7."}, {"q": "Какая роль в инциденте отвечает за координацию действий и принятие решений, но не занимается непосредственным дебагом?", "options": ["Subject Matter Expert", "Incident Commander", "Communications Lead", "Scribe"], "answer": 1, "explain": "Incident Commander держит общую картину и координирует работу команды, оставляя технический дебаг SME."}, {"q": "Что из перечисленного НЕ входит в стандартную структуру runbook?", "options": ["Симптомы", "Диагностика", "Финансовая отчётность компании", "Mitigation"], "answer": 2, "explain": "Runbook описывает симптомы, диагностику, mitigation и эскалацию — финансовая отчётность к нему не относится."}, {"q": "Что делает escalation policy в системах типа PagerDuty/Opsgenie?", "options": ["Автоматически исправляет баги в коде", "Передаёт алерт следующему дежурному, если предыдущий не ответил вовремя", "Удаляет старые алерты из истории", "Генерирует отчёты по SLA раз в месяц"], "answer": 1, "explain": "Escalation policy определяет цепочку эскалации: если primary on-call не отреагировал за заданное время, алерт уходит следующему по цепочке."}, {"q": "Какова главная цель blameless postmortem?", "options": ["Найти и наказать виновного сотрудника", "Понять системные причины инцидента и предотвратить повторение", "Составить отчёт для юридического отдела", "Оценить KPI дежурного инженера"], "answer": 1, "explain": "Blameless postmortem фокусируется на системных факторах, а не на поиске виновного, чтобы люди честно делились деталями."}, {"q": "Какой метод RCA предполагает последовательное задавание вопроса «почему» пять раз подряд?", "options": ["Fishbone diagram", "RED method", "5 Why", "USE method"], "answer": 2, "explain": "5 Why — метод, при котором вопрос «почему» задаётся последовательно для углубления до корневой причины."}, {"q": "По каким категориям обычно группируют причины в fishbone (Ishikawa) диаграмме?", "options": ["Rate, Errors, Duration", "People, Process, Tools, Environment", "Utilization, Saturation, Errors", "CPU, Memory, Disk, Network"], "answer": 1, "explain": "Fishbone диаграмма классически делит причины по категориям People, Process, Tools, Environment (могут быть и другие вариации)."}, {"q": "Что означает термин 'alert fatigue'?", "options": ["Усталость сервера от большого количества запросов", "Игнорирование алертов дежурными из-за их избыточного количества и шума", "Автоматическое отключение алертов ночью", "Технику снижения latency в системе алертинга"], "answer": 1, "explain": "Alert fatigue возникает, когда слишком много шумных, неactionable алертов заставляет инженеров их игнорировать, включая критичные."}, {"q": "Почему symptom-based алерты (например, на процент ошибок 5xx) считаются предпочтительнее cause-based (например, просто высокий CPU)?", "options": ["Symptom-based алерты дешевле в настройке", "Cause-based алерты вообще не поддерживаются в Prometheus", "Symptom-based алерты напрямую отражают влияние на пользователя, а высокий CPU не всегда является проблемой", "Symptom-based алерты не требуют threshold"], "answer": 2, "explain": "Symptom-based подход алертит на реальное влияние на пользователя, тогда как высокая загрузка CPU может быть нормальным поведением и не всегда указывает на проблему."}, {"q": "Что отличает координацию major incident, затрагивающего несколько команд, от обычного P0 одной команды?", "options": ["Major incident не требует postmortem", "Появляется Global Incident Commander, единый war room и freeze несвязанных деплоев на время инцидента", "Достаточно уведомить только одного менеджера по почте", "Все команды работают независимо без единой координации"], "answer": 1, "explain": "Кросс-командные P0 требуют единой точки координации (Global IC), общего war room для всех затронутых команд и заморозки несвязанных деплоев, чтобы не усложнять расследование."}], "id": 14, "pi": 4}, {"phase": "Phase 5 — SRE Practices", "section": "💣 Chaos Engineering", "topics": [{"title": "Принципы: гипотеза, steady state, blast radius, observability first", "level": "🟡 Middle", "explanation": "<p>Chaos Engineering — это дисциплина проведения контролируемых экспериментов над системой, чтобы выявить слабые места до того, как их найдёт продакшн-инцидент. В основе метода лежит несколько принципов.<\/p><ul><li><strong>Steady state<\/strong> — сначала определяют «нормальное» поведение системы через измеримые метрики: latency, error rate, throughput. Без чёткого steady state невозможно понять, что эксперимент что-то сломал.<\/li><li><strong>Гипотеза<\/strong> — формулируется как «система продолжит работать в пределах steady state, даже если произойдёт X». Например: <code>«Если один Pod базы данных упадёт, error rate не превысит 1%»<\/code>.<\/li><li><strong>Blast radius<\/strong> — область воздействия эксперимента должна быть минимальной и контролируемой: сначала staging, затем 1% продакшн-трафика, и только потом — шире.<\/li><li><strong>Observability first<\/strong> — без мониторинга, логов и трейсинга эксперимент бессмысленен: если вы не видите последствий, вы не можете сделать выводы.<\/li><\/ul><p>Практический пример цикла:<\/p><pre><code>1. Метрика: p95 latency &lt; 300ms\n2. Гипотеза: отказ одного из трёх реплик API не увеличит latency выше порога\n3. Эксперимент: убить одну реплику (kubectl delete pod)\n4. Наблюдение: смотрим Grafana/Prometheus дашборд\n5. Вывод: подтверждена или отвергнута гипотеза → фикс автоскейлинга/ретраев<\/code><\/pre><p>Именно такая структура превращает «ломание системы» из хаотичного вредительства в научный метод повышения надёжности.<\/p>"}, {"title": "Litmus Chaos: установка, ChaosExperiment, ChaosEngine в Kubernetes", "level": "🟡 Middle", "explanation": "<p><strong>Litmus Chaos<\/strong> — CNCF-проект для хаос-инжиниринга в Kubernetes, построенный на кастомных ресурсах (CRD). Он позволяет декларативно описывать эксперименты как обычные Kubernetes-манифесты.<\/p><p>Установка через Helm:<\/p><pre><code>helm repo add litmuschaos https://litmuschaos.github.io/litmus-helm/\nhelm install litmus litmuschaos/litmus --namespace litmus --create-namespace<\/code><\/pre><p>Ключевые CRD:<\/p><table><tr><th>Ресурс<\/th><th>Назначение<\/th><\/tr><tr><td>ChaosExperiment<\/td><td>Шаблон конкретной атаки (pod-delete, network-loss и т.д.), обычно ставится из ChaosHub<\/td><\/tr><tr><td>ChaosEngine<\/td><td>Связывает целевое приложение (по label selector) с ChaosExperiment и задаёт параметры (длительность, интервал, force)<\/td><\/tr><tr><td>ChaosResult<\/td><td>Итог эксперимента: verdict Pass/Fail, метрики<\/td><\/tr><\/table><p>Пример ChaosEngine для убийства подов:<\/p><pre><code>apiVersion: litmuschaos.io/v1alpha1\nkind: ChaosEngine\nmetadata:\n  name: nginx-chaos\nspec:\n  appinfo:\n    appns: default\n    applabel: app=nginx\n    appkind: deployment\n  chaosServiceAccount: litmus-admin\n  experiments:\n    - name: pod-delete\n      spec:\n        components:\n          env:\n            - name: TOTAL_CHAOS_DURATION\n              value: '30'\n            - name: CHAOS_INTERVAL\n              value: '10'\n            - name: FORCE\n              value: 'false'<\/code><\/pre><p>После применения манифеста Litmus Operator запускает job, который последовательно удаляет поды с заданным интервалом, а <code>ChaosResult<\/code> показывает, восстановилось ли приложение (readiness, доступность сервиса).<\/p>"}, {"title": "Gremlin: типы атак — network delay, packet loss, CPU/memory stress", "level": "🟡 Middle", "explanation": "<p><strong>Gremlin<\/strong> — коммерческая SaaS-платформа для Chaos Engineering с агентом, устанавливаемым на хосты или в контейнеры, и удобным UI/API для запуска атак без написания YAML-манифестов вручную.<\/p><p>Атаки Gremlin делятся на три категории:<\/p><ul><li><strong>Resource attacks<\/strong> — <code>CPU<\/code>, <code>Memory<\/code>, <code>Disk<\/code>, <code>IO<\/code> stress. Например, нагрузка на 90% CPU на 60 секунд, чтобы проверить срабатывание HPA и алертов.<\/li><li><strong>Network attacks<\/strong> — <code>Latency<\/code> (добавление задержки), <code>Packet Loss<\/code>, <code>Blackhole<\/code> (полная блокировка трафика к хосту/порту), <code>DNS<\/code> (подмена/блокировка резолвинга).<\/li><li><strong>State attacks<\/strong> — <code>Shutdown<\/code> (перезагрузка/выключение хоста), <code>Process Killer<\/code>, <code>Time Travel<\/code> (сдвиг системных часов для проверки TTL/сертификатов).<\/li><\/ul><p>Пример запуска через Gremlin CLI — задержка сети на 200ms для конкретного сервиса:<\/p><pre><code>gremlin attack-container network_latency \\\n  --length 60 \\\n  --delay 200 \\\n  --target-container payment-service<\/code><\/pre><p>Важная особенность Gremlin — встроенный <strong>Halt<\/strong> (кнопка «стоп всем экспериментам») и автоматический таймер (magnitude + duration), что снижает риск неконтролируемого blast radius. Это делает платформу удобной для команд, которые хотят проводить эксперименты в проде без глубокой экспертизы в написании собственных инструментов.<\/p>"}, {"title": "Типы экспериментов: pod kill, node shutdown, disk fill, network partition", "level": "🟡 Middle", "explanation": "<p>В Kubernetes-окружении набор типовых хаос-экспериментов покрывает разные уровни отказа — от приложения до инфраструктуры.<\/p><table><tr><th>Эксперимент<\/th><th>Что проверяет<\/th><th>Пример команды/инструмента<\/th><\/tr><tr><td>Pod kill<\/td><td>Устойчивость к перезапуску реплик, readiness/liveness probes<\/td><td><code>kubectl delete pod -l app=api --grace-period=0<\/code><\/td><\/tr><tr><td>Node shutdown<\/td><td>Работу PodDisruptionBudget, cordon/drain, миграцию подов<\/td><td><code>kubectl drain node1 --ignore-daemonsets<\/code> или Litmus <code>node-drain<\/code><\/td><\/tr><tr><td>Disk fill<\/td><td>Поведение при нехватке места (логи, временные файлы), алерты на диск<\/td><td>ChaosExperiment <code>disk-fill<\/code> (заполняет volume до X%)<\/td><\/tr><tr><td>Network partition<\/td><td>Split-brain, поведение кластерных БД (etcd, Cassandra) при потере связи между узлами<\/td><td><code>iptables -A INPUT -s &lt;peer_ip&gt; -j DROP<\/code> или Litmus <code>pod-network-partition<\/code><\/td><\/tr><\/table><p>Практический совет: каждый эксперимент нужно прогонять в связке с конкретной гипотезой. Например, для <strong>node shutdown<\/strong> гипотеза может быть: «При отключении одного из трёх control-plane узлов etcd сохранит кворум и API-сервер останется доступен». Если эксперимент показывает деградацию — это сигнал пересмотреть <code>PodDisruptionBudget<\/code>, количество реплик или топологию распределения (topology spread constraints, anti-affinity).<\/p><p>Комбинирование экспериментов (например, disk fill + pod kill одновременно) моделирует более реалистичные каскадные сбои, характерные для реальных инцидентов.<\/p>"}, {"title": "Game Days: планирование учений, сценарии, debriefing", "level": "🔴 Senior", "explanation": "<p><strong>Game Day<\/strong> — это спланированное учение, в котором команда воспроизводит инцидент в контролируемых условиях, чтобы проверить готовность людей, процессов и систем. В отличие от автоматических хаос-экспериментов, Game Day фокусируется не только на технике, но и на реакции on-call инженеров.<\/p><p>Этапы планирования:<\/p><ul><li><strong>Выбор сценария<\/strong> — на основе реальных рисков: «отказ основного региона AWS», «истечение TLS-сертификата», «переполнение очереди Kafka».<\/li><li><strong>Роли<\/strong> — Incident Commander, Scribe (ведёт таймлайн), исполнители, наблюдатели.<\/li><li><strong>Область воздействия<\/strong> — обычно staging или изолированный сегмент прода с явным разрешением от владельцев сервисов.<\/li><li><strong>Runbook<\/strong> — заранее описанный сценарий инъекции сбоя и ожидаемые действия команды (без раскрытия деталей исполнителям, чтобы проверить реальную реакцию).<\/li><\/ul><p>Пример таймлайна Game Day:<\/p><pre><code>10:00 — старт, briefing, включение записи\n10:05 — инъекция сбоя (например, блокировка доступа к primary DB)\n10:06 — мониторинг алертов, старт инцидент-процесса\n10:20 — восстановление сервиса командой\n10:30 — остановка эксперимента, подтверждение steady state\n11:00 — debriefing<\/code><\/pre><p><strong>Debriefing (postmortem)<\/strong> проводится сразу после учения: что сработало, где было замешательство, какие алерты не сработали или сработали с опозданием, насколько точным был runbook. Результат — список action items: обновление документации, добавление алертов, автоматизация ручных шагов. Регулярные Game Days (раз в квартал) заметно снижают MTTR при реальных инцидентах, так как команда действует по «мышечной памяти».<\/p>"}, {"title": "Chaos в production: когда оправдано, контроль blast radius", "level": "🔴 Senior", "explanation": "<p>Проведение хаос-экспериментов в staging полезно, но не выявляет проблем, специфичных для прода: реальный трафик, реальные объёмы данных, реальные зависимости от сторонних сервисов. Тем не менее запуск хаоса в production оправдан только при соблюдении строгих условий.<\/p><ul><li><strong>Зрелость observability<\/strong> — команда должна видеть влияние эксперимента в реальном времени (дашборды, алерты, трейсинг), иначе нет возможности вовремя остановиться.<\/li><li><strong>Постепенное расширение blast radius<\/strong> — начинают с canary/1% трафика или одной AZ, и только после серии успешных прогонов расширяют охват.<\/li><li><strong>Kill switch<\/strong> — обязательный механизм мгновенной остановки эксперимента (как Gremlin Halt или ручной rollback манифеста Litmus).<\/li><li><strong>Согласование с бизнесом<\/strong> — эксперименты не запускают во время пиковой нагрузки (Black Friday, релизные окна) без явного разрешения стейкхолдеров.<\/li><\/ul><p>Практика ограничения blast radius в Kubernetes:<\/p><pre><code>apiVersion: litmuschaos.io/v1alpha1\nkind: ChaosEngine\nspec:\n  appinfo:\n    applabel: app=checkout,env=canary   # только canary-версия\n  experiments:\n    - name: pod-delete\n      spec:\n        components:\n          env:\n            - name: PODS_AFFECTED_PERC\n              value: '10'   # не более 10% подов<\/code><\/pre><p>Компании уровня Netflix и Google запускают хаос-инженерию в проде постоянно (Chaos Monkey, DiRT-учения), но приходят к этому только после многолетнего выстраивания culture blameless postmortem, надёжного мониторинга и автоматических budget-guardrails, которые сами прерывают эксперимент при превышении error budget.<\/p>"}], "quiz": [{"q": "Что означает принцип «steady state» в Chaos Engineering?", "options": ["Состояние системы, при котором все поды находятся на одном узле", "Измеримое нормальное поведение системы (латency, error rate), относительно которого оценивают эксперимент", "Режим, в котором хаос-эксперименты запускаются без остановки", "Конфигурация Kubernetes без автоскейлинга"], "answer": 1, "explain": "Steady state — это baseline метрик системы в нормальном режиме, с которым сравнивают поведение во время и после эксперимента."}, {"q": "Что контролирует параметр blast radius при проведении хаос-эксперимента?", "options": ["Скорость выполнения CI/CD pipeline", "Объём логов, записываемых во время эксперимента", "Область (масштаб) системы, подверженную воздействию эксперимента", "Количество участников Game Day"], "answer": 2, "explain": "Blast radius определяет, какая часть системы (проценты подов, один регион, один сервис) будет затронута экспериментом — его стараются минимизировать и постепенно расширять."}, {"q": "Какой Kubernetes CRD в Litmus Chaos связывает целевое приложение с шаблоном эксперимента?", "options": ["ChaosResult", "ChaosEngine", "ChaosHub", "PodDisruptionBudget"], "answer": 1, "explain": "ChaosEngine связывает appinfo (селектор целевого приложения) с одним или несколькими ChaosExperiment и задаёт параметры запуска."}, {"q": "К какой категории атак Gremlin относится эксперимент 'Packet Loss'?", "options": ["Resource attack", "State attack", "Network attack", "Time attack"], "answer": 2, "explain": "Packet Loss, Latency, Blackhole и DNS-атаки относятся к категории Network attacks в Gremlin."}, {"q": "Какой Kubernetes-эксперимент проверяет, как приложение реагирует на нехватку места на диске?", "options": ["pod-delete", "disk-fill", "node-drain", "network-partition"], "answer": 1, "explain": "disk-fill — эксперимент, который заполняет volume до заданного процента, проверяя алерты и деградацию при нехватке диска."}, {"q": "Какова основная цель Game Day?", "options": ["Автоматизировать деплой в production без ручных проверок", "Проверить готовность людей, процессов и систем к реальному инциденту через контролируемое учение", "Заменить unit-тесты интеграционными", "Снизить затраты на облачную инфраструктуру"], "answer": 1, "explain": "Game Day моделирует реальный инцидент, чтобы проверить реакцию on-call команды, runbook'и и мониторинг, а не только техническую устойчивость."}, {"q": "Что должно обязательно присутствовать перед запуском хаос-экспериментов в production?", "options": ["Отсутствие мониторинга, чтобы не мешать эксперименту", "Полное отключение alerting-системы", "Зрелая observability и механизм мгновенной остановки эксперимента (kill switch)", "Максимально широкий blast radius с первого раза"], "answer": 2, "explain": "Прежде чем запускать хаос в проде, нужна наблюдаемость в реальном времени и способ немедленно остановить эксперимент при негативных последствиях."}, {"q": "Что происходит на этапе debriefing после Game Day?", "options": ["Команда сразу деплоит новую версию приложения в прод", "Анализируются действия команды и системы, формируется список action items для улучшения процессов и алертинга", "Удаляются все логи и метрики эксперимента", "Проводится нагрузочное тестирование"], "answer": 1, "explain": "Debriefing (постмортем после учения) фиксирует, что сработало и что нет, и превращается в конкретные задачи по улучшению runbook'ов, мониторинга и автоматизации."}], "id": 15, "pi": 4}, {"phase": "Phase 5 — SRE Practices", "section": "📈 Performance & Capacity", "topics": [{"title": "Load testing: k6 (JS скрипты), Locust (Python), wrk / hey", "level": "🟡 Middle", "explanation": "<p>Нагрузочное тестирование позволяет понять, как система ведёт себя под возрастающей нагрузкой, до того как это произойдёт в продакшене. Существует несколько популярных инструментов, каждый со своей философией.<\/p><p><strong>k6<\/strong> — современный инструмент от Grafana Labs, тесты пишутся на JavaScript, легко интегрируется в CI/CD, выводит метрики прямо в Prometheus/Grafana:<\/p><pre><code>import http from 'k6/http';\nimport { sleep } from 'k6';\n\nexport const options = {\n  vus: 50,\n  duration: '30s',\n};\n\nexport default function () {\n  http.get('https://api.example.com/users');\n  sleep(1);\n}<\/code><\/pre><p><strong>Locust<\/strong> — Python-фреймворк, тесты описываются классами, есть встроенный веб-UI для наблюдения в реальном времени:<\/p><pre><code>from locust import HttpUser, task\n\nclass ApiUser(HttpUser):\n    @task\n    def get_users(self):\n        self.client.get('/users')<\/code><\/pre><p><strong>wrk<\/strong> и <strong>hey<\/strong> — легковесные CLI-утилиты для быстрых замеров без написания скриптов:<\/p><pre><code>wrk -t4 -c100 -d30s https://api.example.com/\nhey -z 30s -c 100 https://api.example.com/<\/code><\/pre><table><tr><th>Инструмент<\/th><th>Язык<\/th><th>Плюсы<\/th><\/tr><tr><td>k6<\/td><td>JS<\/td><td>CI/CD, метрики, cloud<\/td><\/tr><tr><td>Locust<\/td><td>Python<\/td><td>Веб-UI, гибкость<\/td><\/tr><tr><td>wrk/hey<\/td><td>CLI<\/td><td>Простота, скорость запуска<\/td><\/tr><\/table><p>Перед прогоном важно определить целевую нагрузку (RPS, число пользователей) на основе реальных данных production-трафика, иначе результаты будут бесполезны.<\/p>"}, {"title": "Интерпретация результатов: p50/p95/p99 latency, throughput, errors", "level": "🟡 Middle", "explanation": "<p>Средняя (average) latency почти всегда лжёт: один медленный запрос на фоне тысячи быстрых легко «размывается» средним значением. Поэтому в SRE используют <strong>перцентили<\/strong>.<\/p><ul><li><code>p50<\/code> (медиана) — типичный опыт половины пользователей.<\/li><li><code>p95<\/code> — 95% запросов быстрее этого значения; хорошо показывает «средне-плохой» случай.<\/li><li><code>p99<\/code> — критичен для highload-сервисов: даже 1% медленных запросов при миллионе запросов в день — это 10 000 недовольных пользователей.<\/li><\/ul><p>Пример вывода k6:<\/p><pre><code>http_req_duration..: avg=120ms p(50)=95ms p(95)=310ms p(99)=890ms<\/code><\/pre><p><strong>Throughput<\/strong> (пропускная способность) — сколько запросов система обрабатывает в секунду (RPS/QPS). Важно смотреть throughput вместе с latency: при росте нагрузки throughput может расти, а latency резко «взлетает» — это сигнал приближения к пределу насыщения (saturation).<\/p><p><strong>Error rate<\/strong> — доля неуспешных запросов (5xx, таймауты). Golden rule нагрузочного теста: если error rate растёт при увеличении RPS, вы нашли точку деградации системы.<\/p><table><tr><th>Метрика<\/th><th>Что показывает<\/th><\/tr><tr><td>p50<\/td><td>Типичный опыт<\/td><\/tr><tr><td>p99<\/td><td>Хвостовые задержки<\/td><\/tr><tr><td>Throughput<\/td><td>RPS, которые система выдерживает<\/td><\/tr><tr><td>Error rate<\/td><td>Процент отказов<\/td><\/tr><\/table><p>Результаты теста стоит сравнивать с заранее определённым SLO, а не оценивать «на глаз».<\/p>"}, {"title": "Профилирование: CPU flamegraph (perf, py-spy), memory leak поиск", "level": "🟡 Middle", "explanation": "<p>Когда нагрузочный тест показал деградацию, следующий шаг — понять <em>где именно<\/em> тратится время и память. Для этого используется профилирование.<\/p><p><strong>CPU-профилирование<\/strong> на Linux чаще всего делают через <code>perf<\/code>:<\/p><pre><code>perf record -F 99 -p &lt;PID&gt; -g -- sleep 30\nperf script | stackcollapse-perf.pl | flamegraph.pl &gt; flame.svg<\/code><\/pre><p>Результат — <strong>flamegraph<\/strong>, визуализация стека вызовов, где ширина блока пропорциональна времени CPU. Широкие «плато» на графике — кандидаты на оптимизацию.<\/p><p>Для Python-приложений удобнее <code>py-spy<\/code>, работающий без изменения кода и остановки процесса:<\/p><pre><code>py-spy record -o profile.svg --pid 12345\npy-spy dump --pid 12345<\/code><\/pre><p><strong>Поиск memory leak<\/strong> — отдельная задача. Признаки: постоянный рост RSS без стабилизации, частые OOMKilled в Kubernetes. Инструменты:<\/p><ul><li>Python: <code>tracemalloc<\/code>, <code>memory_profiler<\/code><\/li><li>Go: <code>pprof<\/code> (<code>go tool pprof heap<\/code>)<\/li><li>Java: heap dump + Eclipse MAT<\/li><\/ul><p>Практика: снимайте снапшот памяти через равные интервалы (например каждый час) и сравнивайте — растущие объекты видны сразу в diff.<\/p>"}, {"title": "Auto-scaling: HPA, VPA, KEDA, Cluster Autoscaler — когда что", "level": "🟡 Middle", "explanation": "<p>В Kubernetes есть несколько уровней автомасштабирования, и важно понимать разницу между ними, чтобы не настроить их «в конфликт» друг с другом.<\/p><p><strong>HPA (Horizontal Pod Autoscaler)<\/strong> — увеличивает/уменьшает число реплик Pod по метрикам CPU/memory или custom metrics:<\/p><pre><code>kubectl autoscale deployment app --cpu-percent=70 --min=2 --max=10<\/code><\/pre><p><strong>VPA (Vertical Pod Autoscaler)<\/strong> — подстраивает <code>requests<\/code>/<code>limits<\/code> контейнера, а не число реплик. Хорош для приложений, которые нельзя горизонтально масштабировать (например, stateful).<\/p><p><strong>KEDA<\/strong> — масштабирование по событийным метрикам вне стандартных CPU/memory: длина очереди Kafka, RabbitMQ, количество сообщений в SQS. Может масштабировать даже до нуля реплик.<\/p><p><strong>Cluster Autoscaler<\/strong> — работает на уровне узлов кластера: добавляет/удаляет ноды, когда Pod'ы не помещаются или узлы простаивают.<\/p><table><tr><th>Инструмент<\/th><th>Масштабирует<\/th><th>Когда использовать<\/th><\/tr><tr><td>HPA<\/td><td>Реплики Pod<\/td><td>Stateless, CPU/memory нагрузка<\/td><\/tr><tr><td>VPA<\/td><td>Requests/limits<\/td><td>Один инстанс, переменная нагрузка<\/td><\/tr><tr><td>KEDA<\/td><td>Реплики по событиям<\/td><td>Очереди, event-driven<\/td><\/tr><tr><td>Cluster Autoscaler<\/td><td>Ноды<\/td><td>Недостаточно capacity в кластере<\/td><\/tr><\/table><p><strong>Важно:<\/strong> HPA и VPA нельзя одновременно применять к CPU/memory одного Deployment — они будут конфликтовать.<\/p>"}, {"title": "Capacity planning: прогнозирование роста, headroom planning", "level": "🟡 Middle", "explanation": "<p>Capacity planning — процесс прогнозирования, сколько ресурсов (CPU, memory, диск, сеть, инстансы БД) понадобится системе в будущем, чтобы избежать как перегрузки, так и переплаты за неиспользуемые ресурсы.<\/p><p>Базовый подход:<\/p><ul><li>Собрать исторические тренды использования (Prometheus + Grafana за 3-6 месяцев).<\/li><li>Определить тип роста: линейный, сезонный (например, пик продаж перед праздниками), взрывной (маркетинговая кампания).<\/li><li>Рассчитать <strong>headroom<\/strong> — запас мощности сверх текущей пиковой нагрузки, обычно 20-40%, чтобы пережить неожиданные всплески без деградации.<\/li><\/ul><p>Пример простого расчёта headroom:<\/p><pre><code># текущий пик CPU: 65%\n# целевой headroom: 30%\n# порог для action: 65% / (1 - 0.30) = 92.8% от capacity\n\n# если рост 5%/месяц, узнаём когда достигнем порога:\n# months = log(92.8/65) / log(1.05) ~= 7.3 месяца<\/code><\/pre><p>Также важно учитывать <strong>lead time<\/strong> закупки/провижининга: если новый узел на выделенном hardware ставится 2 месяца, планирование должно начинаться заранее — облачные среды с автоскейлингом дают гораздо больше гибкости, чем bare metal.<\/p><table><tr><th>Тип роста<\/th><th>Пример<\/th><th>Метод прогноза<\/th><\/tr><tr><td>Линейный<\/td><td>Органический рост пользователей<\/td><td>Линейная регрессия<\/td><\/tr><tr><td>Сезонный<\/td><td>Black Friday<\/td><td>Исторические пики + запас<\/td><\/tr><tr><td>Взрывной<\/td><td>Вирусный контент<\/td><td>Auto-scaling + rate limiting<\/td><\/tr><\/table>"}, {"title": "sysctl tuning: net.core, net.ipv4, vm.swappiness для production", "level": "🔴 Senior", "explanation": "<p>Настройки ядра Linux по умолчанию рассчитаны на универсальные сценарии и часто становятся бутылочным горлышком для высоконагруженных production-серверов (веб, БД, балансировщики).<\/p><p><strong>Сетевые параметры<\/strong> (<code>net.core<\/code>, <code>net.ipv4<\/code>) — влияют на пропускную способность и число одновременных соединений:<\/p><pre><code># /etc/sysctl.conf\nnet.core.somaxconn = 65535          # длина очереди принятых соединений\nnet.core.netdev_max_backlog = 5000  # очередь пакетов на входе NIC\nnet.ipv4.tcp_max_syn_backlog = 8192 # очередь SYN-запросов\nnet.ipv4.tcp_tw_reuse = 1           # переиспользование TIME_WAIT сокетов\nnet.ipv4.ip_local_port_range = 1024 65535<\/code><\/pre><p>Применить без перезагрузки:<\/p><pre><code>sysctl -p /etc/sysctl.conf\nsysctl net.core.somaxconn<\/code><\/pre><p><strong>vm.swappiness<\/strong> определяет, насколько агрессивно ядро выгружает страницы памяти в swap (0-100). Для серверов баз данных и Kubernetes-нод рекомендуется низкое значение, чтобы избежать неожиданных задержек:<\/p><pre><code>vm.swappiness = 10   # вместо дефолтных 60<\/code><\/pre><p>Для highload веб-серверов также часто увеличивают лимит открытых файловых дескрипторов (<code>fs.file-max<\/code>) и число inotify watches для контейнерных окружений.<\/p><p><strong>Внимание:<\/strong> изменения нужно тестировать на staging — агрессивный tuning без понимания нагрузки может замаскировать реальные проблемы приложения.<\/p>"}, {"title": "Distributed tracing: Jaeger, Tempo — spans, traces, instrumentation", "level": "🔴 Senior", "explanation": "<p>В микросервисной архитектуре один пользовательский запрос может пройти через десятки сервисов. Метрики и логи по отдельности не отвечают на вопрос «где именно застрял именно этот запрос» — для этого нужен <strong>distributed tracing<\/strong>.<\/p><p>Базовые понятия:<\/p><ul><li><strong>Trace<\/strong> — полный путь одного запроса через все сервисы, идентифицируется <code>trace_id<\/code>.<\/li><li><strong>Span<\/strong> — одна операция внутри trace (например, вызов БД или HTTP-запрос к другому сервису), имеет начало, конец и родительский span.<\/li><li><strong>Instrumentation<\/strong> — добавление кода (обычно через OpenTelemetry SDK) для генерации spans в приложении.<\/li><\/ul><p>Пример инструментирования на Python с OpenTelemetry:<\/p><pre><code>from opentelemetry import trace\n\ntracer = trace.get_tracer('my-service')\n\nwith tracer.start_as_current_span('process_order'):\n    with tracer.start_as_current_span('db_query'):\n        result = db.query(...)<\/code><\/pre><p><strong>Jaeger<\/strong> — зрелое решение от CNCF, своё UI, хранилище (Elasticsearch/Cassandra), поддержка sampling-стратегий.<\/p><p><strong>Grafana Tempo<\/strong> — более лёгкий backend, хранит traces в объектном хранилище (S3/GCS), тесно интегрирован с Grafana и Loki/Prometheus (exemplars — переход из метрики прямо в trace).<\/p><table><tr><th><\/th><th>Jaeger<\/th><th>Tempo<\/th><\/tr><tr><td>Хранилище<\/td><td>ES/Cassandra<\/td><td>Object storage (S3)<\/td><\/tr><tr><td>UI<\/td><td>Собственный<\/td><td>Grafana<\/td><\/tr><tr><td>Стоимость хранения<\/td><td>Выше<\/td><td>Ниже<\/td><\/tr><\/table><p>На production критично настроить <strong>sampling<\/strong> (например 1-10% трейсов), иначе объём данных и нагрузка на backend станут неуправляемыми.<\/p>"}], "quiz": [{"q": "Какой инструмент нагрузочного тестирования позволяет писать сценарии на JavaScript и легко интегрируется в CI/CD с выводом метрик в Grafana?", "options": ["Locust", "k6", "wrk", "tcpdump"], "answer": 1, "explain": "k6 от Grafana Labs использует JS для описания сценариев и нативно интегрируется с экосистемой Grafana/Prometheus."}, {"q": "Почему в SRE предпочитают перцентили (p95, p99) вместо средней (average) latency?", "options": ["Перцентили проще считать", "Среднее значение маскирует хвостовые задержки, влияющие на часть пользователей", "Перцентили не зависят от нагрузки", "Среднее значение требует больше данных"], "answer": 1, "explain": "Средняя latency 'размывается' быстрыми запросами и не показывает, что часть пользователей (например 1% при p99) получает значительно худший опыт."}, {"q": "Что показывает flamegraph, полученный с помощью perf?", "options": ["Использование памяти по времени", "Стек вызовов CPU, где ширина блока пропорциональна затраченному времени", "Сетевой трафик приложения", "Количество открытых файловых дескрипторов"], "answer": 1, "explain": "Flamegraph визуализирует call stack: широкие 'плато' соответствуют функциям, где тратится больше всего процессорного времени."}, {"q": "Какой компонент автомасштабирования Kubernetes может масштабировать Deployment до нуля реплик на основе длины очереди Kafka или RabbitMQ?", "options": ["HPA", "VPA", "KEDA", "Cluster Autoscaler"], "answer": 2, "explain": "KEDA (Kubernetes Event-driven Autoscaling) поддерживает масштабирование по внешним событийным метрикам, включая scale-to-zero."}, {"q": "Почему HPA и VPA не рекомендуется применять одновременно к CPU/memory одного и того же Deployment?", "options": ["Это запрещено лицензией Kubernetes", "Они требуют разных версий kubectl", "Они могут конфликтовать, одновременно меняя число реплик и размер ресурсов по одной метрике", "VPA работает только в GKE"], "answer": 2, "explain": "HPA масштабирует количество реплик, а VPA — размер ресурсов; при использовании по одинаковым метрикам (CPU/memory) они могут создавать колебания и конфликтовать друг с другом."}, {"q": "Что такое 'headroom' в контексте capacity planning?", "options": ["Максимальное время отклика сервиса", "Запас мощности сверх текущей пиковой нагрузки для покрытия неожиданных всплесков", "Разница между p50 и p99 latency", "Время развертывания нового сервера"], "answer": 1, "explain": "Headroom — это резерв capacity (обычно 20-40% сверх пикового использования), позволяющий системе пережить неожиданный рост нагрузки без деградации."}, {"q": "Что делает параметр vm.swappiness=10 по сравнению со значением по умолчанию 60?", "options": ["Увеличивает агрессивность выгрузки страниц памяти в swap", "Уменьшает агрессивность использования swap, снижая риск неожиданных задержек", "Полностью отключает swap", "Увеличивает размер файла подкачки"], "answer": 1, "explain": "Более низкое значение vm.swappiness делает ядро менее склонным выгружать страницы памяти в swap, что снижает риск latency-спайков на серверах БД и в Kubernetes-нодах."}, {"q": "Что представляет собой 'span' в контексте distributed tracing?", "options": ["Уникальный идентификатор всего запроса через все сервисы", "Одна операция внутри trace с началом, концом и родительским span", "Файл конфигурации трейсинга", "Метрика пропускной способности сервиса"], "answer": 1, "explain": "Span — единица работы внутри trace (например, вызов БД или запрос к другому сервису), связанная с родительским span и объединённая общим trace_id."}], "id": 16, "pi": 4}, {"phase": "Ph

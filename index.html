нта Unix составляют основу обработки логов и вывода команд в DevOps.<\/p>\n<p><strong>grep<\/strong> ищет строки по шаблону. Флаг <code>-E<\/code> включает расширенные регулярные выражения (ERE), позволяя использовать <code>+<\/code>, <code>?<\/code>, <code>|<\/code> без экранирования:<\/p>\n<pre><code>grep -E \"ERROR|WARN\" app.log\ngrep -E \"^[0-9]{3}\\.[0-9]{3}\" access.log   # IP-подобные строки<\/code><\/pre>\n<p>Полезные флаги: <code>-i<\/code> (без учёта регистра), <code>-v<\/code> (инвертировать), <code>-c<\/code> (только счётчик), <code>-n<\/code> (номера строк), <code>-A<\/code>/<code>-B<\/code> (контекст после/до).<\/p>\n<p><strong>sed<\/strong> — потоковый редактор, чаще всего используется для замены текста:<\/p>\n<pre><code>sed 's/old/new/g' file.txt          # замена всех вхождений\nsed 's/^#//' config.conf            # убрать закомментированность<\/code><\/pre>\n<p><strong>awk<\/strong> — язык обработки текста по полям, разделённым пробелом (по умолчанию). Классика — вывод конкретной колонки:<\/p>\n<pre><code>ps aux | awk '{print $1, $2, $11}'   # user, pid, command\ndf -h | awk '$5+0 > 80 {print $1, $5}'   # разделы заполненные >80%<\/code><\/pre>\n<p>Комбинация этих трёх инструментов через pipe — стандартный паттерн для парсинга логов в SRE-практике, например поиск и подсчёт ошибок 5xx в nginx-логах:<\/p>\n<pre><code>grep -E \" 5[0-9]{2} \" access.log | awk '{print $7}' | sort | uniq -c | sort -rn<\/code><\/pre>"}, {"title": "Регулярные выражения: базовый BRE и расширенный ERE синтаксис", "level": "🟢 Junior", "explanation": "<p>Регулярные выражения в Unix-инструментах существуют в двух диалектах: <strong>BRE<\/strong> (Basic Regular Expressions) и <strong>ERE<\/strong> (Extended Regular Expressions). Разница — в том, какие символы требуют экранирования.<\/p>\n<p>В BRE (используется в <code>grep<\/code> и <code>sed<\/code> по умолчанию) метасимволы <code>+<\/code>, <code>?<\/code>, <code>|<\/code>, <code>( )<\/code>, <code>{ }<\/code> считаются обычными символами, и для придания им особого смысла их нужно экранировать backslash'ем:<\/p>\n<pre><code>grep 'a\\{2,3\\}' file.txt      # BRE: 2-3 повтора символа a\ngrep 'foo\\|bar' file.txt        # BRE: альтернация<\/code><\/pre>\n<p>В ERE (<code>grep -E<\/code>, <code>egrep<\/code>, <code>awk<\/code>) те же символы работают без экранирования:<\/p>\n<pre><code>grep -E 'a{2,3}' file.txt\ngrep -E 'foo|bar' file.txt<\/code><\/pre>\n<table>\n<tr><th>Метасимвол<\/th><th>Значение<\/th><\/tr>\n<tr><td><code>.<\/code><\/td><td>любой символ<\/td><\/tr>\n<tr><td><code>*<\/code><\/td><td>0 или более повторов<\/td><\/tr>\n<tr><td><code>^<\/code> / <code>$<\/code><\/td><td>начало / конец строки<\/td><\/tr>\n<tr><td><code>[abc]<\/code><\/td><td>один из перечисленных символов<\/td><\/tr>\n<tr><td><code>[^abc]<\/code><\/td><td>любой символ, кроме перечисленных<\/td><\/tr>\n<tr><td><code>\\d<\/code>, <code>\\w<\/code><\/td><td>не поддерживаются в BRE/ERE (это PCRE)<\/td><\/tr>\n<\/table>\n<p>Важно: <code>\\d<\/code> и <code>\\w<\/code> — это возможности PCRE (<code>grep -P<\/code>), а не BRE/ERE. Для базовых DevOps-задач (парсинг логов, поиск IP-адресов, версий) обычно достаточно ERE. Пример проверки формата версии semver:<\/p>\n<pre><code>echo \"$version\" | grep -E '^[0-9]+\\.[0-9]+\\.[0-9]+$'<\/code><\/pre>"}, {"title": "Pipe и перенаправление: |, >, >>, <, 2>&1, /dev/null", "level": "🟢 Junior", "explanation": "<p>Перенаправление и pipe — фундаментальный механизм Unix, позволяющий соединять команды и управлять потоками данных. У каждого процесса есть три стандартных дескриптора: <strong>stdin (0)<\/strong>, <strong>stdout (1)<\/strong>, <strong>stderr (2)<\/strong>.<\/p>\n<p><strong>Pipe <code>|<\/code><\/strong> передаёт stdout одной команды на stdin следующей:<\/p>\n<pre><code>ps aux | grep nginx | awk '{print $2}'<\/code><\/pre>\n<p><strong>Перенаправление вывода:<\/strong><\/p>\n<ul>\n<li><code>&gt;<\/code> — перезаписать файл содержимым stdout<\/li>\n<li><code>&gt;&gt;<\/code> — дописать в конец файла<\/li>\n<li><code>&lt;<\/code> — использовать файл как stdin<\/li>\n<\/ul>\n<pre><code>echo \"deploy started\" > deploy.log\necho \"step 2 done\" >> deploy.log\nwhile read -r line; do echo \"$line\"; done < deploy.log<\/code><\/pre>\n<p><strong>Управление stderr<\/strong> критично для логирования в production: <code>2&gt;&amp;1<\/code> объединяет stderr с текущим stdout (порядок важен — редирект применяется слева на права):<\/p>\n<pre><code>command > output.log 2>&1        # верно: оба потока в файл\ncommand 2>&1 > output.log        # неверно: stderr уйдёт в терминал<\/code><\/pre>\n<p>Отправка ненужного вывода в \"чёрную дыру\" — распространённый паттерн в cron-задачах:<\/p>\n<pre><code>/usr/local/bin/cleanup.sh > /dev/null 2>&1<\/code><\/pre>\n<p>Однако для production-скриптов такое подавление ошибок не рекомендуется — лучше направлять stderr в отдельный лог-файл, чтобы не терять диагностическую информацию при сбоях.<\/p>"}, {"title": "Продвинутый sed: -i (in-place), диапазоны строк, несколько выражений", "level": "🟡 Middle", "explanation": "<p><code>sed<\/code> в расширенном режиме позволяет изменять файлы напрямую, работать с диапазонами строк и выполнять несколько операций за один проход.<\/p>\n<p><strong>Флаг <code>-i<\/code><\/strong> (in-place) редактирует файл на месте вместо вывода в stdout. Рекомендуется всегда делать бэкап с суффиксом, особенно в production:<\/p>\n<pre><code>sed -i.bak 's/DEBUG=false/DEBUG=true/' app.conf   # создаст app.conf.bak\nsed -i 's/old/new/g' config.yml                    # без бэкапа (осторожно!)<\/code><\/pre>\n<p><strong>Диапазоны строк<\/strong> задаются номерами строк, регулярками или их комбинацией, что удобно для точечного редактирования конфигов:<\/p>\n<pre><code>sed -n '10,20p' file.txt              # вывести строки 10-20\nsed '/start/,/end/d' file.txt         # удалить блок между шаблонами\nsed '5,10s/foo/bar/' file.txt         # заменить только в строках 5-10<\/code><\/pre>\n<p><strong>Несколько выражений<\/strong> объединяются через <code>-e<\/code> или точку с запятой:<\/p>\n<pre><code>sed -e 's/foo/bar/' -e 's/baz/qux/' file.txt\nsed 's/foo/bar/; s/baz/qux/' file.txt<\/code><\/pre>\n<p>Практический пример — массовая замена версии образа во всех манифестах перед деплоем:<\/p>\n<pre><code>sed -i \"s/image: app:.*/image: app:${NEW_VERSION}/\" deployment.yaml<\/code><\/pre>\n<p>Важный нюанс совместимости: на macOS/BSD <code>sed -i<\/code> требует явного (даже пустого) суффикса — <code>sed -i '' 's/a/b/' file<\/code>, в отличие от GNU sed на Linux. Это частая причина сломанных cross-platform CI-скриптов.<\/p>"}, {"title": "Продвинутый awk: BEGIN/END, поля, условия, getline, printf", "level": "🟡 Middle", "explanation": "<p><code>awk<\/code> — полноценный язык программирования для построчной обработки текста, особенно мощный при работе с табличными данными (логи, вывод <code>ps<\/code>, <code>df<\/code>, CSV).<\/p>\n<p><strong>Структура программы:<\/strong> <code>BEGIN { } { основной блок для каждой строки } END { }<\/code>. <code>BEGIN<\/code> выполняется до чтения данных, <code>END<\/code> — после обработки всех строк:<\/p>\n<pre><code>awk 'BEGIN { print \"Report:\" }\n     { total += $3 }\n     END { print \"Total:\", total }' sales.txt<\/code><\/pre>\n<p><strong>Поля<\/strong> доступны как <code>$1<\/code>, <code>$2<\/code>, ... <code>$0<\/code> — вся строка. Разделитель полей задаётся через <code>-F<\/code>:<\/p>\n<pre><code>awk -F: '{print $1, $3}' /etc/passwd    # имя пользователя и UID<\/code><\/pre>\n<p><strong>Условия<\/strong> перед блоком фильтруют строки без явного <code>if<\/code>:<\/p>\n<pre><code>df -h | awk '$5+0 > 90 {print $6, $5}'   # разделы заполненные >90%<\/code><\/pre>\n<p><strong><code>getline<\/code><\/strong> читает следующую строку вручную — полезно для сопоставления пар строк или чтения из другого файла внутри awk-скрипта.<\/p>\n<p><strong><code>printf<\/code><\/strong> даёт контроль над форматированием вывода в отличие от <code>print<\/code>:<\/p>\n<pre><code>awk '{ printf \"%-15s %5d\\n\", $1, $2 }' data.txt<\/code><\/pre>\n<p>Практический пример анализа access-лога — топ IP-адресов по количеству запросов:<\/p>\n<pre><code>awk '{print $1}' access.log | sort | uniq -c | sort -rn | head -10<\/code><\/pre>\n<p>awk особенно ценен, когда grep/sed уже недостаточно, а писать полноценный Python-скрипт избыточно для одноразовой задачи в терминале.<\/p>"}, {"title": "Массивы: индексные (arr=(a b c)), ассоциативные (declare -A)", "level": "🟡 Middle", "explanation": "<p>Массивы в Bash позволяют хранить списки значений и работать с ними как с единой структурой — полезно для списков серверов, файлов, аргументов.<\/p>\n<p><strong>Индексные массивы<\/strong> — упорядоченный список с числовыми индексами, начиная с 0:<\/p>\n<pre><code>servers=(web1 web2 web3)\necho \"${servers[0]}\"        # web1\necho \"${servers[@]}\"        # все элементы: web1 web2 web3\necho \"${#servers[@]}\"       # количество элементов: 3\n\nservers+=(web4)             # добавить элемент\nfor s in \"${servers[@]}\"; do\n    ssh \"$s\" uptime\ndone<\/code><\/pre>\n<p><strong>Ассоциативные массивы<\/strong> (аналог dict/hashmap) объявляются явно через <code>declare -A<\/code> и используют строковые ключи:<\/p>\n<pre><code>declare -A ports\nports[nginx]=80\nports[postgres]=5432\nports[redis]=6379\n\necho \"${ports[postgres]}\"      # 5432\nfor service in \"${!ports[@]}\"; do\n    echo \"$service listens on ${ports[$service]}\"\ndone<\/code><\/pre>\n<p><code>${!array[@]}<\/code> возвращает все ключи (для ассоциативного) или индексы (для индексного массива) — важная конструкция для итерации.<\/p>\n<p>Практический пример — маппинг окружений на URL для скрипта деплоя:<\/p>\n<pre><code>declare -A env_urls\nenv_urls[dev]=\"https://dev.example.com\"\nenv_urls[prod]=\"https://example.com\"\n\ntarget=\"${env_urls[$ENV]:?Unknown environment: $ENV}\"<\/code><\/pre>\n<p>Важно всегда квотировать <code>\"${array[@]}\"<\/code> — без кавычек элементы с пробелами разобьются на несколько слов при итерации.<\/p>"}, {"title": "Подстановка процессов: <(cmd), xargs -I{}, parallel", "level": "🟡 Middle", "explanation": "<p>Три инструмента ускоряют и обогащают работу с командной строкой, позволяя обрабатывать данные без промежуточных файлов и параллельно выполнять задачи.<\/p>\n<p><strong>Подстановка процессов <code>&lt;(cmd)<\/code><\/strong> подставляет вывод команды как путь к файлу (через именованный pipe), что позволяет сравнивать вывод двух команд без создания временных файлов:<\/p>\n<pre><code>diff <(ls /etc/nginx/sites-enabled) <(ls /etc/nginx/sites-available)\ncomm -3 <(sort file1.txt) <(sort file2.txt)<\/code><\/pre>\n<p><strong><code>xargs -I{}<\/code><\/strong> передаёт результат одной команды как аргументы другой, подставляя <code>{}<\/code> вместо каждого элемента — полезно, когда команда не читает stdin сама:<\/p>\n<pre><code>find /var/log -name \"*.log\" -mtime +30 | xargs -I{} rm {}\ncat hosts.txt | xargs -I{} ssh {} \"uptime\"<\/code><\/pre>\n<p>Флаг <code>-P<\/code> в xargs включает параллельное выполнение — существенно ускоряет операции на множестве целей:<\/p>\n<pre><code>cat hosts.txt | xargs -P 10 -I{} ssh {} \"df -h\"<\/code><\/pre>\n<p><strong>GNU <code>parallel<\/code><\/strong> — более мощная альтернатива xargs с прогресс-баром, логированием и лучшим контролем параллелизма:<\/p>\n<pre><code>cat servers.txt | parallel -j 5 \"ssh {} 'systemctl restart app'\"\nparallel --dry-run gzip ::: *.log   # проверка команд без выполнения<\/code><\/pre>\n<p>Эти инструменты особенно ценны при массовых операциях на десятках серверов — вместо последовательного цикла с <code>for<\/code>, который может занять часы, параллельное выполнение сокращает время до минут.<\/p>"}, {"title": "Обработка сигналов: trap \"cleanup\" EXIT INT TERM", "level": "🟡 Middle", "explanation": "<p><code>trap<\/code> перехватывает сигналы и события завершения процесса, позволяя выполнить код очистки независимо от того, как скрипт завершился — успешно, с ошибкой или по прерыванию пользователем.<\/p>\n<p>Базовый синтаксис — привязка команды или функции к сигналу:<\/p>\n<pre><code>cleanup() {\n    echo \"Cleaning up temp files...\"\n    rm -f /tmp/deploy_lock_$$\n}\ntrap cleanup EXIT INT TERM<\/code><\/pre>\n<p><strong>Ключевые сигналы:<\/strong><\/p>\n<table>\n<tr><th>Сигнал<\/th><th>Когда срабатывает<\/th><\/tr>\n<tr><td><code>EXIT<\/code><\/td><td>любое завершение скрипта (успех, ошибка, сигнал)<\/td><\/tr>\n<tr><td><code>INT<\/code><\/td><td>Ctrl+C (SIGINT)<\/td><\/tr>\n<tr><td><code>TERM<\/code><\/td><td>команда kill по умолчанию (SIGTERM)<\/td><\/tr>\n<tr><td><code>ERR<\/code><\/td><td>любая команда завершилась с ошибкой (требует set -e)<\/td><\/tr>\n<\/table>\n<p><code>trap ... EXIT<\/code> — самый полезный вариант в production-скриптах, так как гарантирует выполнение очистки даже если скрипт упал посередине выполнения:<\/p>\n<pre><code>LOCKFILE=\"/var/run/deploy.lock\"\ntrap 'rm -f \"$LOCKFILE\"' EXIT\n\nif [ -f \"$LOCKFILE\" ]; then\n    echo \"Deploy already running\"\n    exit 1\nfi\ntouch \"$LOCKFILE\"\n# ... основная логика деплоя ...<\/code><\/pre>\n<p>Без <code>trap<\/code> lock-файл может остаться на диске после сбоя скрипта, блокируя все последующие запуски навсегда — классическая причина \"залипших\" CI/CD pipeline.<\/p>"}, {"title": "Скрипты в prod: logging с timestamp, idempotency, lock файлы", "level": "🟡 Middle", "explanation": "<p>Скрипты, работающие на реальных production-серверах, требуют дополнительной устойчивости по сравнению с одноразовыми скриптами для терминала — три ключевых принципа: логирование, идемпотентность, защита от параллельного запуска.<\/p>\n<p><strong>Логирование с timestamp<\/strong> критично для последующего разбора инцидентов. Простая функция-обёртка:<\/p>\n<pre><code>log() {\n    echo \"[$(date '+%Y-%m-%d %H:%M:%S')] $*\" | tee -a /var/log/deploy.log\n}\nlog \"Starting deployment of version $VERSION\"<\/code><\/pre>\n<p><strong>Идемпотентность<\/strong> означает, что повторный запуск скрипта с теми же входными данными не должен ломать систему или создавать дубликаты. Пример неидемпотентного и исправленного варианта:<\/p>\n<pre><code># Плохо: упадёт при повторном запуске\nmkdir /opt/app/releases/v1.2.3\n\n# Хорошо: идемпотентно\nmkdir -p /opt/app/releases/v1.2.3<\/code><\/pre>\n<p>Аналогично для добавления строк в конфиг — нужна проверка на существование перед добавлением, а не безусловный <code>echo &gt;&gt;<\/code>.<\/p>\n<p><strong>Lock-файлы<\/strong> предотвращают параллельный запуск одного и того же скрипта (например, двух cron-задач одновременно):<\/p>\n<pre><code>LOCKFILE=\"/var/run/myscript.lock\"\nexec 200>\"$LOCKFILE\"\nflock -n 200 || { echo \"Already running\"; exit 1; }\ntrap 'flock -u 200' EXIT\n# ... основная логика ...<\/code><\/pre>\n<p><code>flock<\/code> надёжнее простой проверки <code>if [ -f lockfile ]<\/code>, так как атомарно блокирует файл на уровне ядра и автоматически освобождается при завершении процесса, даже аварийном.<\/p>"}], "quiz": [{"q": "Что делает конструкция ${var:-default}?", "options": ["Удаляет переменную var", "Возвращает default, если var не задана или пуста, без изменения var", "Выводит ошибку, если var не задана", "Присваивает default переменной var навсегда"], "answer": 1, "explain": "${var:-default} только подставляет значение по умолчанию в выражении, саму переменную var не меняет — в отличие от ${var:=default}."}, {"q": "Чем [[ ]] отличается от [ ] в условиях Bash?", "options": ["Разницы нет, это синонимы", "[[ ]] — встроенная конструкция Bash, безопаснее с непроквоченными переменными и поддерживает regex", "[[ ]] работает только с числами", "[ ] — встроенная конструкция, [[ ]] — внешняя команда"], "answer": 1, "explain": "[ ] — вызов команды test, требует аккуратных кавычек. [[ ]] встроена в Bash, поддерживает && || и =~ напрямую."}, {"q": "Какой цикл выполняется, пока условие ЛОЖНО?", "options": ["while", "case", "until", "for"], "answer": 2, "explain": "until выполняет тело цикла до тех пор, пока условие не станет истинным — то есть пока оно ложно."}, {"q": "Как объявить локальную переменную внутри функции Bash?", "options": ["local var", "static var", "private var", "const var"], "answer": 0, "explain": "Ключевое слово local ограничивает область видимости переменной функцией, иначе все переменные в Bash глобальны."}, {"q": "Что делает set -o pipefail?", "options": ["Код возврата pipeline становится кодом первой упавшей команды, а не только последней", "Ускоряет выполнение pipe", "Логирует все pipe в файл", "Отключает pipe в скрипте"], "answer": 0, "explain": "Без pipefail код возврата pipeline равен коду последней команды — ошибка в начале цепочки может остаться незамеченной."}, {"q": "Какой инструмент выполняет статический анализ bash-скриптов на распространённые ошибки?", "options": ["shellcheck", "awk", "set -x", "bash -n"], "answer": 0, "explain": "shellcheck — линтер для shell-скриптов, находит незаквоченные переменные, word splitting и другие типичные баги."}, {"q": "Какой флаг grep включает расширенные регулярные выражения (ERE)?", "options": ["-E", "-v", "-i", "-c"], "answer": 0, "explain": "grep -E включает ERE, где +, ?, |, ( ) работают без экранирования backslash'ем, в отличие от базового BRE."}, {"q": "В чём отличие BRE от ERE?", "options": ["В BRE метасимволы +, ?, | требуют экранирования backslash'ем, в ERE — не требуют", "Отличий нет, это устаревшая терминология", "BRE поддерживает Unicode, ERE — нет", "ERE работает только в awk"], "answer": 0, "explain": "В BRE (grep/sed по умолчанию) расширенные метасимволы нужно экранировать: \\+, \\?, \\|. В ERE (grep -E) они работают напрямую."}, {"q": "Что делает конструкция command 2>&1?", "options": ["Перенаправляет stdin в stdout", "Отправляет вывод в /dev/null", "Объединяет stderr с текущим назначением stdout", "Дублирует stdout в два файла"], "answer": 2, "explain": "2>&1 говорит: направить поток 2 (stderr) туда же, куда сейчас направлен поток 1 (stdout). Порядок редиректов важен."}, {"q": "Зачем нужен флаг -i у sed?", "options": ["Для интерактивного режима с подтверждением", "Для вывода номеров строк", "Для игнорирования регистра", "Для редактирования файла напрямую (in-place)"], "answer": 3, "explain": "sed -i изменяет файл на месте вместо вывода результата в stdout; рекомендуется указывать суффикс бэкапа, например -i.bak."}, {"q": "Как объявляется ассоциативный массив в Bash?", "options": ["dict name", "declare -A name", "hash name", "array()"], "answer": 1, "explain": "declare -A name явно создаёт ассоциативный массив со строковыми ключами, в отличие от индексных массивов по умолчанию."}, {"q": "Какой сигнал в trap срабатывает при ЛЮБОМ завершении скрипта, включая ошибку?", "options": ["KILL", "EXIT", "TERM", "INT"], "answer": 1, "explain": "trap ... EXIT гарантированно выполняется при любом завершении процесса — успешном, аварийном или по сигналу, что делает его лучшим местом для очистки ресурсов."}], "id": 2, "pi": 0}, {"phase": "Phase 1 — Linux + Bash + Git", "section": "🔀 Git & Version Control", "topics": [{"title": "Базовые команды: init, clone, add, commit, push, pull, status, diff", "level": "🟢 Junior", "explanation": "<p>Git — распределённая система контроля версий, где у каждого разработчика есть полная копия истории проекта. Базовый цикл работы строится вокруг нескольких команд.<\/p><p><strong>git init<\/strong> создаёт новый репозиторий в текущей директории (появляется скрытая папка <code>.git<\/code>). <strong>git clone<\/strong> копирует существующий репозиторий с удалённого сервера вместе со всей историей:<\/p><pre>git clone https://github.com/user/repo.git<\/pre><p>Далее рабочий цикл: изменяете файлы → добавляете их в <em>staging area<\/em> командой <code>git add<\/code> → фиксируете снимок состояния (<em>commit<\/em>) → отправляете изменения на сервер.<\/p><pre>git add file.txt\ngit add .                # добавить всё\ngit commit -m 'Fix bug in auth'\ngit push origin main\ngit pull origin main      # получить и влить изменения<\/pre><p><strong>git status<\/strong> показывает, какие файлы изменены, добавлены в staging или не отслеживаются. <strong>git diff<\/strong> показывает построчные различия между рабочей копией и последним коммитом (или между staging и коммитом при <code>git diff --staged<\/code>).<\/p><table><tr><th>Команда<\/th><th>Назначение<\/th><\/tr><tr><td>git status<\/td><td>текущее состояние рабочей директории<\/td><\/tr><tr><td>git diff<\/td><td>построчные изменения<\/td><\/tr><tr><td>git add<\/td><td>перенос файлов в staging<\/td><\/tr><tr><td>git commit<\/td><td>фиксация снимка в историю<\/td><\/tr><\/table><p>Понимание трёх зон Git — <em>working directory<\/em>, <em>staging area<\/em> и <em>repository (.git)<\/em> — ключ к пониманию всех остальных команд.<\/p>"}, {"title": "Ветки: branch, checkout/switch, merge, rebase — основы", "level": "🟢 Junior", "explanation": "<p>Ветка (<em>branch<\/em>) в Git — это просто указатель на коммит. Ветки позволяют параллельно разрабатывать фичи, не мешая основной линии кода (<code>main<\/code> или <code>master<\/code>).<\/p><pre>git branch feature-x        # создать ветку\ngit checkout feature-x      # переключиться (старый способ)\ngit switch feature-x        # переключиться (новый способ)\ngit checkout -b feature-x   # создать и переключиться одной командой<\/pre><p>Когда работа в ветке завершена, изменения нужно вернуть в основную ветку. Есть два подхода: <strong>merge<\/strong> и <strong>rebase<\/strong>.<\/p><p><code>git merge<\/code> создаёт новый merge commit, объединяющий историю двух веток, сохраняя реальный порядок событий:<\/p><pre>git switch main\ngit merge feature-x<\/pre><p><code>git rebase<\/code> переносит коммиты вашей ветки на вершину другой ветки, создавая линейную историю без merge-коммитов:<\/p><pre>git switch feature-x\ngit rebase main<\/pre><table><tr><th>Подход<\/th><th>История<\/th><th>Когда использовать<\/th><\/tr><tr><td>merge<\/td><td>сохраняет ветвление<\/td><td>публичные ветки, командная работа<\/td><\/tr><tr><td>rebase<\/td><td>линейная<\/td><td>локальные ветки перед push, чистка истории<\/td><\/tr><\/table><p><strong>Важно:<\/strong> никогда не делайте rebase уже опубликованных (запушенных) веток, которые используют другие разработчики — это переписывает историю и ломает чужие клоны.<\/p>"}, {"title": "История: log --oneline --graph, diff, show, blame", "level": "🟢 Junior", "explanation": "<p>Git хранит полную историю проекта, и умение её исследовать — важный практический навык при отладке и code review.<\/p><p><strong>git log<\/strong> выводит список коммитов. Часто используемые флаги делают вывод компактным и наглядным:<\/p><pre>git log --oneline --graph --all --decorate<\/pre><p>Здесь <code>--oneline<\/code> — по одной строке на коммит, <code>--graph<\/code> — визуализация веток символами <code>*<\/code> и <code>|<\/code>, <code>--all<\/code> — показать все ветки, <code>--decorate<\/code> — имена веток/тегов рядом с коммитами.<\/p><p><strong>git show<\/strong> отображает подробности конкретного коммита — сообщение, автора и diff:<\/p><pre>git show a1b2c3d<\/pre><p><strong>git diff<\/strong> сравнивает состояния — рабочую директорию, staging, коммиты между собой:<\/p><pre>git diff HEAD~1 HEAD       # изменения последнего коммита\ngit diff branch1 branch2   # разница между ветками<\/pre><p><strong>git blame<\/strong> показывает, кто и в каком коммите последний раз менял каждую строку файла — незаменим при поиске автора бага:<\/p><pre>git blame -L 10,20 app.py<\/pre><table><tr><th>Команда<\/th><th>Что показывает<\/th><\/tr><tr><td>log<\/td><td>список коммитов<\/td><\/tr><tr><td>show<\/td><td>детали одного коммита<\/td><\/tr><tr><td>diff<\/td><td>построчные различия<\/td><\/tr><tr><td>blame<\/td><td>авторство строк<\/td><\/tr><\/table>"}, {"title": "Отмена изменений: reset --soft/hard, revert, stash", "level": "🟢 Junior", "explanation": "<p>Git предоставляет несколько инструментов для отмены изменений, и важно понимать различие между ними, чтобы не потерять работу.<\/p><p><strong>git reset<\/strong> перемещает указатель текущей ветки (HEAD) на другой коммит:<\/p><pre>git reset --soft HEAD~1   # откатить коммит, изменения остаются в staging\ngit reset --mixed HEAD~1  # откатить коммит и unstage (режим по умолчанию)\ngit reset --hard HEAD~1   # откатить коммит И удалить изменения из рабочей директории<\/pre><p><strong>--hard безвозвратно удаляет несохранённые изменения<\/strong> — используйте с осторожностью, особенно на публичных ветках.<\/p><p><strong>git revert<\/strong> создаёт новый коммит, который отменяет изменения указанного коммита, не переписывая историю — безопасный способ для опубликованных веток:<\/p><pre>git revert a1b2c3d<\/pre><p><strong>git stash<\/strong> временно прячет незакоммиченные изменения, позволяя переключиться на другую задачу и вернуть их позже:<\/p><pre>git stash                 # сохранить изменения\ngit stash list             # список тайников\ngit stash pop               # вернуть последний тайник и удалить его\ngit stash apply stash@{1}   # применить конкретный тайник, не удаляя<\/pre><table><tr><th>Команда<\/th><th>Меняет историю?<\/th><th>Безопасна для shared-веток?<\/th><\/tr><tr><td>reset --hard<\/td><td>да, теряет данные<\/td><td>нет<\/td><\/tr><tr><td>revert<\/td><td>нет, добавляет коммит<\/td><td>да<\/td><\/tr><tr><td>stash<\/td><td>нет, временно<\/td><td>да (локально)<\/td><\/tr><\/table>"}, {"title": "Remote: origin, fetch, pull --rebase, push, fork workflow", "level": "🟢 Junior", "explanation": "<p>Remote — это ссылка на репозиторий, расположенный на другом сервере (GitHub, GitLab, Bitbucket). По умолчанию при клонировании remote называется <strong>origin<\/strong>.<\/p><pre>git remote -v                          # показать все remotes\ngit remote add upstream https://github.com/original/repo.git<\/pre><p><strong>git fetch<\/strong> скачивает изменения с удалённого репозитория, но <em>не<\/em> применяет их к вашим локальным веткам — безопасная операция для проверки, что нового:<\/p><pre>git fetch origin\ngit log origin/main --oneline   # посмотреть, что нового<\/pre><p><strong>git pull<\/strong> — это по сути <code>fetch<\/code> + <code>merge<\/code>. Флаг <code>--rebase<\/code> заменяет merge на rebase, сохраняя линейную историю и избегая лишних merge-коммитов:<\/p><pre>git pull --rebase origin main<\/pre><p><strong>git push<\/strong> отправляет локальные коммиты на remote:<\/p><pre>git push origin feature-x\ngit push -u origin feature-x   # запомнить upstream для будущих push/pull<\/pre><p><strong>Fork workflow<\/strong> — стандартный подход для open-source: вы делаете fork (свою копию) чужого репозитория на GitHub, клонируете свой fork, работаете в ветке, пушите в свой fork и открываете Pull Request в оригинальный репозиторий (upstream). Оригинальный репозиторий добавляется как второй remote с именем <code>upstream<\/code>, чтобы синхронизировать изменения.<\/p>"}, {"title": "Теги: tag -a, push --tags, semantic versioning (v1.2.3)", "level": "🟢 Junior", "explanation": "<p>Теги (<em>tags<\/em>) — это именованные указатели на конкретные коммиты, обычно используемые для маркировки релизов.<\/p><p>Существует два типа тегов: <strong>lightweight<\/strong> (простой указатель без метаданных) и <strong>annotated<\/strong> (содержит автора, дату, сообщение и может быть подписан GPG — рекомендуется для релизов):<\/p><pre>git tag v1.0.0                          # lightweight\ngit tag -a v1.2.3 -m 'Release 1.2.3'    # annotated (рекомендуется)<\/pre><p>По умолчанию теги не отправляются на remote при обычном <code>git push<\/code> — их нужно пушить отдельно:<\/p><pre>git push origin v1.2.3       # один тег\ngit push origin --tags        # все теги сразу<\/pre><p>Просмотр и удаление тегов:<\/p><pre>git tag -l 'v1.*'          # список с фильтром\ngit show v1.2.3             # детали тега\ngit tag -d v1.0.0            # удалить локально\ngit push origin --delete v1.0.0   # удалить на remote<\/pre><p><strong>Semantic Versioning (SemVer)<\/strong> — стандарт нумерации версий вида <code>MAJOR.MINOR.PATCH<\/code> (например <code>v1.2.3<\/code>):<\/p><table><tr><th>Компонент<\/th><th>Когда увеличивается<\/th><\/tr><tr><td>MAJOR (1)<\/td><td>несовместимые изменения API (breaking changes)<\/td><\/tr><tr><td>MINOR (2)<\/td><td>новая функциональность с обратной совместимостью<\/td><\/tr><tr><td>PATCH (3)<\/td><td>исправления багов без изменения API<\/td><\/tr><\/table><p>Такой подход позволяет пользователям библиотек и сервисов заранее оценить риски обновления по одному только номеру версии.<\/p>"}, {"title": "Git flow / trunk-based development: стратегии ветвления", "level": "🟡 Middle", "explanation": "<p>Стратегия ветвления определяет, как команда организует работу с ветками, релизами и слияниями. Два самых распространённых подхода — <strong>Git Flow<\/strong> и <strong>trunk-based development<\/strong>.<\/p><p><strong>Git Flow<\/strong> использует несколько долгоживущих веток с чётким назначением:<\/p><ul><li><code>main<\/code>/<code>master<\/code> — production-ready код<\/li><li><code>develop<\/code> — интеграционная ветка для следующего релиза<\/li><li><code>feature/*<\/code> — ветки для новых фич, отходят от develop<\/li><li><code>release/*<\/code> — стабилизация перед релизом<\/li><li><code>hotfix/*<\/code> — срочные исправления прямо от main<\/li><\/ul><pre>git checkout -b feature/user-auth develop\n# ... работа ...\ngit checkout develop\ngit merge feature/user-auth<\/pre><p>Git Flow хорошо подходит для проектов с редкими релизами и версионированным ПО (десктопные приложения, библиотеки), но избыточен для непрерывного деплоя.<\/p><p><strong>Trunk-based development<\/strong> — противоположный подход: все разработчики коммитят в одну общую ветку (<code>main<\/code>/<code>trunk<\/code>) часто и небольшими порциями. Feature-ветки живут максимум 1-2 дня, а незавершённый функционал скрывается за feature flags, а не долгоживущими ветками.<\/p><pre>git checkout -b quick-fix main\n# работа, коммит в течение часов\ngit checkout main\ngit merge --no-ff quick-fix\ngit push origin main<\/pre><table><tr><th>Критерий<\/th><th>Git Flow<\/th><th>Trunk-based<\/th><\/tr><tr><td>CI/CD<\/td><td>сложнее<\/td><td>идеально подходит<\/td><\/tr><tr><td>Размер команды<\/td><td>любой<\/td><td>требует дисциплины<\/td><\/tr><tr><td>Частота релизов<\/td><td>редкая<\/td><td>непрерывная (CD)<\/td><\/tr><\/table><p>Большинство современных DevOps-команд с CI/CD выбирают trunk-based подход, так как он минимизирует merge-конфликты и ускоряет доставку.<\/p>"}, {"title": "Git hooks: pre-commit, commit-msg, pre-push", "level": "🟡 Middle", "explanation": "<p>Git hooks — это скрипты, которые Git автоматически запускает на определённых событиях жизненного цикла (коммит, push и т.д.). Они хранятся в директории <code>.git/hooks/<\/code> и по умолчанию не попадают в репозиторий при клонировании — их нужно устанавливать отдельно или через специальные фреймворки.<\/p><p><strong>pre-commit<\/strong> запускается перед созданием коммита, до того как редактор сообщения открывается. Используется для линтинга, форматирования кода, запуска быстрых тестов. Если скрипт завершается с ненулевым кодом — коммит блокируется:<\/p><pre>#!/bin/sh\n# .git/hooks/pre-commit\nnpm run lint || exit 1<\/pre><p><strong>commit-msg<\/strong> получает путь к файлу с сообщением коммита и может проверить/изменить его формат — например, требовать соответствия Conventional Commits (<code>feat:<\/code>, <code>fix:<\/code>):<\/p><pre>#!/bin/sh\ngrep -qE '^(feat|fix|chore|docs)(\\(.+\\))?: .+' \"$1\" || {\n  echo 'Commit message must follow Conventional Commits'; exit 1;\n}<\/pre><p><strong>pre-push<\/strong> запускается перед отправкой коммитов на remote — хорошее место для запуска полного набора тестов или проверки, что не пушится в защищённую ветку.<\/p><p>На практике вместо ручного написания хуков используют фреймворк <strong>pre-commit<\/strong> (Python-инструмент, несмотря на совпадение имени с типом хука) или Node.js-аналог <strong>Husky<\/strong> — они хранят конфигурацию в репозитории и автоматически устанавливают хуки для всех разработчиков:<\/p><pre>pre-commit install\n# .pre-commit-config.yaml описывает какие проверки запускать<\/pre><p>Git hooks — важный инструмент shift-left подхода: ошибки ловятся локально до того, как попадут в CI/CD pipeline.<\/p>"}], "quiz": [{"q": "Какая команда переносит коммиты текущей ветки на вершину другой ветки, создавая линейную историю без merge-коммитов?", "options": ["git merge", "git cherry-pick", "git rebase", "git stash"], "answer": 2, "explain": "git rebase переносит коммиты вашей ветки на вершину другой, создавая линейную историю. git merge, напротив, создаёт отдельный merge-коммит и сохраняет ветвление."}, {"q": "Что произойдёт при выполнении git reset --hard HEAD~1?", "options": ["Коммит откатится, но изменения останутся в staging area", "Коммит откатится, изменения останутся только в рабочей директории", "Коммит откатится, и все несохранённые изменения будут безвозвратно удалены", "Будет создан новый коммит, отменяющий предыдущий"], "answer": 2, "explain": "--hard перемещает HEAD и полностью перезаписывает рабочую директорию и staging area, безвозвратно удаляя изменения. Для сохранения истории используйте git revert."}, {"q": "В чём принципиальное отличие git revert от git reset при работе с уже опубликованной (запушенной) веткой?", "options": ["revert работает только с тегами, а reset — с коммитами", "revert создаёт новый коммит-отмену, не переписывая историю, поэтому безопасен для shared-веток", "reset безопаснее, так как не удаляет данные", "Между ними нет разницы, обе команды идентичны"], "answer": 1, "explain": "git revert добавляет новый коммит, отменяющий изменения, сохраняя историю неизменной — это безопасно для веток, которыми пользуются другие. git reset переписывает указатель ветки и опасен для shared-истории."}, {"q": "Какая команда временно прячет незакоммиченные изменения, позволяя вернуться к ним позже?", "options": ["git stash", "git fetch", "git tag", "git blame"], "answer": 0, "explain": "git stash сохраняет незакоммиченные изменения в отдельном тайнике и очищает рабочую директорию. Вернуть их можно командой git stash pop или git stash apply."}, {"q": "Чем git fetch отличается от git pull?", "options": ["fetch скачивает изменения без применения к локальным веткам, pull — это fetch + merge", "fetch применяет изменения сразу, а pull только скачивает", "Это два одинаковых алиаса одной команды", "fetch работает только с тегами"], "answer": 0, "explain": "git fetch безопасно скачивает данные с remote, не трогая рабочую ветку. git pull — это fetch, сразу за которым следует merge (или rebase с флагом --rebase) в текущую ветку."}, {"q": "Согласно Semantic Versioning, при каком изменении версии MINOR-номер (например 1.2.3 → 1.3.0) должен увеличиваться?", "options": ["При исправлении бага без изменения API", "При добавлении новой функциональности с сохранением обратной совместимости", "При любом коммите в main", "Только при breaking changes"], "answer": 1, "explain": "MINOR увеличивается при добавлении новой обратно совместимой функциональности. PATCH — для багфиксов, MAJOR — для breaking changes, несовместимых с прежним API."}, {"q": "Какая ветка в классическом Git Flow предназначена для срочных исправлений production-багов и создаётся напрямую от main?", "options": ["feature/*", "release/*", "develop", "hotfix/*"], "answer": 3, "explain": "hotfix/* ветки создаются от main для срочного исправления критичных production-багов, минуя обычный цикл через develop, и затем вливаются как в main, так и в develop."}, {"q": "В чём основная идея trunk-based development по сравнению с Git Flow?", "options": ["Использование множества долгоживущих веток для каждой фичи", "Частые небольшие коммиты в одну общую ветку, скрытие незавершённого функционала за feature flags", "Полный отказ от использования веток вообще", "Обязательное использование только rebase, никогда merge"], "answer": 1, "explain": "Trunk-based development предполагает частую интеграцию небольших изменений в общую ветку (trunk/main), а незавершённые фичи скрываются feature flags, а не изолируются в долгоживущих ветках."}, {"q": "На каком этапе жизненного цикла срабатывает Git hook pre-commit?", "options": ["После успешного push на remote", "Перед созданием коммита, до открытия редактора сообщения", "После merge веток", "При клонировании репозитория"], "answer": 1, "explain": "pre-commit запускается перед фиксацией коммита и может заблокировать его (например, если линтер нашёл ошибки), завершившись с ненулевым кодом возврата."}, {"q": "Какой командой можно посмотреть, кто последним изменил каждую строку файла и в каком коммите?", "options": ["git log --oneline", "git diff", "git blame", "git show"], "answer": 2, "explain": "git blame выводит построчную аннотацию файла с указанием коммита и автора последнего изменения каждой строки — полезно при поиске причины появления бага."}], "id": 3, "pi": 0}, {"phase": "Phase 2 — Docker + Kubernetes", "section": "🐋 Docker", "topics": [{"title": "Архитектура: daemon, client, image, container, registry", "level": "🟢 Junior", "explanation": "<p>Docker построен на <strong>клиент-серверной архитектуре<\/strong>. <strong>Docker daemon<\/strong> (<code>dockerd<\/code>) — фоновый процесс, который управляет образами, контейнерами, сетями и volume'ами. <strong>Docker client<\/strong> (команда <code>docker<\/code>) отправляет запросы демону через REST API, обычно по Unix-сокету <code>/var/run/docker.sock<\/code>.<\/p>\n<p><strong>Image (образ)<\/strong> — неизменяемый шаблон с файловой системой и метаданными приложения, собранный из слоёв. <strong>Container (контейнер)<\/strong> — запущенный экземпляр образа с собственным изолированным процессом, сетью и writable-слоем.<\/p>\n<p><strong>Registry (реестр)<\/strong> — хранилище образов (Docker Hub, приватный registry, GitLab Registry), откуда образы скачиваются (<code>pull<\/code>) и куда загружаются (<code>push<\/code>).<\/p>\n<pre><code>docker version        # версии клиента и демона\ndocker info            # состояние демона, драйверы\ndocker system df       # использование диска образами/контейнерами<\/code><\/pre>\n<table>\n<tr><th>Компонент<\/th><th>Роль<\/th><\/tr>\n<tr><td>daemon<\/td><td>управляет жизненным циклом объектов<\/td><\/tr>\n<tr><td>client<\/td><td>CLI-интерфейс к daemon<\/td><\/tr>\n<tr><td>registry<\/td><td>хранение и распространение образов<\/td><\/tr>\n<\/table>"}, {"title": "Команды: run, ps, logs, exec, rm, stop, start, inspect, stats", "level": "🟢 Junior", "explanation": "<p>Базовый набор команд для управления контейнерами покрывает весь жизненный цикл — от запуска до диагностики.<\/p>\n<ul>\n<li><code>docker run<\/code> — создаёт и запускает контейнер из образа<\/li>\n<li><code>docker ps<\/code> — список запущенных контейнеров (<code>-a<\/code> — включая остановленные)<\/li>\n<li><code>docker logs<\/code> — вывод stdout/stderr контейнера (<code>-f<\/code> для follow)<\/li>\n<li><code>docker exec<\/code> — выполнение команды внутри работающего контейнера<\/li>\n<li><code>docker stop<\/code> / <code>start<\/code> — плавная остановка (SIGTERM) и запуск<\/li>\n<li><code>docker rm<\/code> — удаление контейнера<\/li>\n<li><code>docker inspect<\/code> — полный JSON с метаданными (IP, mounts, env)<\/li>\n<li><code>docker stats<\/code> — CPU/memory/network в реальном времени<\/li>\n<\/ul>\n<p>Типичный сценарий отладки:<\/p>\n<pre><code>docker run -d --name web -p 8080:80 nginx\ndocker ps\ndocker logs -f web\ndocker exec -it web bash\ndocker inspect web | grep IPAddress\ndocker stop web && docker rm web<\/code><\/pre>\n<p>Флаг <strong>-d<\/strong> запускает в фоне, <strong>-it<\/strong> — интерактивный режим с TTY, необходимый для получения shell внутри контейнера.<\/p>"}, {"title": "Dockerfile: FROM, RUN, COPY, ADD, ENV, EXPOSE, CMD, ENTRYPOINT", "level": "🟢 Junior", "explanation": "<p><strong>Dockerfile<\/strong> — текстовый рецепт для сборки образа, где каждая инструкция создаёт новый слой.<\/p>\n<ul>\n<li><code>FROM<\/code> — базовый образ, первая обязательная инструкция<\/li>\n<li><code>RUN<\/code> — выполняет команду во время сборки (установка пакетов)<\/li>\n<li><code>COPY<\/code> — копирует файлы с хоста в образ<\/li>\n<li><code>ADD<\/code> — как COPY, но умеет распаковывать архивы и скачивать по URL (использовать осторожно)<\/li>\n<li><code>ENV<\/code> — переменные окружения, доступные в контейнере<\/li>\n<li><code>EXPOSE<\/code> — документирует порт (не публикует его автоматически)<\/li>\n<li><code>CMD<\/code> — команда по умолчанию, переопределяется при <code>docker run<\/code><\/li>\n<li><code>ENTRYPOINT<\/code> — фиксированная точка входа, CMD становится аргументами к ней<\/li>\n<\/ul>\n<pre><code>FROM node:20-alpine\nENV NODE_ENV=production\nCOPY package*.json ./\nRUN npm ci --omit=dev\nCOPY . .\nEXPOSE 3000\nENTRYPOINT [\"node\"]\nCMD [\"server.js\"]<\/code><\/pre>\n<p>Разница ENTRYPOINT/CMD важна: <code>docker run image script.js<\/code> заменит CMD, но сохранит <code>node<\/code> как ENTRYPOINT.<\/p>"}, {"title": "Слои образов: кеширование, порядок инструкций для оптимизации", "level": "🟢 Junior", "explanation": "<p>Образ Docker состоит из <strong>слоёв<\/strong> — каждая инструкция Dockerfile (кроме некоторых) создаёт новый read-only слой, который кешируется. При повторной сборке Docker проверяет, изменился ли слой; если нет — использует кеш, что резко ускоряет билд.<\/p>\n<p>Ключевое правило оптимизации: <strong>инструкции, которые меняются редко, должны идти раньше<\/strong>, а часто меняющиеся — позже. Классическая ошибка — копировать весь код проекта до установки зависимостей:<\/p>\n<pre><code># Плохо: любое изменение кода инвалидирует кеш npm install\nCOPY . .\nRUN npm install\n\n# Хорошо: кеш npm install сохраняется, если package.json не менялся\nCOPY package*.json ./\nRUN npm install\nCOPY . .<\/code><\/pre>\n<p>Также стоит объединять связанные RUN-команды в одну (через <code>&&<\/code>), чтобы не создавать лишние слои и корректно чистить кеш пакетного менеджера в том же слое:<\/p>\n<pre><code>RUN apt-get update && apt-get install -y curl     && rm -rf /var/lib/apt/lists/*<\/code><\/pre>\n<p>Слои хранятся в overlay-файловой системе, что позволяет разным образам делить общие базовые слои и экономить место на диске.<\/p>"}, {"title": "Сборка: docker build -t name:tag ., .dockerignore", "level": "🟢 Junior", "explanation": "<p>Сборка образа выполняется командой <code>docker build<\/code>, которая читает Dockerfile и context (директорию с файлами, доступными для COPY/ADD).<\/p>\n<pre><code>docker build -t myapp:1.0 .\ndocker build -t myapp:latest -f Dockerfile.prod .\ndocker build --no-cache -t myapp:1.0 .   # игнорировать кеш слоёв\ndocker build --build-arg VERSION=1.2 -t myapp .<\/code><\/pre>\n<p>Флаг <code>-t<\/code> задаёт имя и тег образа (<code>name:tag<\/code>), точка <code>.<\/code> — путь к build context. Docker отправляет весь context демону, поэтому важно исключать ненужные файлы через <strong><code>.dockerignore<\/code><\/strong> — работает аналогично <code>.gitignore<\/code> и уменьшает размер контекста, ускоряя сборку.<\/p>\n<pre><code># .dockerignore\nnode_modules\n.git\n*.log\n.env\ndist<\/code><\/pre>\n<p>Без <code>.dockerignore<\/code> в образ может попасть <code>node_modules<\/code> или <code>.git<\/code> — это раздувает образ и может привести к утечке секретов. Проверить итоговый размер образа можно командой <code>docker images<\/code>.<\/p>"}, {"title": "Docker Hub: push, pull, приватные образы, docker login", "level": "🟢 Junior", "explanation": "<p><strong>Docker Hub<\/strong> — публичный реестр образов по умолчанию. Работа с ним строится на трёх операциях: аутентификация, отправка и получение образов.<\/p>\n<pre><code>docker login                          # ввод логина/пароля или access token\ndocker tag myapp:1.0 user/myapp:1.0   # присвоить тег с namespace\ndocker push user/myapp:1.0            # загрузить в Hub\ndocker pull user/myapp:1.0            # скачать образ\ndocker logout<\/code><\/pre>\n<p>Для <strong>приватных образов<\/strong> нужен аккаунт с приватным репозиторием (бесплатный план ограничивает их количество) или собственный private registry. Для CI/CD рекомендуется использовать не пароль, а <strong>access token<\/strong>, созданный в настройках аккаунта — его легче ревокировать при компрометации.<\/p>\n<p>Официальные образы (<code>nginx<\/code>, <code>postgres<\/code>) не требуют namespace пользователя, а публикуются напрямую от имени Docker. Для собственных образов namespace обязателен: <code>docker.io/username/image:tag<\/code>.<\/p>\n<table><tr><th>Команда<\/th><th>Действие<\/th><\/tr>\n<tr><td>login/logout<\/td><td>аутентификация в registry<\/td><\/tr>\n<tr><td>tag<\/td><td>переименование локального образа под registry-путь<\/td><\/tr>\n<tr><td>push/pull<\/td><td>отправка/получение образа<\/td><\/tr>\n<\/table>"}, {"title": "Сети: bridge (default), host, none, custom network", "level": "🟢 Junior", "explanation": "<p>Docker предоставляет несколько сетевых драйверов, определяющих, как контейнеры взаимодействуют друг с другом и с внешним миром.<\/p>\n<ul>\n<li><strong>bridge<\/strong> — сеть по умолчанию; контейнеры получают приватные IP и общаются через виртуальный мост docker0<\/li>\n<li><strong>host<\/strong> — контейнер использует сетевой стек хоста напрямую, без изоляции портов (максимальная производительность, минимальная изоляция)<\/li>\n<li><strong>none<\/strong> — полная изоляция, нет сетевого интерфейса кроме loopback<\/li>\n<li><strong>custom network<\/strong> — пользовательская bridge-сеть с встроенным DNS: контейнеры находят друг друга по имени<\/li>\n<\/ul>\n<pre><code>docker network create app-net\ndocker run -d --network app-net --name db postgres\ndocker run -d --network app-net --name api myapp\n# внутри api доступен хост \"db\" по DNS-имени\ndocker network ls\ndocker network inspect app-net<\/code><\/pre>\n<p>Дефолтная bridge-сеть <strong>не поддерживает<\/strong> автоматический DNS между контейнерами — для этого нужна именно пользовательская сеть, созданная через <code>docker network create<\/code>. Это одна из причин, почему Compose всегда создаёт отдельную сеть для проекта.<\/p>"}, {"title": "Volumes: -v host:container, named volumes, tmpfs mounts", "level": "🟢 Junior", "explanation": "<p><strong>Volumes<\/strong> решают проблему персистентности данных, так как writable-слой контейнера уничтожается при его удалении.<\/p>\n<ul>\n<li><code>-v /host/path:/container/path<\/code> — bind mount, привязка конкретной директории хоста<\/li>\n<li><strong>named volumes<\/strong> — управляются Docker, хранятся в <code>/var/lib/docker/volumes/<\/code>, переносимы между хостами через drivers<\/li>\n<li><strong>tmpfs mounts<\/strong> — данные хранятся только в памяти хоста, исчезают при остановке контейнера (для секретов/кешей)<\/li>\n<\/ul>\n<pre><code>docker volume create dbdata\ndocker run -d -v dbdata:/var/lib/postgresql/data postgres\ndocker run -d -v $(pwd)/config:/etc/app/config:ro myapp\ndocker run -d --tmpfs /run myapp\ndocker volume ls\ndocker volume inspect dbdata\ndocker volume rm dbdata<\/code><\/pre>\n<p>Named volumes предпочтительнее bind mounts в production: Docker сам управляет их жизненным циклом, драйверами (NFS, cloud storage) и правами доступа. Bind mounts удобны для разработки — код с хоста мгновенно виден в контейнере. Флаг <code>:ro<\/code> монтирует volume в режиме \"только чтение\".<\/p>"}, {"title": "Docker Compose: services, networks, volumes, depends_on, env_file", "level": "🟢 Junior", "explanation": "<p><strong>Docker Compose<\/strong> — инструмент для описания и запуска multi-container приложений через один YAML-файл.<\/p>\n<ul>\n<li><code>services<\/code> — определение каждого контейнера (образ, порты, команда)<\/li>\n<li><code>networks<\/code> — кастомные сети для изоляции групп сервисов<\/li>\n<li><code>volumes<\/code> — именованные volume'ы, доступные нескольким сервисам<\/li>\n<li><code>depends_on<\/code> — порядок запуска (не гарантирует готовность приложения, только запуск контейнера)<\/li>\n<li><code>env_file<\/code> — подключение переменных окружения из файла<\/li>\n<\/ul>\n<pre><code>services:\n  web:\n    build: .\n    ports: [\"8080:80\"]\n    depends_on: [db]\n    env_file: .env\n  db:\n    image: postgres:16\n    volumes: [\"dbdata:/var/lib/postgresql/data\"]\n    networks: [backend]\nvolumes:\n  dbdata:\nnetworks:\n  backend:<\/code><\/pre>\n<pre><code>docker compose up -d\ndocker compose logs -f web\ndocker compose down -v<\/code><\/pre>\n<p>Для реальной готовности сервиса вместо простого <code>depends_on<\/code> используют <code>condition: service_healthy<\/code> в связке с healthcheck.<\/p>"}, {"title": "Multi-stage builds: AS builder, уменьшение итогового образа", "level": "🟡 Middle", "explanation": "<p><strong>Multi-stage builds<\/strong> позволяют использовать несколько инструкций <code>FROM<\/code> в одном Dockerfile, чтобы отделить окружение сборки от окружения выполнения и получить минимальный итоговый образ.<\/p>\n<pre><code>FROM golang:1.22 AS builder\nWORKDIR /src\nCOPY . .\nRUN go build -o app .\n\nFROM alpine:3.19\nCOPY --from=builder /src/app /usr/local/bin/app\nENTRYPOINT [\"app\"]<\/code><\/pre>\n<p>На первом этапе (<code>AS builder<\/code>) устанавливаются компиляторы, зависимости, исходники — весь этот \"тяжёлый\" слой отбрасывается. На финальный этап через <code>COPY --from=builder<\/code> переносится только собранный бинарник. Итоговый образ содержит лишь runtime-зависимости, а не весь toolchain.<\/p>\n<p>Это критично для production: образ на Go/Rust может уменьшиться с ~900 МБ до ~15 МБ. Можно использовать более двух стадий — например, отдельно для тестов, отдельно для линтинга — а собирать финальный образ только из нужной стадии.<\/p>"}, {"title": "Security: rootless mode, --read-only, --cap-drop=ALL, USER директива", "level": "🟡 Middle", "explanation": "<p>По умолчанию Docker-контейнеры запускаются с root-правами демона, что создаёт риски при компрометации приложения. Ряд практик усиливает изоляцию.<\/p>\n<ul>\n<li><strong>rootless mode<\/strong> — сам Docker daemon работает без root на хосте, снижая ущерб при побеге из контейнера<\/li>\n<li><code>--read-only<\/code> — корневая файловая система контейнера доступна только на чтение, запись возможна лишь во явно смонтированные volume'ы/tmpfs<\/li>\n<li><code>--cap-drop=ALL<\/code> — убирает все Linux capabilities (например, CAP_NET_RAW, CAP_SYS_ADMIN), добавляя обратно только нужные через <code>--cap-add<\/code><\/li>\n<li><strong>USER<\/strong> в Dockerfile — переключает процесс внутри контейнера с root на непривилегированного пользователя<\/li>\n<\/ul>\n<pre><code># Dockerfile\nRUN adduser -D appuser\nUSER appuser<\/code><\/pre>\n<pre><code>docker run --read-only --cap-drop=ALL   --tmpfs /tmp -d myapp<\/code><\/pre>\n<p>Комбинация всех этих мер значительно снижает поверхность атаки: даже при RCE в приложении злоумышленник не сможет писать на диск, получить root или использовать привилегированные syscalls.<\/p>"}, {"title": "Resource limits: --memory, --cpus, --pids-limit", "level": "🟡 Middle", "explanation": "<p>Без ограничений контейнер может потреблять все ресурсы хоста, вызывая \"шумного соседа\" (noisy neighbor) и деградацию других сервисов. Docker позволяет ограничивать ресурсы на уровне cgroups.<\/p>\n<ul>\n<li><code>--memory<\/code> — жёсткий лимит памяти; при превышении контейнер получает OOM kill<\/li>\n<li><code>--cpus<\/code> — лимит на количество ядер CPU (может быть дробным, например 0.5)<\/li>\n<li><code>--pids-limit<\/code> — максимальное число процессов/потоков внутри контейнера, защита от fork-бомб<\/li>\n<\/ul>\n<pre><code>docker run -d --memory=512m --memory-swap=512m   --cpus=1.5 --pids-limit=200 myapp<\/code><\/pre>\n<p><code>--memory-swap<\/code> равное <code>--memory<\/code> отключает использование swap. Проверить текущее использование ресурсов можно через <code>docker stats<\/code>, которая выводит CPU%, MEM USAGE/LIMIT в реальном времени.<\/p>\n<table><tr><th>Флаг<\/th><th>Что ограничивает<\/th><\/tr>\n<tr><td>--memory<\/td><td>оперативная память<\/td><\/tr>\n<tr><td>--cpus<\/td><td>доля CPU-времени<\/td><\/tr>\n<tr><td>--pids-limit<\/td><td>число процессов<\/td><\/tr>\n<\/table>\n<p>В Docker Compose аналогичные лимиты задаются в блоке <code>deploy.resources.limits<\/code>.<\/p>"}, {"title": "Health checks: HEALTHCHECK в Dockerfile, --health-cmd", "level": "🟡 Middle", "explanation": "<p><strong>HEALTHCHECK<\/strong> — инструкция, позволяющая Docker самому определять, работает ли приложение внутри контейнера корректно, а не только запущен ли процесс.<\/p>\n<pre><code># Dockerfile\nHEALTHCHECK --interval=30s --timeout=3s --retries=3   CMD curl -f http://localhost/health || exit 1<\/code><\/pre>\n<p>Параметры: <code>--interval<\/code> — периодичность проверки, <code>--timeout<\/code> — максимальное время ожидания ответа, <code>--retries<\/code> — сколько неудач подряд нужно для статуса <em>unhealthy<\/em>, <code>--start-period<\/code> — время на прогрев перед началом отсчёта неудач.<\/p>\n<p>Тот же эффект достигается при запуске без пересборки образа:<\/p>\n<pre><code>docker run --health-cmd=\"curl -f http://localhost/ || exit 1\"   --health-interval=30s --health-retries=3 -d myapp\ndocker ps   # статус healthy/unhealthy в столбце STATUS\ndocker inspect --format='{{.State.Health.Status}}' myapp<\/code><\/pre>\n<p>В Docker Compose статус healthcheck используется вместе с <code>depends_on: condition: service_healthy<\/code>, чтобы зависимые сервисы стартовали только после реальной готовности, а не просто после запуска контейнера.<\/p>"}, {"title": "Сканирование: trivy image name, docker scout cves", "level": "🟡 Middle", "explanation": "<p>Образы Docker часто содержат уязвимости в базовых слоях (ОС, системные библиотеки) или в зависимостях приложения. Сканеры безопасности анализируют слои образа и сверяют пакеты с базами CVE.<\/p>\n<pre><code>trivy image myapp:1.0\ntrivy image --severity HIGH,CRITICAL myapp:1.0\ntrivy image --exit-code 1 --severity CRITICAL myapp:1.0\n\ndocker scout cves myapp:1.0\ndocker scout recommendations myapp:1.0<\/code><\/pre>\n<p><strong>Trivy<\/strong> — open-source сканер от Aqua Security, проверяет ОС-пакеты, зависимости языков (npm, pip, go.mod) и даже конфигурации IaC. Флаг <code>--exit-code 1<\/code> делает команду пригодной для CI/CD gate — pipeline падает при найденных критических уязвимостях.<\/p>\n<p><strong>Docker Scout<\/strong> — встроенное решение от самого Docker, интегрированное с Docker Hub и Desktop, показывает не только CVE, но и рекомендации по обновлению базового образа для уменьшения количества уязвимостей.<\/p>\n<p>Сканирование рекомендуется встраивать в CI pipeline перед push образа в registry, а не только на этапе ручной проверки.<\/p>"}], "quiz": [{"q": "Какой компонент Docker управляет жизненным циклом образов и контейнеров и общается с клиентом через REST API?", "options": ["Docker Compose", "Docker Hub", "containerd shim", "Docker daemon (dockerd)"], "answer": 3, "explain": "Daemon (dockerd) — фоновый процесс, принимающий команды от клиента через Unix-сокет и управляющий образами, контейнерами, сетями и volume'ами."}, {"q": "Какая команда покажет CPU, память и сетевую активность работающих контейнеров в реальном времени?", "options": ["docker ps -a", "docker top", "docker stats", "docker inspect"], "answer": 2, "explain": "docker stats выводит live-поток метрик использования ресурсов по каждому контейнеру."}, {"q": "В чём главное отличие ENTRYPOINT от CMD в Dockerfile?", "options": ["ENTRYPOINT выполняется только при сборке образа", "ENTRYPOINT работает только в Alpine-образах", "CMD нельзя переопределить при docker run", "ENTRYPOINT задаёт фиксированную команду, CMD — аргументы по умолчанию, которые легко переопределить"], "answer": 3, "explain": "ENTRYPOINT определяет исполняемый процесс контейнера, а CMD передаёт ему аргументы по умолчанию; docker run легко подменяет CMD, но не ENTRYPOINT без флага --entrypoint."}, {"q": "Почему в Dockerfile рекомендуется копировать package.json и ставить зависимости раньше, чем копировать весь исходный код?", "options": ["Чтобы уменьшить количество слоёв образа до одного", "Потому что COPY не работает после RUN", "Чтобы кеш слоя с установкой зависимостей не инвалидировался при каждом изменении кода", "Чтобы избежать использования .dockerignore"], "answer": 2, "explain": "Docker кеширует слои по порядку инструкций; если зависимости копируются и устанавливаются раньше редко меняющегося кода, кеш npm/pip install переиспользуется при пересборке."}, {"q": "Какой файл позволяет исключить ненужные файлы (node_modules, .git) из контекста сборки docker build?", "options": [".gitignore", "Dockerfile.ignore", "docker-compose.override.yml", ".dockerignore"], "answer": 3, "explain": ".dockerignore работает аналогично .gitignore и уменьшает размер build context, ускоряя сборку и снижая риск утечки секретов."}, {"q": "Что необходимо выполнить перед docker push образа в приватный репозиторий Docker Hub?", "options": ["docker build --private", "docker volume create", "docker network create", "docker login"], "answer": 3, "explain": "docker login аутентифицирует клиента в registry; без неё push в приватный репозиторий будет отклонён."}, {"q": "Какая сетевая особенность отличает пользовательскую (custom) bridge-сеть от дефолтной bridge-сети Docker?", "options": ["Дефолтная bridge-сеть быстрее из-за отсутствия NAT", "Custom bridge-сеть не поддерживает публикацию портов", "Custom bridge-сеть предоставляет встроенный DNS — контейнеры находят друг друга по имени", "Custom bridge-сеть всегда использует host network stack"], "answer": 2, "explain": "В дефолтной bridge-сети нет автоматического DNS между контейнерами; в пользовательской сети Docker предоставляет DNS resolution по именам контейнеров."}, {"q": "Чем named volume отличается от tmpfs mount?", "options": ["Named volume доступен только в режиме read-only", "Named volume нельзя использовать в Docker Compose", "Named volume хранит данные на диске хоста персистентно, tmpfs — только в памяти и исчезает после остановки контейнера", "tmpfs можно использовать лишь в Windows-контейнерах"], "answer": 2, "explain": "Named volumes управляются Docker и хранятся на диске (persist между перезапусками), tmpfs существует только в RAM хоста и теряется при остановке контейнера."}, {"q": "Что делает опция depends_on в Docker Compose?", "options": ["Определяет порядок запуска контейнеров, но не гарантирует готовность приложения внутри", "Автоматически настраивает healthcheck для сервиса", "Гарантирует, что зависимый сервис полностью готов принимать запросы", "Ограничивает ресурсы CPU и памяти для сервиса"], "answer": 0, "explain": "depends_on контролирует лишь порядок старта контейнеров; для ожидания реальной готовности нужен healthcheck и condition: service_healthy."}, {"q": "Зачем в Dockerfile применяют multi-stage builds с несколькими инструкциями FROM?", "options": ["Чтобы обойти ограничение на использование ENTRYPOINT", "Чтобы автоматически включить HEALTHCHECK", "Чтобы отделить окружение сборки от runtime и получить минимальный итоговый образ", "Чтобы одновременно запускать несколько контейнеров из одного образа"], "answer": 2, "explain": "Multi-stage build позволяет использовать один stage для компиляции с полным toolchain, а в финальный образ копировать только результат сборки через COPY --from, сильно уменьшая размер образа."}, {"q": "Какая опция docker run переводит корневую файловую систему контейнера в режим 'только чтение', требуя явных volume/tmpfs для записи?", "options": ["--pids-limit", "--cap-drop=ALL", "--memory-swap", "--read-only"], "answer": 3, "explain": "--read-only делает root filesystem неизменяемой; запись возможна только в явно смонтированные writable-точки (volume, tmpfs)."}, {"q": "Какая команда сканирует образ Docker на известные уязвимости (CVE) и может быть настроена как gate в CI pipeline через --exit-code?", "options": ["docker diff myapp:1.0", "docker history myapp:1.0", "docker inspect myapp:1.0", "trivy image myapp:1.0"], "answer": 3, "explain": "trivy image анализирует слои образа и сверяет пакеты с базами CVE; флаг --exit-code 1 при найденных критических уязвимостях прерывает CI pipeline."}], "id": 4, "pi": 1}, {"phase": "Phase 2 — Docker + Kubernetes", "section": "☸️ Kubernetes — Основы", "topics": [{"title": "Архитектура: API Server, etcd, Scheduler, Controller Manager, kubelet", "level": "🟢 Junior", "explanation": "<p>Kubernetes-кластер состоит из <strong>control plane<\/strong> и <strong>worker-узлов<\/strong>. Control plane принимает решения о состоянии кластера, worker-узлы выполняют реальные нагрузки.<\/p><ul><li><strong>API Server<\/strong> — единая точка входа для всех запросов (kubectl, контроллеры, другие компоненты обращаются только к нему).<\/li><li><strong>etcd<\/strong> — распределённое key-value хранилище, где хранится всё состояние кластера.<\/li><li><strong>Scheduler<\/strong> — выбирает узел для нового Pod на основе ресурсов, affinity, taints.<\/li><li><strong>Controller Manager<\/strong> — набор контроллеров (Deployment, ReplicaSet, Node), которые приводят фактическое состояние к желаемому.<\/li><li><strong>kubelet<\/strong> — агент на каждом worker-узле, следит за Pod'ами и общается с container runtime (containerd/CRI-O).<\/li><\/ul><p>Проверить компоненты control plane можно так:<\/p><pre><code>kubectl get componentstatuses\nkubectl -n kube-system get pods<\/code><\/pre><p>Понимание архитектуры критично для диагностики: если Pod не создаётся, проверяют цепочку API Server -> Scheduler -> kubelet.<\/p>"}, {"title": "kubectl: apply, get, describe, logs, exec, delete, port-forward, cp", "level": "🟢 Junior", "explanation": "<p><code>kubectl<\/code> — основной CLI-инструмент для работы с кластером. Он транслирует команды в вызовы API Server.<\/p><table><tr><th>Команда<\/th><th>Назначение<\/th><\/tr><tr><td><code>kubectl apply -f file.yaml<\/code><\/td><td>Создать/обновить ресурс декларативно<\/td><\/tr><tr><td><code>kubectl get pods -o wide<\/code><\/td><td>Список ресурсов с подробностями<\/td><\/tr><tr><td><code>kubectl describe pod name<\/code><\/td><td>Детали и события объекта<\/td><\/tr><tr><td><code>kubectl logs pod-name -f<\/code><\/td><td>Логи контейнера в реальном времени<\/td><\/tr><tr><td><code>kubectl exec -it pod -- sh<\/code><\/td><td>Зайти внутрь контейнера<\/td><\/tr><tr><td><code>kubectl delete -f file.yaml<\/code><\/td><td>Удалить ресурс<\/td><\/tr><tr><td><code>kubectl port-forward pod 8080:80<\/code><\/td><td>Проброс порта на локальную машину<\/td><\/tr><tr><td><code>kubectl cp pod:/path ./local<\/code><\/td><td>Копирование файлов<\/td><\/tr><\/table><p>Пример практического сценария:<\/p><pre><code>kubectl apply -f deployment.yaml\nkubectl get pods -n prod\nkubectl describe pod myapp-abc123 -n prod\nkubectl logs myapp-abc123 --previous<\/code><\/pre><p><strong>describe<\/strong> и <strong>logs --previous<\/strong> — первое, что смотрят при CrashLoopBackOff.<\/p>"}, {"title": "Pod: жизненный цикл, multi-container pods, init containers", "level": "🟢 Junior", "explanation": "<p><strong>Pod<\/strong> — минимальная единица развёртывания в Kubernetes, обёртка над одним или несколькими контейнерами с общей сетью и storage.<\/p><p>Фазы жизненного цикла: <code>Pending<\/code> -> <code>Running<\/code> -> <code>Succeeded<\/code>/<code>Failed<\/code>. Статусы контейнеров внутри: <code>Waiting<\/code>, <code>Running<\/code>, <code>Terminated<\/code>.<\/p><p><strong>Multi-container Pod<\/strong> используется в паттернах sidecar (логирование, proxy) — контейнеры делят network namespace и volumes:<\/p><pre><code>apiVersion: v1\nkind: Pod\nmetadata:\n  name: web-with-sidecar\nspec:\n  initContainers:\n  - name: init-db\n    image: busybox\n    command: [&quot;sh&quot;, &quot;-c&quot;, &quot;until nc -z db 5432; do sleep 1; done&quot;]\n  containers:\n  - name: app\n    image: myapp:1.0\n  - name: log-shipper\n    image: fluent-bit:latest<\/code><\/pre><p><strong>Init containers<\/strong> выполняются последовательно до старта основных контейнеров и должны завершиться успешно (exit 0). Используются для подготовки окружения: ожидание зависимостей, миграции БД, загрузка конфигов.<\/p><p>Проверка состояния:<\/p><pre><code>kubectl get pod web-with-sidecar -o jsonpath='{.status.phase}'<\/code><\/pre>"}, {"title": "Deployment: replicas, rolling update (maxSurge/maxUnavailable), rollback", "level": "🟢 Junior", "explanation": "<p><strong>Deployment<\/strong> управляет ReplicaSet'ами и обеспечивает декларативное обновление приложений без downtime.<\/p><pre><code>apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: myapp\nspec:\n  replicas: 3\n  strategy:\n    type: RollingUpdate\n    rollingUpdate:\n      maxSurge: 1\n      maxUnavailable: 0\n  selector:\n    matchLabels: {app: myapp}\n  template:\n    metadata:\n      labels: {app: myapp}\n    spec:\n      containers:\n      - name: myapp\n        image: myapp:1.2.0<\/code><\/pre><ul><li><strong>replicas<\/strong> — желаемое число Pod'ов.<\/li><li><strong>maxSurge<\/strong> — сколько лишних Pod'ов можно создать сверх replicas во время обновления.<\/li><li><strong>maxUnavailable<\/strong> — сколько Pod'ов может быть недоступно одновременно.<\/li><\/ul><p>Команды управления:<\/p><pre><code>kubectl rollout status deployment/myapp\nkubectl rollout history deployment/myapp\nkubectl rollout undo deployment/myapp\nkubectl rollout undo deployment/myapp --to-revision=2<\/code><\/pre><p>Rolling update заменяет Pod'ы постепенно, а <code>rollout undo<\/code> откатывает к предыдущей ревизии, если новая версия оказалась неработоспособной.<\/p>"}, {"title": "Service: ClusterIP, NodePort, LoadBalancer, ExternalName", "level": "🟢 Junior", "explanation": "<p><strong>Service<\/strong> предоставляет стабильный сетевой адрес для набора Pod'ов, которые постоянно меняются (пересоздаются, масштабируются).<\/p><table><tr><th>Тип<\/th><th>Описание<\/th><\/tr><tr><td><code>ClusterIP<\/code><\/td><td>Внутренний IP, доступен только внутри кластера (по умолчанию)<\/td><\/tr><tr><td><code>NodePort<\/code><\/td><td>Открывает порт (30000-32767) на каждом узле<\/td><\/tr><tr><td><code>LoadBalancer<\/code><\/td><td>Заказывает внешний балансировщик у облачного провайдера<\/td><\/tr><tr><td><code>ExternalName<\/code><\/td><td>DNS CNAME на внешний сервис, без proxy<\/td><\/tr><\/table><pre><code>apiVersion: v1\nkind: Service\nmetadata:\n  name: myapp-svc\nspec:\n  type: ClusterIP\n  selector:\n    app: myapp\n  ports:\n  - port: 80\n    targetPort: 8080<\/code><\/pre><p>Service находит Pod'ы через <strong>selector<\/strong> по labels, а не по имени — это основа loose coupling в Kubernetes. Проверка эндпоинтов:<\/p><pre><code>kubectl get endpoints myapp-svc\nkubectl get svc myapp-svc -o wide<\/code><\/pre><p>Если endpoints пустой — значит selector не совпадает с labels Pod'ов.<\/p>"}, {"title": "ConfigMap: создание, монтирование через env и volume", "level": "🟢 Junior", "explanation": "<p><strong>ConfigMap<\/strong> хранит несекретные конфигурационные данные отдельно от образа контейнера — принцип разделения кода и конфигурации.<\/p><pre><code>kubectl create configmap app-config --from-literal=LOG_LEVEL=info --from-file=nginx.conf<\/code><\/pre><p>Использование как переменных окружения:<\/p><pre><code>envFrom:\n- configMapRef:\n    name: app-config<\/code><\/pre><p>Использование как файла через volume:<\/p><pre><code>volumes:\n- name: config-vol\n  configMap:\n    name: app-config\nvolumeMounts:\n- name: config-vol\n  mountPath: /etc/app/config<\/code><\/pre><p>Важное отличие: при обновлении ConfigMap переменные окружения <strong>не обновятся<\/strong> без перезапуска Pod'а, а файлы через volume обновятся автоматически (с задержкой ~60 секунд через kubelet sync).<\/p><p>Просмотр содержимого:<\/p><pre><code>kubectl get configmap app-config -o yaml<\/code><\/pre>"}, {"title": "Secret: типы (Opaque, TLS, docker-registry), base64, sealed-secrets", "level": "🟢 Junior", "explanation": "<p><strong>Secret<\/strong> хранит конфиденциальные данные: пароли, токены, сертификаты. По умолчанию данные кодируются в <strong>base64<\/strong> (не шифрование!), поэтому нужен RBAC и шифрование etcd at-rest.<\/p><table><tr><th>Тип<\/th><th>Назначение<\/th><\/tr><tr><td><code>Opaque<\/code><\/td><td>Произвольные ключ-значения (пароли, API-ключи)<\/td><\/tr><tr><td><code>kubernetes.io/tls<\/code><\/td><td>TLS-сертификат и приватный ключ<\/td><\/tr><tr><td><code>kubernetes.io/dockerconfigjson<\/code><\/td><td>Учётные данные для приватного registry<\/td><\/tr><\/table><pre><code>kubectl create secret generic db-creds --from-literal=password=S3cr3t\nkubectl create secret tls tls-secret --cert=tls.crt --key=tls.key\nkubectl create secret docker-registry regcred --docker-server=registry.example.com --docker-username=user --docker-password=pass<\/code><\/pre><p>Так как base64 легко декодировать (<code>echo &lt;str&gt; | base64 -d<\/code>), для GitOps применяют <strong>sealed-secrets<\/strong> (Bitnami) — Secret шифруется публичным ключом и безопасно хранится в Git, расшифровка происходит только контроллером в кластере.<\/p>"}, {"title": "Namespace: изоляция, context, -n флаг, ResourceQuota", "level": "🟢 Junior", "explanation": "<p><strong>Namespace<\/strong> — логическая изоляция ресурсов внутри одного физического кластера. Используется для разделения команд, окружений (dev/staging/prod) или проектов.<\/p><pre><code>kubectl create namespace staging\nkubectl get pods -n staging\nkubectl config set-context --current --namespace=staging<\/code><\/pre><p>Большинство ресурсов (Pod, Deployment, Service, ConfigMap) — namespaced, но некоторые (Node, PersistentVolume, ClusterRole) — кластерные, namespace на них не влияет.<\/p><p><strong>ResourceQuota<\/strong> ограничивает суммарное потребление ресурсов в namespace:<\/p><pre><code>apiVersion: v1\nkind: ResourceQuota\nmetadata:\n  name: staging-quota\n  namespace: staging\nspec:\n  hard:\n    requests.cpu: &quot;4&quot;\n    requests.memory: 8Gi\n    pods: &quot;20&quot;<\/code><\/pre><p>Проверка использования:<\/p><pre><code>kubectl describe resourcequota staging-quota -n staging<\/code><\/pre><p>Namespace — базовый инструмент multi-tenancy, часто комбинируется с RBAC и NetworkPolicy.<\/p>"}, {"title": "YAML манифесты: apiVersion, kind, metadata, spec, labels, annotations", "level": "🟢 Junior", "explanation": "<p>Любой объект Kubernetes описывается декларативным YAML-манифестом с четырьмя обязательными полями верхнего уровня.<\/p><pre><code>apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: myapp\n  namespace: prod\n  labels:\n    app: myapp\n    tier: backend\n  annotations:\n    description: &quot;Основной backend-сервис&quot;\nspec:\n  replicas: 2\n  ...<\/code><\/pre><ul><li><strong>apiVersion<\/strong> — версия API-группы (<code>v1<\/code>, <code>apps/v1<\/code>, <code>networking.k8s.io/v1<\/code>).<\/li><li><strong>kind<\/strong> — тип ресурса (Pod, Service, Deployment, ConfigMap).<\/li><li><strong>metadata<\/strong> — имя, namespace, labels, annotations.<\/li><li><strong>spec<\/strong> — желаемое состояние объекта (специфично для каждого kind).<\/li><\/ul><p><strong>Labels<\/strong> используются для отбора объектов (selector, kubectl -l), <strong>annotations<\/strong> — для метаданных без функциональной роли (описание, ссылки, конфигурация инструментов вроде Prometheus).<\/p><pre><code>kubectl get pods -l app=myapp\nkubectl apply -f manifest.yaml --dry-run=client -o yaml<\/code><\/pre><p><code>--dry-run<\/code> позволяет проверить манифест перед применением.<\/p>"}, {"title": "Liveness probe: httpGet, exec, tcpSocket — что и когда", "level": "🟢 Junior", "explanation": "<p><strong>Liveness probe<\/strong> определяет, жив ли контейнер. Если проверка проваливается несколько раз подряд, kubelet перезапускает контейнер.<\/p><pre><code>livenessProbe:\n  httpGet:\n    path: /healthz\n    port: 8080\n  initialDelaySeconds: 10\n  periodSeconds: 5\n  failureThreshold: 3<\/code><\/pre><table><tr><th>Тип<\/th><th>Когда использовать<\/th><\/tr><tr><td><code>httpGet<\/code><\/td><td>Веб-сервисы с health-эндпоинтом, успех = код 200-399<\/td><\/tr><tr><td><code>exec<\/code><\/td><td>Произвольная команда внутри контейнера, успех = exit 0<\/td><\/tr><tr><td><code>tcpSocket<\/code><\/td><td>Проверка открытости TCP-порта (для БД, TCP-сервисов)<\/td><\/tr><\/table><p>Пример <code>exec<\/code>:<\/p><pre><code>livenessProbe:\n  exec:\n    command: [&quot;cat&quot;, &quot;/tmp/healthy&quot;]<\/code><\/pre><p><strong>Важно:<\/strong> неправильно настроенный liveness (слишком строгий или без initialDelaySeconds) вызывает бесконечные перезапуски (CrashLoopBackOff), особенно у приложений с долгим стартом.<\/p>"}, {"title": "Readiness probe: отличие от liveness, startup probe", "level": "🟢 Junior", "explanation": "<p><strong>Readiness probe<\/strong> определяет, готов ли Pod принимать трафик. В отличие от liveness, при провале Pod не перезапускается, а просто удаляется из Endpoints Service — трафик перестаёт на него направляться.<\/p><pre><code>readinessProbe:\n  httpGet:\n    path: /ready\n    port: 8080\n  periodSeconds: 5\n  failureThreshold: 2<\/code><\/pre><table><tr><th>Probe<\/th><th>Действие при провале<\/th><\/tr><tr><td>Liveness<\/td><td>Перезапуск контейнера<\/td><\/tr><tr><td>Readiness<\/td><td>Исключение из Service (без перезапуска)<\/td><\/tr><tr><td>Startup<\/td><td>Блокирует liveness/readiness до успеха<\/td><\/tr><\/table><p><strong>Startup probe<\/strong> решает проблему медленно стартующих приложений — liveness не срабатывает, пока startup probe не пройдёт успешно:<\/p><pre><code>startupProbe:\n  httpGet:\n    path: /healthz\n    port: 8080\n  failureThreshold: 30\n  periodSeconds: 10<\/code><\/pre><p>Это позволяет дать приложению до 300 секунд на старт без риска ложного перезапуска от liveness.<\/p>"}, {"title": "Resource requests/limits: CPU (m), memory (Mi/Gi), OOMKilled", "level": "🟢 Junior", "explanation": "<p><strong>requests<\/strong> — гарантированный минимум ресурсов, используется Scheduler'ом для выбора узла. <strong>limits<\/strong> — максимум, который контейнеру не разрешат превысить.<\/p><pre><code>resources:\n  requests:\n    cpu: 250m\n    memory: 256Mi\n  limits:\n    cpu: 500m\n    memory: 512Mi<\/code><\/pre><p>CPU измеряется в milli-cores: <code>250m<\/code> = 0.25 ядра. Memory — в <code>Mi<\/code> (мебибайты) или <code>Gi<\/code> (гибибайты).<\/p><p>Поведение при превышении:<\/p><ul><li><strong>CPU<\/strong> — контейнер throttling'ится (замедляется), не убивается.<\/li><li><strong>Memory<\/strong> — контейнер получает <strong>OOMKilled<\/strong> (сигнал SIGKILL) и перезапускается.<\/li><\/ul><p>Диагностика OOMKilled:<\/p><pre><code>kubectl describe pod myapp-abc123\n# Last State: Terminated, Reason: OOMKilled\n\nkubectl top pod myapp-abc123<\/code><\/pre><p>Если requests не указаны — Pod получает QoS class <code>BestEffort<\/code> и первым будет убит при нехватке ресурсов на узле.<\/p>"}, {"title": "StatefulSet: headless service, volumeClaimTemplates, ordinal index", "level": "🟡 Middle", "explanation": "<p><strong>StatefulSet<\/strong> предназначен для stateful-приложений (БД, Kafka, Zookeeper), где важны стабильная сетевая идентичность и постоянное хранилище для каждой реплики.<\/p><pre><code>apiVersion: apps/v1\nkind: StatefulSet\nmetadata:\n  name: postgres\nspec:\n  serviceName: postgres-headless\n  replicas: 3\n  selector:\n    matchLabels: {app: postgres}\n  template:\n    metadata: {labels: {app: postgres}}\n    spec:\n      containers:\n      - name: postgres\n        image: postgres:16\n  volumeClaimTemplates:\n  - metadata: {name: data}\n    spec:\n      accessModes: [&quot;ReadWriteOnce&quot;]\n      resources: {requests: {storage: 10Gi}}<\/code><\/pre><p>Ключевые особенности:<\/p><ul><li>Каждый Pod получает стабильное имя с <strong>ordinal index<\/strong>: <code>postgres-0<\/code>, <code>postgres-1<\/code>, <code>postgres-2<\/code>.<\/li><li><strong>headless Service<\/strong> (<code>clusterIP: None<\/code>) даёт прямой DNS-адрес каждому Pod'у: <code>postgres-0.postgres-headless<\/code>.<\/li><li><strong>volumeClaimTemplates<\/strong> создаёт отдельный PVC для каждой реплики, который сохраняется при пересоздании Pod'а.<\/li><li>Pod'ы создаются и удаляются последовательно (ordinal order), в отличие от Deployment.<\/li><\/ul>"}, {"title": "DaemonSet: запуск на каждом узле, tolerations", "level": "🟡 Middle", "explanation": "<p><strong>DaemonSet<\/strong> гарантирует, что копия Pod'а запущена на каждом (или отобранном подмножестве) узле кластера — идеально для агентов инфраструктуры: log collectors (Fluentd), monitoring (Node Exporter), CNI-плагинов.<\/p><pre><code>apiVersion: apps/v1\nkind: DaemonSet\nmetadata:\n  name: node-exporter\nspec:\n  selector:\n    matchLabels: {app: node-exporter}\n  template:\n    metadata: {labels: {app: node-exporter}}\n    spec:\n      tolerations:\n      - key: node-role.kubernetes.io/control-plane\n        effect: NoSchedule\n      containers:\n      - name: node-exporter\n        image: prom/node-exporter<\/code><\/pre><p>Master-узлы обычно имеют <strong>taint<\/strong> <code>NoSchedule<\/code>, чтобы обычные Pod'ы туда не попадали. Чтобы DaemonSet запускался и на control-plane узлах (например, для сбора метрик со всех узлов), добавляют <strong>toleration<\/strong>, которая &quot;терпит&quot; этот taint.<\/p><p>Управление и диагностика:<\/p><pre><code>kubectl get daemonset -A\nkubectl rollout status daemonset/node-exporter<\/code><\/pre><p>При добавлении нового узла в кластер DaemonSet автоматически разворачивает на нём свой Pod без ручного вмешательства.<\/p>"}, {"title": "PersistentVolume / PVC / StorageClass: dynamic provisioning", "level": "🟡 Middle", "explanation": "<p>Kubernetes отделяет запрос на хранилище от его физической реализации через три сущности.<\/p><ul><li><strong>PersistentVolume (PV)<\/strong> — реальный кусок хранилища в кластере (NFS, EBS, Ceph).<\/li><li><strong>PersistentVolumeClaim (PVC)<\/strong> — запрос пользователя на хранилище определённого размера и режима доступа.<\/li><li><strong>StorageClass<\/strong> — шаблон для <strong>динамического<\/strong> создания PV по запросу PVC, без ручного администрирования.<\/li><\/ul><pre><code>apiVersion: v1\nkind: PersistentVolumeClaim\nmetadata:\n  name: data-pvc\nspec:\n  storageClassName: fast-ssd\n  accessModes: [&quot;ReadWriteOnce&quot;]\n  resources:\n    requests: {storage: 20Gi}<\/code><\/pre><p>При создании такого PVC provisioner (например, <code>ebs.csi.aws.com<\/code>), указанный в StorageClass, автоматически создаёт подходящий PV.<\/p><pre><code>kubectl get storageclass\nkubectl get pvc\nkubectl describe pvc data-pvc<\/code><\/pre><p>Режимы доступа: <code>ReadWriteOnce<\/code> (один узел), <code>ReadOnlyMany<\/code>, <code>ReadWriteMany<\/code> (несколько узлов, требует NFS/CephFS). Без dynamic provisioning администратор создаёт PV вручную заранее (static provisioning).<\/p>"}, {"title": "Ingress: path routing, host routing, TLS, nginx-ingress controller", "level": "🟡 Middle", "explanation": "<p><strong>Ingress<\/strong> предоставляет HTTP/HTTPS-маршрутизацию извне кластера к Service'ам, заменяя множество LoadBalancer одним точкой входа. Требует установленного <strong>Ingress Controller<\/strong> (nginx-ingress, Traefik).<\/p><pre><code>apiVersion: networking.k8s.io/v1\nkind: Ingress\nmetadata:\n  name: myapp-ingress\n  annotations:\n    nginx.ingress.kubernetes.io/rewrite-target: /\nspec:\n  tls:\n  - hosts: [&quot;app.example.com&quot;]\n    secretName: app-tls\n  rules:\n  - host: app.example.com\n    http:\n      paths:\n      - path: /api\n        pathType: Prefix\n        backend:\n          service: {name: api-svc, port: {number: 80}}\n      - path: /\n        pathType: Prefix\n        backend:\n          service: {name: web-svc, port: {number: 80}}<\/code><\/pre><ul><li><strong>Host routing<\/strong> — разные домены ведут к разным Service'ам.<\/li><li><strong>Pa
